// AI（冥側）
// ============================================================
const AI_PIECE_VALUE = { ten:1000, mei:1000, in:9, you:9, gogyou:5, tane:1, fusion:8 };
// AIの術ループ防止：直前に術を使った駒とターンを陣営ごとに記録
let aiLastJutsuPid = { ten:null, mei:null };
// AIの直近の着手履歴（いたちごっこ＝同じ駒が行ったり来たりするのを抑えるため）。
// 各要素 { key:駒の識別, fromR,fromC,toR,toC }。新しい手ほど末尾。
let aiRecentMoves = { ten:[], mei:[] };
function aiPieceKey(p){ if(!p) return '?'; return (p.pid!==undefined ? 'p'+p.pid : p.type+(p.attr||'')); }
function aiRecordMove(team, piece, fromR, fromC, toR, toC){
  if(!aiRecentMoves[team]) aiRecentMoves[team] = [];
  aiRecentMoves[team].push({ key:aiPieceKey(piece), fromR:fromR, fromC:fromC, toR:toR, toC:toC });
  if(aiRecentMoves[team].length > 8) aiRecentMoves[team].shift();
}
let aiLastJutsuTurn = { ten:-99, mei:-99 };

function aiPieceValue(p) {
  if (!p) return 0;
  let v = AI_PIECE_VALUE[p.type] || 1;
  if (p.promoted) v += 3; // 成り駒は価値増
  return v;
}

// AIの全合法手を収集（移動・駒取りのみ。術はたまに別途）
function aiCollectMoves(team) {
  const list = [];
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (!p || p.team!==team) continue;
    if (isFrozen(r,c)) continue;
    // 玄武・火連続・特殊移動駒は通常のgetMovesで近似
    let res;
    try { res = getMoves(p, r, c, board); } catch(e){ continue; }
    (res.moves||[]).forEach(([mr,mc]) => list.push({fromR:r,fromC:c,toR:mr,toC:mc,kind:'move',piece:p}));
    (res.captures||[]).forEach(([mr,mc]) => list.push({fromR:r,fromC:c,toR:mr,toC:mc,kind:'capture',piece:p}));
    (res.aiuchi||[]).forEach(([mr,mc]) => list.push({fromR:r,fromC:c,toR:mr,toC:mc,kind:'aiuchi',piece:p}));
  }
  return list;
}

// 手を評価（高いほど良い）
function aiEvalMove(mv) {
  let score = 0;
  const team = mv.piece.team;
  const foe = team==='mei' ? 'ten' : 'mei';

  // === 相打ち（種どうしの刺し違え）の評価 ===
  // 相性で勝てない敵の種としか相打ちできない＝本来は防御手段。
  // 相手が成りに近い（放置すると強い駒に化ける）ほど、刺し違える価値が高い。
  if (mv.kind === 'aiuchi') {
    const enemyTane = board[mv.toR][mv.toC];
    if (!enemyTane) return -999;
    const promoteRow = foe==='ten' ? 0 : 8;      // 敵の種が成るために目指す行
    const distToPromote = Math.abs(mv.toR - promoteRow);
    let s = 0;
    if (distToPromote <= 1) s += 60;             // あと1マスで成る：強く排除
    else if (distToPromote <= 2) s += 35;
    else if (distToPromote <= 3) s += 12;
    else s -= 10;                                 // まだ遠い無害な種：安売りしない
    let myT=0, foeT=0;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const q=board[r][c]; if(q&&q.type==='tane'){ if(q.team===team)myT++; else foeT++; } }
    if (foeT < myT) s += 8;                       // 数的有利：交換を続けると相手が先に枯れる
    if (myT <= 2) s -= 15;                         // 自分の種が残りわずか：安易に減らさない
    return s + Math.random()*2;
  }

  const target = board[mv.toR][mv.toC];
  const targetFusion = getFusionAt(mv.toR, mv.toC);
  // 駒を取れる手は価値分加点
  if (target && target.team!==team) {
    score += aiPieceValue(target) * 10;
    if (target.type==='ten'||target.type==='mei') score += 100000; // 王を取れる＝勝ち
  }
  if (targetFusion && targetFusion.team!==team) {
    score += 420; // 合体駒の破壊は最優先級（複数駒が融合した強力な存在）
    // 玄極（相手の成りを封じる）・太極（味方を成らせる）は特に脅威なので、さらに強く狙う
    if (targetFusion.name==='玄極' || targetFusion.name==='太極') score += 300;
  }
  const wall = getWallAt(mv.toR, mv.toC);
  if (wall) score += 2;

  // === 王（天/冥）を動かす手は厳しく評価：前線に出さない ===
  if (mv.piece.type===team) {
    // 王の移動先が敵に取られうるなら致命的に減点（王を失う＝敗北）
    const kingDanger = aiSquareAttackedBy(mv.toR, mv.toC, foe, mv);
    if (kingDanger) score -= 50000;
    if (target && target.team===foe && kingDanger) score -= 50000;
    // 王での駒取りボーナスを打ち消す＋ペナルティ（王は駒を取りに行かない）
    if (target && target.team===foe) score -= aiPieceValue(target) * 13;
    // 王が前線に出るのを強く抑制（ten=row大が自陣、mei=row小が自陣）
    const forwardness = team==='ten' ? (8 - mv.toR) : mv.toR; // 大きいほど前線
    score -= forwardness * 40;
    // 王はむやみに動かさない
    score -= 50;
  }

  // === 守備評価 ===
  // 自王の位置を探す
  let kr=-1, kc=-1;
  for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const p=board[r][c]; if(p&&p.type===team) {kr=r;kc=c;} }

  // (A) 自王が今攻撃されているか（王の危機）。ボーナス2段の脅威も読む（checkBonus=true）
  const kingInDanger = (kr>=0) && aiSquareAttackedBy(kr, kc, foe, {fromR:-1,fromC:-1,toR:-1,toC:-1}, true);
  if (kingInDanger) {
    if (mv.piece.type===team) {
      const stillDanger = aiSquareAttackedBy(mv.toR, mv.toC, foe, mv, true);
      if (!stillDanger) score += 8000; // 王が安全マスへ逃げる
    }
    if (target && target.team===foe) score += 6000; // 王を脅かす敵を取る
    // この手の後、まだ王が危ないなら大減点（放置を防ぐ）
    if (mv.piece.type!==team) {
      const kAfter = aiSquareAttackedBy(kr, kc, foe, mv, true);
      if (kAfter) score -= 4000; // 王の危機を無視する手は強く避ける
    }
  }

  // (A0) この手を指した後、相手の次の一手で自王が取られる状態になるなら強く避ける
  // （開き王手・遠距離駒の利り見落とし対策）。王自身の移動先も含めて判定。
  {
    const sf = board[mv.fromR][mv.fromC];
    const st = board[mv.toR][mv.toC];
    board[mv.toR][mv.toC] = sf;
    board[mv.fromR][mv.fromC] = null;
    // 移動後の自王位置を再取得
    let nkr=-1, nkc=-1;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const p=board[r][c]; if(p&&p.type===team){nkr=r;nkc=c;} }
    let kingTakable = false;
    if (nkr>=0) {
      for (let r=0;r<9 && !kingTakable;r++) for (let c=0;c<9 && !kingTakable;c++) {
        const ep = board[r][c];
        if (!ep || ep.team!==foe) continue;
        let res; try { res = getMoves(ep, r, c, board); } catch(e){ continue; }
        if ((res.captures||[]).some(([mr,mc])=>mr===nkr&&mc===nkc)) kingTakable = true;
      }
    }
    // 盤を戻す
    board[mv.fromR][mv.fromC] = sf;
    board[mv.toR][mv.toC] = st;
    if (kingTakable) score -= 40000; // 次に王を取られる手は致命的
  }

  // (A2) この手で自分の駒が「次に取られる」脅威を作っていないか／解消できるか
  // 自陣侵入してきた敵駒を取る手を高評価（やられる前に対処）
  if (target && target.team===foe) {
    const inMyZone = team==='ten' ? mv.toR>=6 : mv.toR<=2; // 自陣に入った敵
    if (inMyZone) score += 150; // 侵入者を取るのは守備的に重要
  }
  // 自分の駒が今、敵に取られそうな位置にいる→逃げる手を評価
  {
    const meNow = aiSquareAttackedBy(mv.fromR, mv.fromC, foe, {fromR:-1,fromC:-1,toR:-1,toC:-1});
    const meAfter = aiSquareAttackedBy(mv.toR, mv.toC, foe, mv);
    if (meNow && !meAfter && mv.piece.type!==team) {
      score += aiPieceValue(mv.piece) * 5; // 取られそうな駒を安全に逃がす
    }
  }

  // === 術の脅威：王が術で倒される位置を避ける／敵王を術の射程へ追い込む ===
  // 王が術（金剛力・矛爪・大暴発・潜伏）の対象になったため、通常の利きだけでは王の安全を測れない。
  {
    let dmap = null;
    try { dmap = jutsuDangerCells(team); } catch(e) { dmap = null; }
    if (dmap) {
      if (mv.piece.type===team) {
        // 自分の王：危険マスへ入るのは致命的。逆に危険マスから逃げる手は高評価。
        if (dmap[mv.toR+','+mv.toC]) score -= 30000;
        else if (dmap[mv.fromR+','+mv.fromC]) score += 3000;
      } else {
        // 味方の駒：王の周りの危険マスを埋める（自駒を盾にする）よりも、
        // 危険の源（敵の金・溜めた火）を取る手を評価する
        if (target && target.team===foe) {
          const isKin = target.type==='gogyou' && target.attr==='金';
          let isCharged = false;
          if (target.type==='gogyou' && target.attr==='火' && !target.promoted) {
            const k = hiKeyOf(target);
            isCharged = !!(k && (hiStackCount[k]||0) > 0);
          }
          if (isKin || isCharged) {
            // 自王がその脅威範囲にいるなら、排除の価値が跳ね上がる
            let kr2=-1, kc2=-1;
            for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const q=board[r][c]; if(q&&q.type===team){kr2=r;kc2=c;} }
            if (kr2>=0 && dmap[kr2+','+kc2]) score += 900;
            else score += 120;
          }
        }
      }
    }
  }

  // === 序盤のセオリー（駒組み・展開）===
  // 将棋と同じで、序盤は「眠っている駒を働かせる」「同じ駒を何度も動かさない」「後退しない」が基本。
  // 中盤以降（40手以降）はこの補正を切り、戦術評価に任せる。
  if (turnCount < 40 && mv.piece.type!==team) {
    const isHomeFrom = team==='ten' ? mv.fromR>=6 : mv.fromR<=2;
    const isHomeTo   = team==='ten' ? mv.toR>=6   : mv.toR<=2;
    const fwd = team==='ten' ? (mv.fromR-mv.toR) : (mv.toR-mv.fromR); // 前進量（正が前）
    // 展開：自陣で眠っている駒を前線へ繰り出す
    if (isHomeFrom && !isHomeTo) score += 40;
    else if (isHomeFrom && fwd > 0) score += 12;
    // 種駒を突いて陣形を作る（歩を伸ばす感覚）。中央寄りほど価値が高い。
    if (mv.piece.type==='tane' && fwd > 0) score += 10 + (4 - Math.abs(mv.toC - 4)) * 2;
    // 序盤の後退は駒組みが遅れるだけ（駒を取る手は除く）
    if (fwd < 0 && mv.kind!=='capture') score -= 35;
    // 一手一駒：同じ駒ばかり動かさず、多くの駒を働かせる
    {
      const hist = aiRecentMoves[team] || [];
      const mkey = aiPieceKey(mv.piece);
      let recentSame = 0;
      for (let i=Math.max(0,hist.length-3); i<hist.length; i++) if (hist[i].key===mkey) recentSame++;
      if (recentSame>0 && mv.kind!=='capture') score -= recentSame*45;
    }
  }

  // === 反復（いたちごっこ）抑制 ===
  // 単騎で王手→逃げられる→また王手…の無限反復を防ぐ。直近の自分の手と往復になる手を強く減点。
  {
    const hist = aiRecentMoves[team] || [];
    const mkey = aiPieceKey(mv.piece);
    for (let hi=hist.length-1, back=1; hi>=0 && back<=4; hi--, back++) {
      const h = hist[hi];
      if (h.key !== mkey) continue;
      // 直前に居た場所へ戻る手（往復）＝進展が無い
      if (h.fromR===mv.toR && h.fromC===mv.toC) { score -= (back<=1 ? 900 : 400); break; }
      // 同じ駒が最近と同じマスへ再度移動する＝堂々巡り
      if (h.toR===mv.toR && h.toC===mv.toC) { score -= 250; break; }
    }
  }

  // === 季節ボーナスを持つ駒は積極的に攻めに使う ===
  // ボーナス（もう1マス動ける）駒は寄せの主力になれるので、敵王へ近づく手を後押しする。
  {
    let hasBonus = false;
    try { hasBonus = hasBonusAction(mv.piece, team); } catch(e) {}
    if (hasBonus && mv.piece.type!==team) {
      let ekr2=-1, ekc2=-1;
      for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const q=board[r][c]; if(q&&q.type===foe){ekr2=r;ekc2=c;} }
      if (ekr2>=0) {
        const dFrom = Math.abs(mv.fromR-ekr2)+Math.abs(mv.fromC-ekc2);
        const dTo   = Math.abs(mv.toR-ekr2)+Math.abs(mv.toC-ekc2);
        if (dTo < dFrom && !aiSquareAttackedBy(mv.toR, mv.toC, foe, mv)) {
          score += (dTo<=2 ? 45 : 20); // 安全に王へ迫るボーナス駒を優先
        }
      }
    }
  }

  // (B) 自王の隣接マスに敵が迫っている場合、その敵を取る手を高評価
  if (target && target.team===foe && kr>=0) {
    const distToKing = Math.abs(target ? mv.toR-kr : 99) + Math.abs(mv.toC-kc);
    if (distToKing <= 2) score += 200; // 王の近くの敵を排除
  }

  // (C) この手で自王の隣が手薄にならないか（王の隣から離れる自駒は減点）
  if (mv.piece.type!==team && kr>=0) {
    const fromDist = Math.abs(mv.fromR-kr) + Math.abs(mv.fromC-kc);
    const toDist = Math.abs(mv.toR-kr) + Math.abs(mv.toC-kc);
    if (fromDist===1 && toDist>1) score -= 30; // 守備駒が王の隣を離れる
  }

  // 前進を少し奨励（控えめに）
  const forward = team==='mei' ? (mv.toR - mv.fromR) : (mv.fromR - mv.toR);
  score += forward * 0.3;

  // === 五行駒を自陣外へ出すと術が使える → 前進を後押し（危険なら後段のdangerで抑制される）===
  if (mv.piece.type==='gogyou' && !mv.piece.promoted) {
    const fromOwn = isInOwnTerritory(mv.piece, mv.fromR, mv.fromC);
    const toOwn = isInOwnTerritory(mv.piece, mv.toR, mv.toC);
    if (fromOwn && !toOwn) score += 55;   // 自陣→中盤：術を撃てる位置へ出る
    else if (!fromOwn && !toOwn) score += 8; // 既に外なら外に留まる価値
  }

  // === 季節バフの活用（全AI共通の基礎思考）===
  // 今の季節と同じ属性の五行駒は、行動後にもう1マス動ける（季節ボーナス）。
  // このお得な駒を積極的に動かすと、前進・自陣脱出・術発動（＝成り）が進みやすい。
  // 性格に関係なく、賢いAIなら誰でも季節を意識して駒を動かすべき、という土台の底上げ。
  if (mv.piece.type==='gogyou' && SEASONS[seasonIdx % 20].attr === mv.piece.attr) {
    score += 22; // 季節バフ対象の駒を動かすこと自体に加点（腐らせず活用する）
    const fromOwn = isInOwnTerritory(mv.piece, mv.fromR, mv.fromC);
    const toOwn = isInOwnTerritory(mv.piece, mv.toR, mv.toC);
    const fwd = team==='mei' ? (mv.toR - mv.fromR) : (mv.fromR - mv.toR);
    // 目的地が敵に取られる位置なら発展加点は与えない（旬の駒のタダ捨て誘発を防ぐ）
    const devSafe = !aiSquareAttackedBy(mv.toR, mv.toC, foe, mv);
    if (devSafe) {
      // 自陣の奥にいても境界へ近づく前進を評価（＝旬のうちに前線へ出す途中の一手も候補に入る）
      if (fwd > 0) score += fwd * 16;
      if (fromOwn && !toOwn) score += 55;                 // 自陣→外：術で成れる位置へ出る起点
      if (!mv.piece.promoted && fromOwn && !toOwn) score += 30; // 未成りは成り（術発動）に直結
    }
  }

  // === タダ捨て判定：この手で自駒が取られ、見返り（捕獲）が価値に見合わないか ===
  const _myVal = aiPieceValue(mv.piece);
  // 合体駒の破壊も「見返り」として数える（これが無いと合体駒への攻撃がタダ捨て扱いになり、AIが踏み込まない）
  const _fusionVal = (targetFusion && targetFusion.team!==team) ? 40 : 0;
  const _capVal = ((target && target.team===foe) ? aiPieceValue(target) : 0) + _fusionVal;
  const _danger = aiSquareAttackedBy(mv.toR, mv.toC, foe, mv);
  const _freeHang = _danger && (_capVal < _myVal) && (mv.piece.type!==team); // 王は別途処理

  // === 寄せの意識：攻め駒（王以外）が敵王に近づく手を評価 ===
  // 序盤は寄せを抑え、中盤以降に効かせる（駒組み・術・合体の時間を作る）
  // turnCount 0〜30は弱め(0.3倍)、30〜60で徐々に強まり、60以降フル(1.0倍)
  let yoseFactor = 1.0;
  if (turnCount < 12) yoseFactor = 0.5;
  else if (turnCount < 35) yoseFactor = 0.5 + (turnCount - 12) / 23 * 0.7;
  else yoseFactor = 1.2;
  // 終盤（駒が少ない・手数が進んだ）では寄せをさらに強めて、決めきれずグダるのを防ぐ
  let _pieceCount = 0;
  for (let r=0;r<9;r++) for (let c=0;c<9;c++){ if(board[r][c]) _pieceCount++; }
  if (_pieceCount <= 12) yoseFactor *= 1.8;        // 終盤：寄せを強く意識
  else if (_pieceCount <= 18) yoseFactor *= 1.35;
  if (turnCount >= 100) yoseFactor *= 1.4;          // 長引いてきたら決着を急ぐ
  // タダ捨てになる手は寄せ加点を大きく割引（取られてしまう駒で王に迫っても無意味）
  if (_freeHang) yoseFactor *= 0.15;
  if (mv.piece.type!==team) {
    let ekr=-1, ekc=-1;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const p=board[r][c]; if(p&&p.type===foe){ekr=r;ekc=c;} }
    if (ekr>=0) {
      const fromD = Math.abs(mv.fromR-ekr) + Math.abs(mv.fromC-ekc);
      const toD = Math.abs(mv.toR-ekr) + Math.abs(mv.toC-ekc);
      if (toD < fromD) score += (fromD - toD) * 14 * yoseFactor;
      if (toD <= 3) score += 50 * yoseFactor;
      if (toD <= 2) score += 120 * yoseFactor;
      if (toD <= 1) score += 300 * yoseFactor;
    }
  }

  // === 合体駒へ寄る意識：破壊できる敵の合体駒に近づく手を評価 ===
  // （着地の加点だけでは「1手で届く距離」しか反応せず、遠いと近づく動機がゼロで膠着するため）
  if (mv.piece.type!==team) {
    let bestGain = 0;
    fusionPieces[foe].forEach(fz => {
      if (!canCaptureFusion(mv.piece, fz)) return; // 自分が壊せない合体駒は無視
      // 合体駒（2x2）の最寄りマスまでの距離
      const dist = (r0, c0) => {
        const dr = Math.max(fz.topRow - r0, 0, r0 - (fz.topRow + 1));
        const dc = Math.max(fz.leftCol - c0, 0, c0 - (fz.leftCol + 1));
        return dr + dc;
      };
      const fromD = dist(mv.fromR, mv.fromC);
      const toD = dist(mv.toR, mv.toC);
      let gain = 0;
      if (toD < fromD) gain += (fromD - toD) * 22; // 近づくほど加点（寄せより強め）
      if (toD <= 2) gain += 90;
      if (toD <= 1) gain += 200;                    // 隣接＝次の手で壊せる
      // 玄極・太極は特に脅威なので、近づく価値も高い
      if (fz.name==='玄極' || fz.name==='太極') gain *= 1.6;
      if (gain > bestGain) bestGain = gain;
    });
    score += bestGain;
  }

  // 移動先が相手に取られる位置かチェック（危険なら減点）
  if (_danger) {
    if (_capVal >= _myVal) {
      // 相手の方が価値が高い/同等の駒を取れる＝良い取引。軽い減点のみ
      score -= _myVal * 3;
      score += _capVal * 3;
    } else {
      // タダ〜割の悪い取引で取られる：捕獲価値との差を、捕獲加点(×10)と対称になるよう強く減点
      score -= _myVal * 10;
      score += _capVal * 6; // 多少取れているならその分は差し引く
    }
  }

  score += Math.random() * 2;

  return score;
}


// (r,c)が指定チームに攻撃されているか（mvを仮適用した盤面で判定）
function aiSquareAttackedBy(r, c, byTeam, mv, checkBonus) {
  // mvが有効な移動でなければ現在の盤面のまま判定（ダミーmv対応）
  const validMv = mv && mv.fromR>=0 && mv.fromC>=0 && mv.toR>=0 && mv.toC>=0;
  let fromP=null, savedTo=null;
  if (validMv) {
    fromP = board[mv.fromR][mv.fromC];
    savedTo = board[mv.toR][mv.toC];
    board[mv.toR][mv.toC] = fromP;
    board[mv.fromR][mv.fromC] = null;
  }
  let attacked = false;
  for (let rr=0;rr<9 && !attacked;rr++) for (let cc=0;cc<9 && !attacked;cc++) {
    const ep = board[rr][cc];
    if (!ep || ep.team!==byTeam) continue;
    let res;
    try { res = getMoves(ep, rr, cc, board); } catch(e){ continue; }
    if ((res.captures||[]).some(([mr,mc])=>mr===r&&mc===c)) attacked = true;
    // 季節ボーナス対象の駒は「1マス動いた先から、さらにボーナス移動で王に届く」2段攻撃も脅威になる。
    // これは王の安全判定のときだけ（checkBonus=true）走らせる。全マスに適用すると重く、AIが慎重になりすぎるため。
    if (!attacked && checkBonus && hasBonusAction(ep, byTeam)) {
      const firstSteps = (res.moves||[]).concat(res.captures||[]);
      for (const [m1r,m1c] of firstSteps) {
        if (attacked) break;
        // epをm1へ仮移動し、そこからボーナス移動で(r,c)に届くか
        const savedFrom = board[rr][cc], savedTo = board[m1r][m1c];
        board[m1r][m1c] = ep; board[rr][cc] = null;
        let bonus;
        try { bonus = getBonusMoves(ep, m1r, m1c, board); } catch(e){ bonus = {moves:[],captures:[]}; }
        board[rr][cc] = savedFrom; board[m1r][m1c] = savedTo;
        if ((bonus.captures||[]).some(([br,bc])=>br===r&&bc===c)) attacked = true;
      }
    }
  }
  // 戻す
  if (validMv) {
    board[mv.fromR][mv.fromC] = fromP;
    board[mv.toR][mv.toC] = savedTo;
  }
  return attacked;
}

// 現在の手番がAI操作かどうか
function isAITurn() {
  if (gamePhase!=='playing') return false;
  if (currentTeam==='mei' && aiEnabled) return true;   // 冥AI（AI対戦）
  if (currentTeam==='ten' && autoTen) return true;     // 天オート

}

function aiPlayTurn() {
  if (!isAITurn()) return;
  if (aiThinking) return;
  aiThinking = true;
  const teamName = currentTeam==='ten' ? '天' : '冥';
  setLog(`${teamName}（AI）が考えています…`);
  setTimeout(() => {
    try {
      aiDoMove();
    } catch(e) {
      console.error('AI error', e);
      aiThinking = false;
      nextTurn();
    }
  }, aiSpeedDelay());
}

// AI: 太極の成り付与を処理（自分の未成り駒を1つ成らせる）
function aiHandleTaikyoku(team) {
  const candidates = [];
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (p && p.team===team && !p.promoted &&
        (p.type==='gogyou'||p.type==='in'||p.type==='you'||p.type==='tane')) {
      // 同種の五神／暗黒竜／耀白龍が既に盤上にいる駒は成れないので、太極を無駄撃ちしない
      if (p.type!=='tane' && !canPromoteKind(p)) continue;
      candidates.push([r,c]);
    }
  }
  if (candidates.length===0) { taikyokuGrantAvailable = null; return; }
  // 価値の高い駒（陰陽>五行>種）を優先
  candidates.sort((a,b) => aiPieceValue(board[b[0]][b[1]]) - aiPieceValue(board[a[0]][a[1]]));
  const [r,c] = candidates[0];
  const p = board[r][c];
  if (p.type==='tane') {
    board[r][c] = makePiece('gogyou', p.team, p.attr);
  } else if (!canPromoteKind(p)) {
    setLog(`太極の力は届かない：同じ${goshinKindOf(p)}が既に盤上にいる`);
  } else {
    board[r][c] = { ...p, promoted:true };
    logPromote(p.team);
    // 土→麒麟の場合、マーキング対象をAIが自動選択
    if (p.type==='gogyou' && p.attr==='土') {
      const marks = [];
      for (let rr=0;rr<9;rr++) for (let cc=0;cc<9;cc++) {
        const mp = board[rr][cc];
        if (mp && mp.team===team && !(rr===r&&cc===c) && mp.type!=='ten' && mp.type!=='mei') marks.push([rr,cc]);
      }
      if (marks.length>0) {
        const [mr,mc] = marks[Math.floor(Math.random()*marks.length)];
        kirinMark[team] = { kirinRow:r, kirinCol:c, markRow:mr, markCol:mc, markPid: (board[mr][mc]||{}).pid };
      }
    }
  }
  taikyokuGrantAvailable = null;
  setLog(`太極の力！${getPieceName(board[r][c])}が成った！`);
  renderBoard();
  flashEffect([[r,c]],'buff','成');
}

// AI: 玄極の無化を処理（相手の駒を1つ「無」にする / 王以外）
function aiHandleGenkyoku(team) {
  const enemy = team==='ten' ? 'mei' : 'ten';
  const candidates = [];
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (p && p.team===enemy && p.type!=='ten' && p.type!=='mei' && p.type!=='mu') {
      candidates.push([r,c]);
    }
  }
  if (candidates.length===0) { genkyokuMuAvailable = null; return; }
  // 価値の高い相手駒を優先して無化
  candidates.sort((a,b) => aiPieceValue(board[b[0]][b[1]]) - aiPieceValue(board[a[0]][a[1]]));
  const [r,c] = candidates[0];
  const victim = board[r][c];
  const dgAi = degradePiece(victim);
  const beforeNameAi = getPieceName(victim);
  board[r][c] = dgAi.piece;
  genkyokuMuAvailable = null;
  showEffectBanner('結界','無');
  setLog(`玄極の力！${beforeNameAi}の${dgAi.label}！`);
  renderBoard();
  flashEffect([[r,c]],'mu', dgAi.piece.type==='mu' ? '無' : '退');
}

// AI: 水晶の相手駒操作を処理（敵駒を1つ、不利な位置へ動かす）
function aiHandleSuishou(team) {
  const enemy = team==='ten' ? 'mei' : 'ten';
  // 操作できる敵駒を集める（天冥以外）
  const targets = [];
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (p && p.team===enemy) { // 王も操作対象
      if (isFrozen(r,c)) continue;
      targets.push([r,c]);
    }
  }
  if (targets.length===0) { suishouActive = null; suishouMoveState = null; nextTurn(); return; }
  // ランダムな敵駒を選び、その移動先のうち自陣寄り（敵にとって後退）に動かす
  const [tr,tc] = targets[Math.floor(Math.random()*targets.length)];
  const tp = board[tr][tc];
  let res;
  try { res = getMoves(tp, tr, tc, board); } catch(e){ res={moves:[],captures:[]}; }
  const dests = [...(res.moves||[])]; // 取らせない（移動のみ）
  if (dests.length===0) { suishouActive = null; suishouMoveState = null; nextTurn(); return; }
  // 敵を自陣（team側）に近づける＝敵にとって不利。teamがtenなら下(row大)へ、meiなら上(row小)へ
  dests.sort((a,b) => team==='ten' ? (b[0]-a[0]) : (a[0]-b[0]));
  const [dr,dc] = dests[0];
  board[dr][dc] = tp;
  board[tr][tc] = null;
  suishouActive = null; suishouMoveState = null;
  setLog('水晶で相手の駒を操作した！');
  renderBoard();
  flashEffect([[dr,dc]],'control','操');
  nextTurn();
}

// AIの特殊行動（術・合体・持ち駒打ち）。実行したらtrueを返しターン消費。
// 難易度に応じた特殊行動の発動確率倍率
function aiSpecialMult() { return aiLevel==='easy' ? 0.5 : (aiLevel==='hard' ? 1.15 : 1.0); }


// 難易度に応じて指し手を選ぶ
// ===== 先読み（ミニマックス／駒得ベース）: 強AI用 =====
var HARD_DEPTH = 3; // 自分の手のあと、さらに読む手数（合計4手読み）。αβ枝刈り＋並べ替え＋時間ガード付き
var Q_DEPTH = 3;    // 静止探索：末端で「取り合い」だけを追う最大手数（暴発防止の上限）
var aiSearchDeadline = 0; // 探索の締切時刻(ms)。超えたら静的評価で静かに打ち切る（固まり防止）
function aiNow(){ return (typeof performance!=='undefined' && performance.now) ? performance.now() : Date.now(); }
function aiTimeUp(){ return aiNow() > aiSearchDeadline; }
// (c) 金剛力の脅威：victimTeamの土/木/金駒が、敵の金五行(自陣外)の前方2マスにいる分を脅威として集計
function aiKinThreatPenalty(bd, victimTeam){
  var attacker = victimTeam==='ten'?'mei':'ten', pen=0;
  for(var r=0;r<9;r++)for(var c=0;c<9;c++){
    var p=bd[r][c];
    if(!p||p.team!==attacker||p.type!=='gogyou'||p.attr!=='金'||p.promoted) continue;
    var isHome = p.team==='ten' ? (r>=6) : (r<=2);
    if(isHome) continue; // 自陣内では術不可
    var dir = p.team==='ten' ? -1 : 1;
    for(var i=1;i<=2;i++){
      var tr=r+dir*i; if(tr<0||tr>=9) break;
      var t=bd[tr][c];
      if(t && t.team===victimTeam && (t.attr==='土'||t.attr==='木'||t.attr==='金')) pen += aiPieceValue(t)*0.35;
    }
  }
  return pen;
}
// (a) 位置評価：駒得＋前進＋術を撃てる好位置＋(c)術脅威
function aiPositionEval(bd, team){
  var enemy = team==='ten'?'mei':'ten', s=0;
  // 旬（現季節と同属性）の未成り五行駒を、旬のうちに前線へ出して術で成らせる動機付け用
  var seasonAttr = (typeof SEASONS!=='undefined' && SEASONS[seasonIdx % 20]) ? SEASONS[seasonIdx % 20].attr : null;
  // 両王の位置を先に把握
  var myKr=-1,myKc=-1,foeKr=-1,foeKc=-1;
  for(var r=0;r<9;r++)for(var c=0;c<9;c++){ var q=bd[r][c]; if(!q)continue; if(q.type===team){myKr=r;myKc=c;} else if(q.type===enemy){foeKr=r;foeKc=c;} }
  // 敵の利き（＝取られる位置）を遅延生成。寄せ加点を与える駒が現れたとき初めて1回だけ構築する。
  // これで「取られる位置の駒に寄せ加点を与えない」判定を、必要な局面だけ低コストで行う。
  var _enemyAtk = null;
  function enemyAttacksSquare(rr, cc){
    if(_enemyAtk === null){
      _enemyAtk = {};
      for(var er=0;er<9;er++)for(var ec=0;ec<9;ec++){
        var ep=bd[er][ec];
        if(!ep || ep.team!==enemy) continue;
        var res; try{ res=getMoves(ep, er, ec, bd); }catch(e){ continue; }
        var caps=res.captures||[];
        for(var k=0;k<caps.length;k++){ _enemyAtk[caps[k][0]+","+caps[k][1]]=1; }
      }
    }
    return !!_enemyAtk[rr+","+cc];
  }
  for(var r=0;r<9;r++)for(var c=0;c<9;c++){
    var p=bd[r][c]; if(!p)continue;
    var v=aiPieceValue(p);
    var isHome = p.team==='ten' ? (r>=6) : (r<=2);
    var adv = p.team==='ten' ? (8-r) : r; // 前進度 0..8
    if(p.type==='gogyou'||p.type==='tane') v += adv*1.5;          // 前進を後押し
    if(p.type==='gogyou'&&!p.promoted&&!isHome) v += 8;           // 自陣外＝術・成りの好位置
    // 旬の駒：前進を強めに評価し、自陣外なら「この季節に術で成れる好機」として加点。
    // これでαβ探索が“旬の駒を境界へ寄せて成る”筋を選ぶようになり、木・金の放置を防ぐ。
    if(p.type==='gogyou' && !p.promoted && p.attr===seasonAttr){
      v += adv*2;                 // 旬の駒の前進（自陣の奥→境界）を後押し
      if(!isHome) v += 14;        // 自陣外＝今季に成れる（寄せ加点と競える程度）
    }
    // 寄せ：自軍の攻め駒（王以外）が敵王に近いほど加点。駒得が同じなら「王に迫る局面」を選ばせる。
    // ただし取られる位置（敵の利きがある）の駒には寄せ加点を与えない＝安い駒の単騎特攻・
    // 無意味なただ捨てを防ぐ。安全に王へ迫る手だけを評価する。
    if(p.team===team && p.type!==team && foeKr>=0 && !enemyAttacksSquare(r,c)){
      var d = Math.abs(r-foeKr)+Math.abs(c-foeKc);
      if(d<=1) v += 22; else if(d<=2) v += 12; else if(d<=3) v += 6; else if(d<=5) v += 2;
    }
    // 自王の危険：自王の周囲に敵駒が迫っているとその駒を脅威として軽く割引（守りの意識）
    if(p.team===enemy && p.type!==enemy && myKr>=0){
      var d2 = Math.abs(r-myKr)+Math.abs(c-myKc);
      if(d2<=1) v += 10; else if(d2<=2) v += 5;  // 敵の接近は自分にとってマイナス（下でs-=vされる）
    }
    s += (p.team===team ? v : -v);
  }
  // === 攻めの協調：多面攻め＋逃げ道封鎖 ===
  // 「王手をかける」こと自体は加点しない（単騎で王手→逃げられる の無限反復を招くため）。
  // 代わりに「複数の駒で王を囲む」「王の逃げ道を減らす」局面を高く評価し、詰みの網を作らせる。
  if(foeKr>=0){
    // 攻め駒が敵王の近くに2枚以上あるときだけ計算する（探索コスト削減）。
    // 1枚しかいない局面では連携も封鎖も成立せず、計算する意味がない。
    var nearCount=0;
    for(var ar=0;ar<9;ar++)for(var ac=0;ac<9;ac++){
      var ap=bd[ar][ac];
      if(ap && ap.team===team && ap.type!==team && Math.abs(ar-foeKr)+Math.abs(ac-foeKc)<=3) nearCount++;
    }
    var nearAttack = (nearCount>=2);
    if(nearAttack){
      // 高速化：全自駒ではなく「敵王の近く（距離4以内）の自駒」だけ利きを計算する。
      // 遠方の駒は寄せの主力にならないため、精度の損失より探索速度を優先する。
      // （全駒走査だと探索の末端ごとに10〜15回のgetMovesが走り、AIの思考が目に見えて重くなる）
      var myAtk={}, attackers=0;
      for(var mr=0;mr<9;mr++)for(var mc=0;mc<9;mc++){
        var mp=bd[mr][mc];
        if(!mp || mp.team!==team) continue;
        if(Math.abs(mr-foeKr)+Math.abs(mc-foeKc) > 4) continue;  // 遠い駒は無視（コスト削減）
        var mres; try{ mres=getMoves(mp,mr,mc,bd); }catch(e){ continue; }
        var all=(mres.captures||[]).concat(mres.moves||[]);
        var touches=false;
        for(var i2=0;i2<all.length;i2++){
          myAtk[all[i2][0]+","+all[i2][1]]=1;
          if(Math.abs(all[i2][0]-foeKr)<=1 && Math.abs(all[i2][1]-foeKc)<=1) touches=true;
        }
        if(touches && mp.type!==team) attackers++;   // 王とその周囲に利いている攻め駒の数
      }
      // 単騎の寄せは薄く、2体以上の連携で大きく加点＝「もう1枚足してから踏み込む」筋を選ばせる
      if(attackers===1) s += 6;
      else if(attackers>=2) s += 70 + (attackers-2)*45;
      // 逃げ道封鎖：敵王が逃げられるマスが少ないほど加点
      var escapes=0;
      for(var dr2=-1;dr2<=1;dr2++)for(var dc2=-1;dc2<=1;dc2++){
        if(dr2===0&&dc2===0) continue;
        var er2=foeKr+dr2, ec2=foeKc+dc2;
        if(er2<0||er2>=9||ec2<0||ec2>=9) continue;   // 盤外＝逃げられない
        var occ=bd[er2][ec2];
        if(occ && occ.team===enemy) continue;         // 敵の自駒で埋まっている＝逃げられない
        if(myAtk[er2+","+ec2]) continue;              // こちらの利きがある＝逃げられない
        escapes++;
      }
      s += (8-escapes)*9;                             // 逃げ道を潰すほど加点
      if(attackers>=2 && escapes===0) s += 500;       // 包囲完成＝決定的
    }
  }
  // === A. 合体駒と壁を評価する（探索盤には無いが、実際の盤の状態を参照する）===
  // aiCloneApplyは駒の移動しか再現しないため、これらは「現在の盤の状況」として加味する。
  // 深く読むほど誤差は出るが、まったく評価しないよりは遥かに正しい判断ができる。
  try {
    // 合体駒：自分のものは価値、敵のものは脅威。玄極・太極は効果が強力なので重く見る。
    for (var ft of ['ten','mei']) {
      var arr = fusionPieces[ft] || [];
      for (var fi=0; fi<arr.length; fi++) {
        var f = arr[fi];
        var val = (f.name==='玄極' || f.name==='太極') ? 55 : 34;
        // 対応季節なら発動率が上がるぶん価値も上がる
        if (seasonAttr && f.baseAttr === seasonAttr) val = Math.round(val * 1.5);
        s += (ft === team) ? val : -val;
      }
    }
    // 壁：盤を制圧する資産。自分のものは加点、敵のものは減点（小さめ）。
    for (var wi=0; wi<wallPieces.length; wi++) {
      var w = wallPieces[wi];
      s += (w.team === team) ? 4 : -4;
    }
  } catch(e) {}

  // === B. 持ち駒を評価する（打ち直せる戦力）===
  // これが無いと「駒を取る価値」が正しく測れず、取り合いの判断が甘くなる。
  try {
    for (var ht of ['ten','mei']) {
      var hand = capturedPieces[ht] || [];
      var hv = 0;
      for (var hi=0; hi<hand.length; hi++) {
        var hp = hand[hi];
        if (!hp || hp.type === 'mu') continue;   // 無駒は打てないので価値なし
        hv += (typeof aiPieceValue === 'function') ? aiPieceValue(hp) * 0.8 : 3;
      }
      s += (ht === team) ? hv : -hv;
    }
  } catch(e) {}

  // === C. 季節の先読み（もうすぐ自分の季節が来るなら、成れる駒を温存する）===
  // 季節は2ターンごとに変わる。次の節が自分の属性なら、その駒を前線に置いておく価値が上がる。
  try {
    var nextAttr = (typeof SEASONS!=='undefined' && SEASONS[(seasonIdx+1) % 20]) ? SEASONS[(seasonIdx+1) % 20].attr : null;
    if (nextAttr) {
      for (var rr2=0; rr2<9; rr2++) for (var cc2=0; cc2<9; cc2++) {
        var p2 = bd[rr2][cc2];
        if (!p2 || p2.team !== team) continue;
        if (p2.type !== 'gogyou' || p2.promoted) continue;
        if (p2.attr !== nextAttr) continue;
        // 自陣の外にいれば次の季節に術で成れる＝その準備ができている

}
function aiGenMovesFor(bd, team){

}
function aiCloneApply(bd, m){

// 静止探索：末端で「駒を取る手」だけをαβで追い、取り合いが収まってから評価する。
// これで水平線効果（読み切りの直後に取り返されてタダ捨てに見える）を減らす。
// standing pat（何もしない現局面評価）を下限に使うので健全。qdepthで暴発を防ぐ。
function aiQuiesce(bd, team, alpha, beta, qdepth){
  if(aiTimeUp()) return aiPositionEval(bd, team);
  var standPat = aiPositionEval(bd, team);
  if(standPat >= beta) return beta;        // 現状で既にβ以上＝これ以上取り合わなくても十分（カット）
  if(standPat > alpha) alpha = standPat;    // 取り合わない選択肢の下限

function aiNegamax(bd, team, depth, alpha, beta){

  if(depth<=0) return aiQuiesce(bd, team, alpha, beta, Q_DEPTH); // 末端は静止探索へ
  var moves = aiGenMovesFor(bd, team);
  if(moves.length===0) return aiPositionEval(bd, team);

  // これでαβ枝刈りがよく効き、同じ深さでも高速化する（結果は変わらない）。
  moves.sort(function(a,b){
    var ta=bd[a.toR][a.toC], tb=bd[b.toR][b.toC];
    var va=ta?aiPieceValue(ta):0, vb=tb?aiPieceValue(tb):0;
    return vb-va;

    if(best>alpha) alpha=best;
    if(alpha>=beta) break;   // βカット（この枝はもう選ばれない）
    if(best>=100000) break;  // 勝ち筋で枝刈り

  return best;
}

function aiChooseMove(moves, team) {
  // 王を取れる手があれば、評価を待たずに即座に選ぶ（＝その手で勝ちが確定するため）。
  // 以前は aiEvalMove のスコア（+100000）で判定していたが、
  // 「取り返される位置だから-50000」などの減点が重なると閾値を下回り、
  // 勝てる手を見逃していた。取ったらその場で勝ちなので、リスク評価は無意味。
  for (const mv of moves) {
    const t = board[mv.toR] && board[mv.toR][mv.toC];
    if (t && t.team !== team && (t.type === 'ten' || t.type === 'mei')) return mv;
  }
  const scored = moves.map(mv => ({ mv, s: aiEvalMove(mv) }));
  // 念のためスコアでも拾う（術など、上のループで拾えない経路への保険）
  const win = scored.find(x => x.s >= 90000);
  if (win) return win.mv;
  if (aiLevel === 'easy') {
    // 40%で完全ランダム（ポカ）、残りは上位3手からランダム
    if (Math.random() < 0.40) return moves[Math.floor(Math.random()*moves.length)];
    scored.sort((a,b)=>b.s-a.s);
    const top = scored.slice(0, Math.min(3, scored.length));
    return top[Math.floor(Math.random()*top.length)].mv;
  }
  if (aiLevel === 'hard') {
    // 先読み（ミニマックス）：候補手を指した後、相手の最善応手まで読んで駒得が最大の手を選ぶ
    scored.sort((a,b)=>b.s-a.s);
    const cand = scored.slice(0, Math.min(14, scored.length));
    const enemy = team==='ten' ? 'mei' : 'ten';
    let best = cand[0].mv, bestV = -Infinity;
    // 思考時間の上限ガード：重い局面でも固まらないよう、一定時間を超えたら
    // それ以降の候補は打ち切る。候補は有望順に並んでいるので早期停止でも安全。
    const _t0 = (typeof performance!=='undefined' && performance.now) ? performance.now() : Date.now();
    const TIME_BUDGET_MS = 800; // 思考で画面/音が固まらない上限（長いとBGMが一瞬途切れる）
    aiSearchDeadline = _t0 + TIME_BUDGET_MS; // 静止探索を含む探索全体の締切
    for (const x of cand) {
      const m = x.mv;
      const tgt = board[m.toR][m.toC];
      if (tgt && (tgt.type==='ten'||tgt.type==='mei')) return m; // 王を取れる＝即勝ち
      // 合体駒の破壊は探索盤（aiCloneApply）では再現されず「空マスへの移動」に見えてしまう。
      // そのため探索結果に静的な破壊価値を足して、目の前の合体駒を無視しないようにする。
      let fusBonus = 0;
      try {
        const fz = getFusionAt(m.toR, m.toC);
        if (fz && fz.team!==team && canCaptureFusion(m.piece, fz)) {
          fusBonus = 260;
          if (fz.name==='玄極' || fz.name==='太極') fusBonus += 200; // 陰陽合体駒は特に厄介
        }
      } catch(e) {}
      // 子探索はαβ全窓（-∞,∞）で呼ぶ＝各候補を公平に評価し、選択挙動は従来と一致。
      // 内部のαβ・並べ替えで高速化した分を深さ3（合計4手読み）に充てる。
      const v = -aiNegamax(aiCloneApply(board, m), enemy, HARD_DEPTH, -Infinity, Infinity) + 0.02*x.s + fusBonus; // 位置的タイブレーク＋合体駒補正
      if (v > bestV) { bestV = v; best = m; }
      const _el = ((typeof performance!=='undefined' && performance.now) ? performance.now() : Date.now()) - _t0;
      if (_el > TIME_BUDGET_MS) break;
    }
    return best;
  }
  // normal：最善手（同点はランダム）
  scored.sort((a,b)=>b.s-a.s);
  const bestS = scored[0].s;
  const ties = scored.filter(x => x.s === bestS);
  return ties[Math.floor(Math.random()*ties.length)].mv;
}

// 対応季節に、その属性の術で五神に成れる五行駒（自陣外・未凍結）が自軍にあるか
function aiHasPromotableJutsu(team){
  var sa = SEASONS[seasonIdx % 20].attr;

    var p=board[r][c];

function aiTrySpecialAction(team) {
  const enemy = team==='ten' ? 'mei' : 'ten';
  const mult = aiSpecialMult();

  // === 0. 五神成りのチャンス（対応季節に術で成れる）を最優先で掴む ===
  // 木の性格は成りを最重視するので、チャンスをほぼ確実に掴む（他性格は0.9）。
  // 性格は対戦相手（冥）だけに適用。天オートは中立。
  const _promoteChance = 0.9; // AI人格（旧仕様）は廃止済みのため一律
  if (aiHasPromotableJutsu(team) && Math.random() < _promoteChance * mult) {
    if (aiTryJutsu(team)) return true;
  }

  // === 0.5 散（合体解除）：盤上の攻め手が枯れてきたら、合体駒を解いて駒を戻す ===
  // 合体は「動ける駒2枚→動けない塊1つ」なので、終盤に攻め手が足りなくなったら
  // 自分で巻き戻して攻撃力を回復する。決着力が落ちてグダるのを防ぐ。
  {
    const myFusions = fusionPieces[team] || [];
    if (myFusions.length > 0) {
      // 自分の「動ける駒」（王・無駒を除く）の数を数える
      let mobile = 0;
      for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
        const p = board[r][c];
        if (p && p.team===team && p.type!==team && p.type!=='mu') mobile++;
      }
      // 攻め手が細ってきた（5枚以下）／終盤に入った（100手以降で7枚以下）なら解除して戦力を戻す
      const needPower = (mobile <= 5) || (turnCount >= 100 && mobile <= 7);
      if (needPower) {
        // 効果が薄い合体駒から順に解く（玄極・太極は強力なので最後に回す）
        const order = myFusions.slice().sort((a,b) => {
          const w = n => (n==='玄極'||n==='太極') ? 1 : 0;
          return w(a.name) - w(b.name);
        });
        for (const f of order) {
          if (scatterBaseCell(f) && executeScatter(f, team)) { // 素体を置ける合体駒のみ解除
            renderBoard(); nextTurn(); return true;
          }
        }
      }
    }
  }

  if (canCreateFusion(team) && Math.random() < 0.8 * mult) {
    if (aiTryFusion(team)) return true;
  }

  // === 2. 術（自陣外に術可能な五行/五神駒があれば発動）===
  // 確率を抑えめにして、駒を動かす手（多彩な駒運用）も選ばれるようにする
  if (Math.random() < 0.4 * mult) {
    if (aiTryJutsu(team)) return true;
  }

  // === 3. 持ち駒打ち ===
  // 奪った種駒を盤上の同属性種駒に挿して五行駒を作れるなら、高確率で狙う（お得な手）。
  const canFuseTane = (() => {
    const hand = capturedPieces[team];
    for (const hp of hand) {
      if (hp.type!=='tane') continue;
      for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
        const q = board[r][c];
        if (q && q.team===team && q.type==='tane' && q.attr===hp.attr && !getWallAt(r,c) && !getFusionAt(r,c)) return true;
      }
    }
    return false;
  })();
  const placeChance = canFuseTane ? 0.9 : 0.25;
  if (capturedPieces[team].length > 0 && Math.random() < placeChance * mult) {
    if (aiTryPlaceCaptured(team)) return true;
  }

  return false;
}

// AI: 合体を試みる
function aiTryFusion(team) {
  const foe = team==='ten' ? 'mei' : 'ten';
  // 陰陽合体駒（太極・玄極）は全属性に破壊される特殊な脆さがある。
  // AIは守れないので、作った瞬間に取られる配置には作らない（無駄な素材消費を防ぐ）。
  const isFragileFusion = (name) => (name==='太極' || name==='玄極');
  const spotIsSafe = (topRow, leftCol) => {
    // 2×2の4マスのいずれかが敵に攻撃されていれば危険（合体駒はどのマスを攻撃されても壊れる）
    for (let dr=0; dr<2; dr++) for (let dc=0; dc<2; dc++) {
      if (aiSquareAttackedBy(topRow+dr, leftCol+dc, foe, {fromR:-1,fromC:-1,toR:-1,toC:-1})) return false;
    }
    return true;
  };
  // 持ち駒の各素材について、合体可能な素体が盤上にあるか探す
  for (let mi=0; mi<capturedPieces[team].length; mi++) {
    const mat = capturedPieces[team][mi];
    const defs = findFusionByMaterial(mat);
    if (defs.length===0) continue;
    for (const def of defs) {
      // 素体を探す
      for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
        const p = board[r][c];
        if (p && p.team===team && isFusionBase(p, def)) {
          const opts = getFusion2x2Options(r, c);
          if (opts.length>0) {
            // 太極・玄極は、安全な配置（敵に取られない2×2）だけを選ぶ。無ければ作らない。
            let chosen = opts[0];
            if (isFragileFusion(def.name)) {
              const safeOpt = opts.find(o => spotIsSafe(o.topRow, o.leftCol));
              if (!safeOpt) continue; // 安全に作れる場所がない→この素体では作らない
              chosen = safeOpt;
            }
            executeFusion({ material: mat, materialIdx: mi, def, baseRow: r, baseCol: c }, chosen.topRow, chosen.leftCol);
            return true;
          }
        }
      }
    }
  }
  return false;
}

// AI: 簡単な術を使う（壁作成・氷結・金剛力・潜伏）
function aiTryJutsu(team) {

        {

          const caps = res.captures || [], movs = res.moves || [];
          let ekr=-1, ekc=-1;
          for (let rr=0;rr<9;rr++) for (let cc=0;cc<9;cc++){ const q=board[rr][cc]; if(q&&q.type===(team==='ten'?'mei':'ten')){ekr=rr;ekc=cc;} }
          let dest = null;

          if (dest) {

  {

          if (!q || q.team!==foeT) continue;
          let res; try { res = getMoves(q, r2, c2, board); } catch(e) { continue; }
          (res.moves||[]).forEach(([a,b])=>dangerSet.add(a+','+b));
          (res.captures||[]).forEach(([a,b])=>dangerSet.add(a+','+b));
        }
      }
      return dangerSet.has(r+','+c);
    };
    for (let gr=0; gr<9; gr++) for (let gc=0; gc<9; gc++) {
      const gp = board[gr][gc];
      if (!(gp && gp.team===team && gp.type==='gogyou' && gp.attr==='水' && gp.promoted && !isFrozen(gr,gc))) continue;
      // 通常モードで良い捕獲があるなら、わざわざスライドしない（倒す方が確実に得）
      let bestCapVal = 0;
      try {
        const nres = getMoves({ ...gp, genbuSlide:false }, gr, gc, board);
        for (const [cr2,cc2] of (nres.captures||[])) {
          const tp = board[cr2][cc2];
          if (tp) bestCapVal = Math.max(bestCapVal, aiPieceValue(tp));
        }
      } catch(e) {}
      if (bestCapVal >= 5) continue; // 通常モードで駒を捕獲できるなら、凍らせるより倒す方が得（凍結ループ防止）
      // スライド各方向を評価（新ルール：敵は倒せない／ぶつかった敵を凍結）
      let best=null, bestScore=0;
      for (const [dr,dc] of getGenbuDirections()) {
        let cr=gr, cc=gc, landR=gr, landC=gc, freezeT=null;
        for (let s=0;s<9;s++) {
          const nr=cr+dr, nc=cc+dc;
          if (nr<0||nr>=9||nc<0||nc>=9) break;
          if (getWallAt(nr,nc)) break;
          if (getFusionAt(nr,nc)) break;
          const t = board[nr][nc];
          if (t) {
            if (t.team!==team) freezeT=[nr,nc]; // 王も凍結対象
            break;
          }
          cr=nr; cc=nc; landR=cr; landC=cc;
        }
        if (!freezeT) continue;                       // 凍結できない方向は狙わない
        const victim = board[freezeT[0]][freezeT[1]];
        if (!victim) continue;
        if (isFrozen(freezeT[0], freezeT[1])) continue; // 既に凍っている相手を凍らせ直しても無意味（凍結ループ防止）
        if (landR===gr && landC===gc && genbuCanDefeat(victim)) continue; // 隣接していて倒せる相手は、凍らせずに通常モードで捕獲する
        let sc = aiPieceValue(victim) * 8;            // 価値の高い敵を止めるほど良い
        if (genbuCanDefeat(victim)) sc += 50;         // 次の番に通常モードで倒せる＝実質的な捕獲予約
        if (landR===gr && landC===gc) sc -= 10;       // 一歩も動かず触るだけは価値を下げる
        if (dangerAt(landR, landC)) sc -= 70;         // 着地点が敵の利き＝玄武を失うので避ける
        if (sc > bestScore) { bestScore = sc; best = { dr, dc, landR, landC, freezeT }; }
      }
      if (!best || bestScore < 40) continue;          // 十分な価値が無ければ通常モードのまま
      // 実行：切替（手番消費なし）→スライド移動＋凍結
      gp.genbuSlide = true;
      setLog('玄武：スライド移動に切替');
      board[gr][gc] = null;
      board[best.landR][best.landC] = gp;
      lastMove = { from:[gr,gc], to:[best.landR,best.landC] };
      const [fr2,fc2] = best.freezeT;
      const victim = board[fr2][fc2];
      frozenPieces[team] = { row:fr2, col:fc2, untilTurn:{ type:'turns', count:2 }, startTurn:turnCount, byTeam:team };
      try { flashEffect([[fr2,fc2]], 'freeze', '凍'); } catch(e){}
      showEffectBanner('術','凍結');
      setLog(`玄武が滑って ${getPieceName(victim)} を凍らせた！（次の番まで動けない）`);
      renderBoard(); nextTurn();
      return true;
    }
  }
    // 青龍のL字移動（合計2マス・1回だけ曲がる）。getRyuReachableで到達マスと経路を一括取得。
  {
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
      const p = board[r][c];
      if (!(p && p.team===team && p.type==='gogyou' && p.attr==='木' && p.promoted && !isFrozen(r,c) && !isInOwnTerritory(p,r,c))) continue;
      const foeKingType = team==='ten' ? 'mei' : 'ten';
      let reach; try { reach = getRyuReachable(p, r, c); } catch(e){ continue; }
      const dests = reach.dests || [];
      if (dests.length===0) continue;
      // 敵王の位置
      let ekr=-1, ekc=-1;
      for (let rr=0;rr<9;rr++) for (let cc=0;cc<9;cc++){ const q=board[rr][cc]; if(q&&q.type===foeKingType){ekr=rr;ekc=cc;} }
      // 王を取れる着地があるか
      const kingDest = dests.find(d => { const t=board[d.r][d.c]; return t && t.type===foeKingType && t.team!==team; });
      const _mustReachKing = !!kingDest;
      // 発動確率：王を取れるなら必ず。そうでなければ、壁が敵の大移動系の隣に残るなら0.7、通常0.3。
      const isBigMover = (q) => q && ((q.type==='gogyou' && (q.attr==='土'||q.attr==='水')) || q.type==='in' || q.type==='you');
      let blocksBigMover = false;
      for (let dr=-1; dr<=1 && !blocksBigMover; dr++) for (let dc=-1; dc<=1; dc++) {
        if (dr===0 && dc===0) continue;
        const ar=r+dr, ac=c+dc;
        if (ar<0||ar>=9||ac<0||ac>=9) continue;
        const q = board[ar][ac];
        if (q && q.team!==team && isBigMover(q)) { blocksBigMover = true; break; }
      }
      const activateThreshold = blocksBigMover ? 0.7 : 0.3;
      if (!_mustReachKing && Math.random() >= activateThreshold) continue;
      // 着地先を選ぶ：王取り最優先→敵駒/合体駒/壁を取れる手→王に最も近づくマス
      let dest = null;
      if (kingDest) dest = kingDest;
      else {
        const caps = dests.filter(d => d.capture);
        if (caps.length>0) {
          // 最も価値の高い対象を取る
          caps.sort((a,b)=>{
            const va = board[b.r][b.c] ? aiPieceValue(board[b.r][b.c]) : 5;
            const vb = board[a.r][a.c] ? aiPieceValue(board[a.r][a.c]) : 5;
            return va - vb;
          });
          dest = caps[0];
        } else {
          // 王に最も近づくマスへ
          const sorted = dests.slice().sort((a,b)=>(Math.abs(a.r-ekr)+Math.abs(a.c-ekc))-(Math.abs(b.r-ekr)+Math.abs(b.c-ekc)));
          dest = sorted[0];
        }
      }
      if (!dest) continue;
      const fromR=r, fromC=c;
      const landing = board[dest.r][dest.c];
      const destFus = getFusionAt(dest.r, dest.c);
      const destWall = getWallAt(dest.r, dest.c);
      // 合体駒・壁を破壊
      if (destFus && canCaptureFusion(p, destFus)) { destroyFusion(destFus); setLog(`青龍が合体駒【${destFus.name}】を破壊した！`); }
      if (destWall && canBreakWall(p)) removeWall(destWall.id);
      // 王取り
      if (landing && (landing.type==='ten'||landing.type==='mei')) {
        board[fromR][fromC]=null; board[dest.r][dest.c]=p;
        finishKingCapture(team, p, landing, '青龍'); return true;
      }
      // 敵駒捕獲
      if (landing && landing.team!==team) {
        logCapture(p, landing, '青龍');
        if (['tane','in','you','gogyou'].includes(landing.type) && slotsFree(team) > 0) {
          capturedPieces[team].push(makePiece(landing.type, team, landing.attr, false));
        }
      }
      // 移動し、通った道すべてに壁を残す（軌跡は常に最新の1本だけ）
      board[fromR][fromC]=null; board[dest.r][dest.c]=p;
      clearWallsOwnedBy(p);
      for (const [wr,wc] of [[fromR,fromC]].concat(dest.path || [])) {
        if (wr===dest.r && wc===dest.c) continue;                    // 着地点には置かない
        if (!board[wr][wc] && !getWallAt(wr,wc) && !getFusionAt(wr,wc)) {
          try { placeWall(p, dest.r, dest.c, wr, wc, {noLimit:true}); } catch(e){}
        }
      }
      setLog('青龍が跳躍した！');
      renderBoard();
      nextTurn();
      return true;
    }
  }
    // 術を使える駒を集める
  const casters = [];
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (!p || p.team!==team) continue;
    if (isFrozen(r,c)) continue;
    const jt = getJutsuType(p);
    if (!jt) continue;
    // 自陣では術不可
    if (isInOwnTerritory(p, r, c)) continue;
    // AIが扱う簡単な術のみ
    if (['wall','hyouketsu','uzu','kin','burrow','jutsu','swap','hitame'].includes(jt)) {
      // この駒が「今の季節に成れる未成り五行駒」か。成れるなら、術本来の条件を満たさなくても
      // 成るために術を撃つ（渦・金剛力の空撃ちを許容）。成りは季節限定のチャンスなので逃さない。
      const canPromoteNow = (p.type==='gogyou' && !p.promoted && p.attr===SEASONS[seasonIdx % 20].attr && canPromote(team));
      if (jt==='kin' && !canPromoteNow && !aiKinHasTarget(p, r, c)) continue; // 対象がいない金剛力は撃たない（成り目的なら撃つ）
      if (jt==='uzu' && !canPromoteNow) {
        // 倒せる敵を引き寄せられる場合のみ渦を候補にする（成り目的でないなら無駄撃ち防止）
        const ut = getUzuTargets(p, r, c);
        const canCatch = ut.some(([tr,tc]) => { const t = board[tr][tc]; return t && t.team !== p.team && canCapture(p, t); });
        if (!canCatch) continue;
      }
      if (jt==='wall') {
        // 壁は1体3個まで。上限に達している駒は撃たない（撃つと古い壁が消えるだけの無限ループになる）
        const ownerKey = 'pid' + p.pid;
        if (getWallsByOwner(ownerKey).length >= 3) continue;
      }
      // 同じ駒が術を連発しないようにする（術ループ防止：直前に術を使った駒はしばらく撃たない）
      if (aiLastJutsuPid[team] === p.pid && (turnCount - (aiLastJutsuTurn[team]||-99)) < 6) continue;
      casters.push({ piece:p, r, c, jt });
    }
  }
  if (casters.length===0) return false;
  // 術を使う駒をランダムに選ぶ（AI人格による選び分けは廃止済み）
  let ch = casters[Math.floor(Math.random()*casters.length)];
  aiLastJutsuPid[team] = ch.piece.pid; aiLastJutsuTurn[team] = turnCount;
  const enemy = team==='ten' ? 'mei' : 'ten';

  if (ch.jt === 'hyouketsu') {
    // 氷結：敵の五行駒/種駒を1つ凍らせる（既に凍結中ならスキップ）
    if (frozenPieces[team]) return false;
    if ((turnCount - (lastFreezeCastTurn[team] ?? -999)) < FREEZE_COOLDOWN) return false; // クールダウン中は氷結しない（チーム別）
    const targets = [];
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
      const t = board[r][c];
      if (t && t.team===enemy && (t.type==='gogyou'||t.type==='tane')) targets.push([r,c]);
    }
    if (targets.length===0) return false;
    const [tr,tc] = targets[Math.floor(Math.random()*targets.length)];
    applyFreeze(tr, tc, ch.piece);
    lastJutsuPiece = ch.piece; // 術使用（成り判定用）
    showEffectBanner('術', (ch.piece && ch.piece.promoted) ? '凍結' : '氷結');
    setLog(`氷結！${getPieceName(board[tr][tc])} を凍らせた！`);
    renderBoard();
    nextTurn();
    return true;
  }

  if (ch.jt === 'uzu') {
    // 渦：周囲2マスの敵駒を目の前へ引き寄せる
    const tgs = getUzuTargets(ch.piece, ch.r, ch.c);
    // 引き寄せた駒は目の前に来る＝次に自分で取れる相手でないと、逆に取られて自滅する。
    // そこで「この水駒が相性で倒せる敵」だけを対象にする（倒せない土・木を吸って自滅するのを防ぐ）
    const catchable = tgs.filter(([r,c]) => {
      const t = board[r][c];
      return t && t.team !== ch.piece.team && canCapture(ch.piece, t);
    });
    if (catchable.length > 0) {
      // 価値の高い敵を優先的に引き寄せる
      catchable.sort((a,b) => aiPieceValue(board[b[0]][b[1]]) - aiPieceValue(board[a[0]][a[1]]));
      const [tr,tc] = catchable[0];
      executeUzu(ch.piece, ch.r, ch.c, tr, tc);
      return true;
    }
    // 引き寄せ相手がいない場合：この水駒が今の季節に成れるなら、成るためだけに渦を空撃ちする。
    const canPromoteNow = (ch.piece.type==='gogyou' && !ch.piece.promoted &&
      ch.piece.attr===SEASONS[seasonIdx % 20].attr && canPromote(team));
    if (canPromoteNow) {
      lastJutsuPiece = ch.piece; // 術使用（成り判定用。水＝玄武への成り）
      showEffectBanner('術','渦');
      setLog('水が渦を放った！');
      renderBoard();
      nextTurn();
      return true;
    }
    return false; // 対象もなく成りもできないなら撃たない
  }

  if (ch.jt === 'wall') {
    // 壁作成：配置可能マスに1つ置く
    const cells = getWallPlaceCells(ch.piece, ch.r, ch.c).filter(([r,c]) => !board[r][c] && !getWallAt(r,c) && !getFusionAt(r,c));
    if (cells.length===0) return false;
    const [wr,wc] = cells[Math.floor(Math.random()*cells.length)];
    placeWall(ch.piece, ch.r, ch.c, wr, wc);
    lastJutsuPiece = ch.piece; // 術使用（成り判定用。木の壁＝青龍への成り）
    showEffectBanner('術','壁作成');
    setLog('壁を作成しました！');
    renderBoard();
    nextTurn();
    return true;
  }

  if (ch.jt === 'kin') {
    // 金剛力：目の前2マス（縦固定）。対象がいない場合は通常撃たないが、
    // 今の季節に成れる金の五行駒なら、成るために空撃ちする。
    const canPromoteNow = (ch.piece.type==='gogyou' && !ch.piece.promoted &&
      ch.piece.attr===SEASONS[seasonIdx % 20].attr && canPromote(team));
    if (!aiKinHasTarget(ch.piece, ch.r, ch.c) && !canPromoteNow) return false;
    executeKinNow(ch.piece, 'v', 'kin'); // 対象がいなくても発動＝lastJutsuPieceがセットされ成る
    renderBoard();
    return true;
  }

  if (ch.jt === 'burrow') {
    const hiddenInfo = { piece: ch.piece, origRow: ch.r, origCol: ch.c, team, isBonusAppear:false };
    board[ch.r][ch.c] = null;
    hiddenTsuchi.push(hiddenInfo);
    lastJutsuPiece = ch.piece; // 術使用（成り判定用）
    try { flashEffect([[ch.r,ch.c]], 'hide', '潜'); } catch(e){}
    const season = SEASONS[seasonIdx % 20];
    if (season.attr === '土') {
      const key = `tsuchi_${ch.r}_${ch.c}_${team}`;
      const year = Math.floor(seasonIdx / 20);
      if (!tsuchiBurrowCount[key] || tsuchiBurrowCount[key].year !== year) tsuchiBurrowCount[key] = { count:0, year };
      tsuchiBurrowCount[key].count++;
    }
    showEffectBanner('術','潜伏');
    setLog('土が潜伏した！');
    renderBoard();
    nextTurn();
    return true;
  }

  if (ch.jt === 'jutsu') {
    const warpCells = getSuzakuWarpCells(team).filter(([r,c]) => !board[r][c]);
    if (warpCells.length===0) return false;
    let ekr=-1, ekc=-1;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const p=board[r][c]; if(p&&p.type===(team==='ten'?'mei':'ten')){ekr=r;ekc=c;} }
    warpCells.sort((a,b)=>(Math.abs(a[0]-ekr)+Math.abs(a[1]-ekc))-(Math.abs(b[0]-ekr)+Math.abs(b[1]-ekc)));
    const [wr,wc] = warpCells[0];
    board[ch.r][ch.c] = null;
    board[wr][wc] = ch.piece;
    const burnedAi = getWallAt(wr, wc);
    if (burnedAi) removeWall(burnedAi.id);
    try { flashEffect([[wr,wc]], 'destroy', '焼'); } catch(e){}
    showEffectBanner('術','朱雀飛翔');
    setLog('朱雀が壁へ飛翔し、その壁を焼き払った！');
    renderBoard();
    nextTurn();
    return true;
  }

  if (ch.jt === 'swap') {
    // 麒麟の入替：盤上の麒麟と、敵王に最も近づける味方を入れ替える（印不要）
    // ch.r/ch.c が麒麟の位置
    const kr = ch.r, kc = ch.c;
    const kirinPiece = board[kr][kc];
    if (!kirinPiece || kirinPiece.type!=='gogyou' || kirinPiece.attr!=='土' || !kirinPiece.promoted) return false;
    // 敵王の位置を探す
    const foeKing = team==='ten' ? 'mei' : 'ten';
    let ekr=-1, ekc=-1;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++){ if(board[r][c]&&board[r][c].type===foeKing){ekr=r;ekc=c;} }
    // 味方の駒（麒麟以外）の中で、麒麟がそこへ移ると敵王に最も近づくものを選ぶ
    let best=null, bestDist=Infinity;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++){
      const q=board[r][c];
      if (!q || q.team!==team) continue;
      if (r===kr && c===kc) continue;
      if (q.type==='ten'||q.type==='mei') continue; // 王とは入れ替えない
      if (getFusionAt(r,c)) continue;               // 合体駒が重なっているマスへは入れ替えない
      const d = ekr<0 ? 0 : (Math.abs(r-ekr)+Math.abs(c-ekc));
      if (d < bestDist) { bestDist=d; best=[r,c]; }
    }
    if (!best) return false;
    const [mr, mc] = best;
    const markPiece = board[mr][mc];
    board[kr][kc] = markPiece;
    board[mr][mc] = kirinPiece;
    // 入れ替わった種駒は初期位置からずれるため、初手2マス移動を封じる
    if (markPiece && markPiece.type === 'tane') markPiece.hasMoved = true;
    // 入れ替え完了時に演出（麒麟＝土）
    if (window.AGX) {
      if (window.AGX.SE.roar) window.AGX.SE.roar('土');
      flashScreen('土');
    }
    showEffectBanner('術','麒麟入替');
    setLog('麒麟が味方と位置を入れ替えた！');
    renderBoard();
    nextTurn();
    return true;
  }

  if (ch.jt === 'hitame') {
    const hiKey = hiKeyOf(ch.piece);
    const stack = hiKey ? (hiStackCount[hiKey] || 0) : 0;
    // 炎が溜まっていれば連続移動を使う、なければ炎を溜める（簡易版）
    if (stack > 0) {
      // 火の桂馬移動：敵を取れるなら取る、なければ敵王へ近づく
      let res; try { res = getHiMoves(ch.piece, ch.r, ch.c); } catch(e){ res={moves:[],captures:[]}; }
      const caps = res.captures || [];
      const movs = res.moves || [];
      // 敵王位置
      let ekr=-1, ekc=-1;
      for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const p=board[r][c]; if(p&&p.type===(team==='ten'?'mei':'ten')){ekr=r;ekc=c;} }
      let dest = null;
      if (caps.length > 0) {
        dest = caps[0]; // 取れる敵を優先
      } else if (movs.length > 0) {
        // 敵王に最も近づくマス
        movs.sort((a,b)=>(Math.abs(a[0]-ekr)+Math.abs(a[1]-ekc))-(Math.abs(b[0]-ekr)+Math.abs(b[1]-ekc)));
        dest = movs[0];
      }
      if (!dest) return false;
      const [dr,dc] = dest;
      const captured = board[dr][dc];
      // 王を取ったら捕獲ログ＋勝敗はnextTurn冒頭のcheckKingCapturedで処理
      if (captured && captured.team!==team) logCapture(ch.piece, captured, '炎溜め');
      board[dr][dc] = ch.piece;
      board[ch.r][ch.c] = null;
      lastMove = { from:[ch.r,ch.c], to:[dr,dc] };
      hiStackCount[hiKey] = 0; // 炎を消費
      showEffectBanner('術','溜め消費');
      setLog('火が跳んだ！');
      renderBoard();
      nextTurn();
      return true;
    } else {
      // 炎を溜める前に、暴発したときの損得を確認する。
      // 時限0のフル暴発は「周囲8マスを敵味方問わず破壊」なので、
      // 味方に囲まれて敵がいない場所で溜めると自軍が壊滅する（自爆事故）。
      let aroundFoe = 0, aroundAlly = 0;
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
        if (!dr && !dc) continue;
        const rr = ch.r+dr, cc = ch.c+dc;
        if (rr<0||rr>=9||cc<0||cc>=9) continue;
        const q = board[rr][cc];
        if (!q) continue;
        if (q.team===team) aroundAlly++; else aroundFoe++;
      }
      // 2マス以内に敵がいれば、跳んで近づいてから暴発させる目もあるので許容する
      let foeNear = 0;
      for (let dr=-2; dr<=2; dr++) for (let dc=-2; dc<=2; dc++) {
        const rr = ch.r+dr, cc = ch.c+dc;
        if (rr<0||rr>=9||cc<0||cc>=9) continue;
        const q = board[rr][cc];
        if (q && q.team!==team) foeNear++;
      }
      // 味方が多く敵がいない場所では溜めない（別の手を選ぶ）
      if (aroundAlly >= 2 && aroundFoe === 0 && foeNear === 0) return false;
      if (aroundAlly > 0 && aroundAlly > aroundFoe && foeNear === 0) return false;
      // 炎を溜める
      hiStackCount[hiKey] = (hiStackCount[hiKey] || 0) + 1;
      hiFuseTimer[hiKey] = HI_FUSE_TURNS; // 時限：この手数後に強制暴発
      lastJutsuPiece = ch.piece; // 術使用（成り判定用）
      try { flashEffect([[ch.r,ch.c]], 'fire', '炎'); } catch(e){}
      showEffectBanner('術','炎溜め');
      setLog(`炎を溜めた！`);
      renderBoard();
      nextTurn();
      return true;
    }
  }

  return false;
}

// AI: 持ち駒を打つ
function aiTryPlaceCaptured(team) {
  const list = capturedPieces[team];
  if (list.length===0) return false;

  // === 最優先：奪った種駒を、盤上の同属性・自分の種駒に重ねて五行駒を作る ===
  // （成りを待たずに強力な五行駒を得られるお得な手。AIも積極的に狙う）
  for (let i=0;i<list.length;i++) {
    const hp = list[i];
    if (hp.type!=='tane') continue;
    // 盤上に同属性・自分の種駒があるか探す
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
      const q = board[r][c];
      if (q && q.team===team && q.type==='tane' && q.attr===hp.attr &&
          !getWallAt(r,c) && !getFusionAt(r,c)) {
        // ここに挿して五行駒化
        board[r][c] = makePiece('gogyou', team, hp.attr, false);
        list.splice(i, 1);
        lastMove = { from:null, to:[r,c] };
        pendingSummonFx = { r, c, name: getPieceName(board[r][c]) };
        showEffectBanner('合体', hp.attr+'の五行駒');
        setLog(`${hp.attr}の種駒2つが合体して${hp.attr}の五行駒になった！`);
        renderBoard();
        nextTurn();
        return true;
      }
    }
  }

  // 打てる持ち駒（無駒は打てないゴミなので除外）のインデックスから選ぶ
  const usable = [];
  for (let i=0;i<list.length;i++) if (list[i].type!=='mu') usable.push(i);
  if (usable.length===0) return false;
  const idx = usable[Math.floor(Math.random()*usable.length)];
  const p = list[idx];
  // 配置可能マスを集める（敵陣にも打てる。打った直後に動けなくなる位置は除く）
  const cells = [];
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    if (board[r][c] || getWallAt(r,c) || getFusionAt(r,c)) continue;
    if (!canDropAt({ ...p, team }, r, c)) continue; // 二歩・行き所のない駒をまとめて判定
    if (p.type==='tane' && isUchifuzume(r, c, team, p.attr)) continue;
    cells.push([r,c]);
  }
  if (cells.length===0) return false;
  // 敵王に近いマスを優先して打つ（盤上の駒だけで寄せようとして手詰まりになるのを防ぐ）。
  // ただし打った瞬間に取られる位置は避ける。
  let ekr=-1, ekc=-1;
  const foeTeam = team==='ten' ? 'mei' : 'ten'; // 相手チーム（王のtypeも同じ文字列）
  for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const q=board[r][c]; if(q&&q.type===foeTeam){ekr=r;ekc=c;} }
  // 打ち込みの位置取り：
  // ・王の隣に打つと王自身に取られるだけなので、密着は避けて「少し離した」位置に置く
  // ・敵の利きがあるマスは原則避ける（味方が支えているなら許容）
  // ・理想は敵王から3マス前後（次の手で寄せに使える距離）
  const isDefended = (r,c) => {
    // 自軍のいずれかの駒がそのマスに利いていれば「支えあり」
    for (let r2=0;r2<9;r2++) for (let c2=0;c2<9;c2++) {
      const q = board[r2][c2];
      if (!q || q.team!==team) continue;
      let res; try { res = getMoves(q, r2, c2, board); } catch(e) { continue; }
      const all = (res.moves||[]).concat(res.captures||[]);
      if (all.some(([a2,b2]) => a2===r && b2===c)) return true;
    }
    return false;
  };
  let scored = cells.map(([r,c]) => {
    let sc = 0;
    const d = (ekr>=0) ? (Math.abs(r-ekr) + Math.abs(c-ekc)) : 99;
    if (ekr>=0) {
      if (d <= 1) sc -= 500;                 // 王に密着＝王に取られる。ほぼ選ばない
      else if (d === 2) sc -= 40;            // まだ近すぎる
      else sc -= Math.abs(d - 3) * 6;        // 3マス前後が理想
    }
    let danger = false;
    try { danger = aiSquareAttackedBy(r, c, foeTeam, null); } catch(e) { danger = false; }
    if (danger) sc -= isDefended(r,c) ? 60 : 300; // 取られる位置は避ける（支えがあれば許容の余地）
    return { r, c, sc: sc + Math.random()*4 };
  });
  scored.sort((a,b)=>b.sc-a.sc);
  const pick = scored[0];
  const pr = pick.r, pc = pick.c;
  board[pr][pc] = dropResultPiece(p, pr, pc, team); // 種駒は敵陣なら五行駒として登場
  lastMove = { from:null, to:[pr,pc] };
  pendingSummonFx = { r:pr, c:pc, name: getPieceName(board[pr][pc]) };
  list.splice(idx, 1);
  setLog(`${getPieceName(board[pr][pc])}を打った。`);
  renderBoard();
  nextTurn();
  return true;
}

// 王手回避：その手を指した後、自分の王が王手されていないか
function aiMoveEscapesCheck(m, team) {
  const saved = board;
  const b = board.map(row => row.slice());
  const p = b[m.fromR][m.fromC];
  if (!p) { return true; }
  b[m.toR][m.toC] = p; b[m.fromR][m.fromC] = null;
  board = b;
  let chk = false;
  try { chk = isKingInCheck(team); } catch(e) { chk = false; }
  board = saved;
  return !chk;
}
function aiDoMove() {
  const team = currentTeam;
  // 玄武は手番開始時にいったん通常モード（全方向1マス・倒せる）へ戻す。
  // 切替は手番を消費しないので合法。スライドが有利ならこの後 aiTryJutsu 内で改めて切り替える。
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (p && p.team===team && p.type==='gogyou' && p.attr==='水' && p.promoted) p.genbuSlide = false;
  }
  // 潜伏中の土の出現待ちがあれば、AIが自分で出現先を決める（人間に選ばせない）
  if (tsuchiAppearMode && isAIControlled(tsuchiAppearMode.team) && tsuchiAppearMode.team===team) {
    const hidden = tsuchiAppearMode;
    const cells = getTsuchiAppearCells(hidden);
    if (cells && cells.length > 0) {
      const pick = aiPickTsuchiAppear(hidden, cells);
      aiThinking = false;
      doTsuchiAppearAt(hidden, pick[0], pick[1], pick[2]);
      if (hidden.isBonusAppear) return; // nextTurn済み
    } else { tsuchiAppearMode = null; }
  }
  // 太極の成り付与が保留中ならAIが処理（自分の駒を1つ成らせる）
  if (taikyokuGrantAvailable === team) {
    aiHandleTaikyoku(team);
    // 成らせた後も通常の手は指せるので継続
  }
  // 玄極の無化が保留中ならAIが処理（相手の駒を1つ無にする）
  if (genkyokuMuAvailable === team) {
    aiHandleGenkyoku(team);
    // 無化した後も通常の手は指せるので継続
  }
  // 水晶の相手駒操作が保留中ならAIが処理
  if (suishouActive === team) {
    aiThinking = false; // フラグ解除（aiHandleSuishouがnextTurnを呼ぶ）
    aiHandleSuishou(team);
    return; // 水晶で1手消費
  }
  // 確率で特殊行動（術・合体・持ち駒打ち）を試みる。実行したらターン終了。
  // ただし王手されている時は、まず王手回避を最優先（特殊行動で別の場所に動かない）
  const inCheck = (typeof isKingInCheck==='function') ? isKingInCheck(team) : false;
  // 【最優先】相手の王を取れる手があるなら、術も合体も後回しにして即座に勝ちを取る。
  // 以前は術・合体を先に確率で試していたため、勝てる局面を逃していた。
  {
    const winMoves = aiCollectMoves(team).filter(m => {
      const t = board[m.toR] && board[m.toR][m.toC];
      return t && t.team !== team && (t.type === 'ten' || t.type === 'mei');
    });
    if (winMoves.length > 0) {
      const w = winMoves[0];
      const wp = board[w.fromR][w.fromC];
      aiThinking = false;
      aiRecordMove(team, wp, w.fromR, w.fromC, w.toR, w.toC);
      const endedWin = executeMove(w.fromR, w.fromC, w.toR, w.toC, wp);
      renderBoard();
      if (!endedWin) nextTurn();
      return;
    }
  }
  // 特殊行動は内部でnextTurnを呼ぶため、先にフラグを下げておく
  aiThinking = false;
  if (!inCheck && aiTrySpecialAction(team)) return;
  aiThinking = true; // 特殊行動しなかった場合は通常移動へ（フラグ戻す）
  let moves = aiCollectMoves(team);
  if (inCheck) {
    // 王手を解消できる手だけに絞る
    const safe = moves.filter(m => aiMoveEscapesCheck(m, team));
    if (safe.length > 0) {
      moves = safe;
    } else {
      // 通常手では逃げられない → 特殊行動で助かるか最後に試す
      aiThinking = false;
      if (aiTrySpecialAction(team)) return;
      aiThinking = true;
    }
  }
  if (moves.length === 0) {
    aiThinking = false;
    nextTurn();
    return;
  }
  const best = aiChooseMove(moves, team);
  // 相打ちを選んだ場合：両方の種駒を破壊してターン終了
  if (best.kind === 'aiuchi') {
    const aName = board[best.fromR][best.fromC] ? getPieceName(board[best.fromR][best.fromC]) : '種';
    const vName = board[best.toR][best.toC] ? getPieceName(board[best.toR][best.toC]) : '種';
    board[best.fromR][best.fromC] = null;
    board[best.toR][best.toC] = null;
    aiThinking = false;
    setLog('相打ち！両方の種駒が砕け散った。');
    if (window.AGX && window.AGX.SE.damage) window.AGX.SE.damage();
    renderBoard();
    try {
      showCaptureEffect(best.fromR, best.fromC, aName);
      showCaptureEffect(best.toR, best.toC, vName);
    } catch(e){}
    // 相打ち：両マスを紫で強調（次の手まで残る）
    lastCaptureHighlight = { cells: [[best.fromR,best.fromC],[best.toR,best.toC]], team: null, turn: turnCount };
    nextTurn();
    return;
  }
  const piece = board[best.fromR][best.fromC];
  aiRecordMove(team, piece, best.fromR, best.fromC, best.toR, best.toC); // いたちごっこ抑制用の履歴
  const ended = executeMove(best.fromR, best.fromC, best.toR, best.toC, piece);
  aiThinking = false;
  if (ended) { renderBoard(); return; }
  // 奪う選択はAIは常に奪う
  if (pendingCaptureChoice) {
    const info = pendingCaptureChoice;
    pendingCaptureChoice = null;
    if (slotsFree(info.team) > 0) {
      capturedPieces[info.team].push(makePiece(info.type, info.team, info.attr, false));
    }
  }
  const movedPiece = board[best.toR][best.toC];
  renderBoard();
  if (movedPiece && hasBonusAction(movedPiece, team)) {
    actionPhase = 'bonus'; bonusPiece = [best.toR, best.toC];
    setTimeout(() => aiDoBonus(best.toR, best.toC), 400);
    return;
  }
  nextTurn();
}

function aiDoBonus(br, bc) {
  const p = board[br][bc];
  if (!p) { actionPhase='main'; bonusPiece=null; nextTurn(); return; }
  let res;
  try { res = getBonusMoves(p, br, bc, board); } catch(e){ res={moves:[],captures:[]}; }
  const all = [...(res.captures||[]), ...(res.moves||[])];
  if (all.length === 0) { actionPhase='main'; bonusPiece=null; nextTurn(); return; }
  // ボーナス移動もきちんと評価して選ぶ（旧実装はランダムだったため、
  // 直前に進んだ駒をそのまま元の位置へ戻す＝手番を捨てる無意味な動きが出ていた）
  const team = p.team;
  const hist = aiRecentMoves[team] || [];
  const lastMv = hist.length ? hist[hist.length-1] : null; // このターンの本移動
  // 王を取れるボーナス移動があれば、他の評価を待たず必ずそれを選ぶ（勝ち逃し防止）
  {
    let killer = null;
    for (const [tr, tc] of all) {
      const t = board[tr][tc];
      if (t && t.team!==team && (t.type==='ten' || t.type==='mei')) { killer = [tr, tc]; break; }
    }
    if (killer) {
      aiRecordMove(team, p, br, bc, killer[0], killer[1]);
      const endedK = executeMove(br, bc, killer[0], killer[1], p);
      if (!endedK) ryuTrailWallAt(p, br, bc); // 青龍：ボーナス移動でも軌跡の壁を残す
      bonusPiece=null; actionPhase='main';
      renderBoard();
      if (!endedK) nextTurn();
      return;
    }
  }
  let pick = null, bestSc = -Infinity;
  for (const [tr, tc] of all) {
    const mv = { fromR:br, fromC:bc, toR:tr, toC:tc, kind:(board[tr][tc]?'capture':'move'), piece:p };
    let sc;
    try { sc = aiEvalMove(mv); } catch(e) { sc = 0; }
    // 直前の本移動で出発したマスへ戻る＝前進を打ち消す無意味な手。強く避ける。
    if (lastMv && lastMv.key===aiPieceKey(p) && lastMv.fromR===tr && lastMv.fromC===tc) sc -= 2000;
    if (sc > bestSc) { bestSc = sc; pick = [tr, tc]; }
  }
  if (!pick) pick = all[0];
  // 良い手が無い（全て自陣へ後退するだけ等）ならボーナスを使わずに手番を終える
  if (bestSc <= -1500) { bonusPiece=null; actionPhase='main'; setLog('季節ボーナスは見送った'); renderBoard(); nextTurn(); return; }
  aiRecordMove(team, p, br, bc, pick[0], pick[1]); // ボーナス移動も履歴に残す（往復抑制）
  const ended = executeMove(br, bc, pick[0], pick[1], p);
  if (!ended) ryuTrailWallAt(p, br, bc); // 青龍：ボーナス移動でも軌跡の壁を残す
  bonusPiece=null; actionPhase='main';
  if (pendingCaptureChoice) {
    const info = pendingCaptureChoice; pendingCaptureChoice = null;
    if (slotsFree(info.team) > 0) capturedPieces[info.team].push(makePiece(info.type, info.team, info.attr, false));
  }
  renderBoard();
  if (!ended) nextTurn();
}

// ===== 待った（1手戻す）: ローカル対戦のみ。オンラインは同期が崩れるため無効 =====
let undoStack = []; // 各手番開始時のスナップショット
function snapshotForUndo() {
  const s = onlineGetState();
  s.__lastMove = lastMove ? { from: lastMove.from ? [...lastMove.from] : null, to: [...lastMove.to] } : null;
  return s;
}
function pushUndoSnapshot() {
  if (onlineMode) return;
  try { undoStack.push(snapshotForUndo()); if (undoStack.length > 20) undoStack.shift(); } catch(e){}
}
function isHumanTeam(team) {
  if (team === 'mei' && aiEnabled) return false;
  if (team === 'ten' && autoTen) return false;
  return true;
}
function undoTargetIndex() {
  // 現手番開始 = undoStack末尾。その手前で「人間の手番開始」を探す
  for (let i = undoStack.length - 2; i >= 0; i--) {
    if (isHumanTeam(undoStack[i].currentTeam)) return i;
  }
  return -1;
}
function canUndo() {
  if (onlineMode || puzzleMode || gamePhase !== 'playing' || aiThinking) return false;
  if (autoTen && aiEnabled) return false; // 完全AI対戦では待ったなし
  return undoTargetIndex() >= 0;
}
function applyUndoSnapshot(s) {
  board = s.board.map(row => row.map(cell => cell ? { ...cell } : null));
  capturedPieces = { ten: s.capturedPieces.ten.map(p=>({...p})), mei: s.capturedPieces.mei.map(p=>({...p})) };
  capturedPlacedCount = { ...s.capturedPlacedCount };
  fusionPieces = { ten: s.fusionPieces.ten.map(f=>({...f, cells: f.cells?f.cells.map(x=>[...x]):undefined})), mei: s.fusionPieces.mei.map(f=>({...f, cells: f.cells?f.cells.map(x=>[...x]):undefined})) };
  wallPieces = s.wallPieces.map(w=>({...w}));
  seasonIdx = s.seasonIdx; currentTeam = s.currentTeam; turnCount = s.turnCount; gamePhase = s.gamePhase;
  hiStackCount = { ...s.hiStackCount };
  kirinMark = JSON.parse(JSON.stringify(s.kirinMark || {}));
  taikyokuLastGrant = { ...s.taikyokuLastGrant };
  // 保存時の値をそのまま復元する（nullや未合体の状態にも正しく戻す）
  if (typeof lastFusionSeasonIdx !== 'undefined') {
    lastFusionSeasonIdx = s.lastFusionSeasonIdx
      ? { ten: s.lastFusionSeasonIdx.ten ?? null, mei: s.lastFusionSeasonIdx.mei ?? null }
      : { ten: null, mei: null };
  }
  frozenPieces = s.frozenPieces ? { ten: s.frozenPieces.ten?{...s.frozenPieces.ten}:null, mei: s.frozenPieces.mei?{...s.frozenPieces.mei}:null } : { ten:null, mei:null };
  hiddenTsuchi = (s.hiddenTsuchi || []).map(h => ({ ...h, piece: h.piece ? { ...h.piece } : null }));
  tsuchiBurrowCount = JSON.parse(JSON.stringify(s.tsuchiBurrowCount || {}));
  // 操作途中の状態は全てリセット
  selectedCell = null; actionMode = 'move'; actionPhase = 'main'; bonusPiece = null;
  wallPlaceMode = false; ryuMoveState = null; genbuMoveState = null; hiMoveState = null;
  fusionFlowState = null; fusionBaseSelect = null; suishouActive = null; suishouMoveState = null;
  taikyokuGrantAvailable = null; genkyokuMuAvailable = null; kirinMarkMode = null; tsuchiAppearMode = null;
  capturedSelectedIdx = null; pendingCaptureChoice = null; aiThinking = false;
  lastMove = s.__lastMove || null;
  renderBoard(); renderCapturedPanel(); updateUI();
}
function doUndo() {
  if (!canUndo()) return;
  const i = undoTargetIndex();
  if (i < 0) return;
  const s = undoStack[i];
  undoStack.length = i + 1; // 戻した局面を末尾に
  applyUndoSnapshot(s);
  if (window.AGX) window.AGX.SE.ui();
  setLog('待った：直前の手を戻しました。もう一度どうぞ。');
}

// ===== 中断・再開（自動保存）: ローカル対戦（AI・2人）のみ。オンラインは保存しない =====
const SAVE_KEY = 'ogx_savegame';
function autoSaveGame() {
  if (onlineMode || puzzleMode || gamePhase !== 'playing') return;
  try {
    const s = snapshotForUndo();
    s.__aiEnabled = aiEnabled;
    s.__autoTen = autoTen;
    s.__savedAt = Date.now();
    localStorage.setItem(SAVE_KEY, JSON.stringify(s));
  } catch(e){}
}
function clearSavedGame() { try { localStorage.removeItem(SAVE_KEY); } catch(e){} }
function getSavedGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || !s.board || s.gamePhase !== 'playing') return null;
    return s;
  } catch(e){ return null; }
}
function resumeSavedGame() {
  const s = getSavedGame();
  if (!s) return;
  onlineMode = false;
  aiEnabled = !!s.__aiEnabled;
  autoTen = !!s.__autoTen;
  initGameLog(); if (aiEnabled && gameLog) gameLog.isAI = true;
  applyUndoSnapshot(s); // board/captured/fusion/season/currentTeam/gamePhase 等を復元
  gamePhase = 'playing';
  // 画面表示切替
  if (typeof hideTitleScreen === 'function') hideTitleScreen();
  const ss = document.getElementById('setup-screen'); if (ss) ss.style.display = 'none';
  const bw = document.getElementById('board-wrap'); if (bw) bw.style.display = 'block';
  const ti = document.getElementById('turn-info'); if (ti) ti.style.display = 'block';
  const sb = document.getElementById('season-bar'); if (sb) sb.style.display = 'flex';
  const autoBtn = document.getElementById('auto-ten-btn');
  if (autoBtn) { autoBtn.style.display = aiEnabled ? '' : 'none'; autoBtn.textContent = '天オート：' + (autoTen ? 'ON' : 'OFF'); }
  setGameChrome(true);
  undoStack = []; pushUndoSnapshot();
  renderBoard(); updateUI();
  setLog('前回の対局を再開しました。');
  if (window.AGX) window.AGX.startBGM();
  if (isAITurn()) setTimeout(() => aiPlayTurn(), 500);
}

function nextTurn() {
  // デバッグ：この手を棋譜に記録し、盤面の異常を検知（異常検知はパネルON時のみ）
  recordMove();
  detectAnomalies();
  if (debugPanelOn) renderDebugPanel();
  // 五神への成り：直近に術を使った五行駒が対応季節なら、1回で成れる（任意）
  if (lastJutsuPiece) {
    const p = lastJutsuPiece; lastJutsuPiece = null;
    if (isJutsuPromotable(p)) {
      if (onlineMode || isAIControlled(p.team)) {
        applyGoshinPromotion(p); // オンライン・AIは自動で成る
      } else {
        // 人間：成るか選んでもらい、選択後にターン処理を続行
        showPromotionChoice(p, () => nextTurn());
        return;
      }
    }
  }
  // 練習モード：勝敗・AI・季節進行なし。常に天の手番を保持して自由に試せる
  if (practiceMode) {
    checkFreezeExpire();
    checkFusionExpire();
    checkHiExplode(); // 炎溜めの暴発は練習で見せたいので実行
    kouzanActive = null; suishouActive = null; suishouMoveState = null;
    actionPhase='main'; bonusPiece=null; selectedCell=null; wallPlaceOrigin=null; previewCell=null;
    actionMode='move'; wallPlaceMode=false; ryuMoveState=null; genbuMoveState=null; hiMoveState=null;
    fusionFlowState=null; fusionBaseSelect=null;
    lastFreezeCastTurn={ten:-999,mei:-999}; lastUzuCastTurn={ten:-999,mei:-999}; // 練習では術を常に使える
    currentTeam='ten'; turnCount++; // クールダウン等は進むが季節は固定
    showModeButtons(null); renderBoard(); updateUI();
    // 潜伏した土駒の再出現（練習でも一巡できるように）
    if (!tsuchiAppearMode) {
      const toAppear = hiddenTsuchi.filter(h => h.team === currentTeam && !h.isBonusAppear && !h.waitingAppear);
      if (toAppear.length > 0) { toAppear[0].waitingAppear = true; setTimeout(() => enableTsuchiAppear(toAppear[0]), 100); }
    }
    return;
  }
  // 詰め問題モード：王を取れなかった手はここで判定
  if (puzzleMode) { onPuzzleMoveResolved(); return; }
  // 中断・再開（自動保存）はnextTurn末尾で行う
  // 王が取られていたら勝敗確定（術・効果など全経路をカバー）
  if (checkKingCaptured()) return;
  currentTeam = currentTeam==='ten' ? 'mei' : 'ten';
  turnCount++;
  // 200ターン上限：駒数（盤上＋持ち駒、王・合体駒含む）が多い方の勝ち、同数は引き分け
  if (turnCount >= MAX_TURNS) {
    if (checkTurnLimit()) return;
  }
  if (turnCount % 2 === 0) { seasonIdx++; if (window.AGX) window.AGX.SE.season(); } // 2ターンで季節1つ進む
  checkFreezeExpire();
  checkFusionExpire();
  checkHiExplode(); // 保持中の炎溜めの暴発判定（毎ターン+5%）
  kouzanActive = null; suishouActive = null; suishouMoveState = null; // 効果はターンごとにリセット
  actionPhase='main'; bonusPiece=null; selectedCell=null; wallPlaceOrigin=null; previewCell=null;
  actionMode='move'; wallPlaceMode=false; ryuMoveState=null; genbuMoveState=null; hiMoveState=null;
  fusionFlowState=null; fusionBaseSelect=null;
  // 合体駒の自分ターン開始効果
  const fusionResult = triggerFusionTurnStart(currentTeam);
  showModeButtons(null);
  renderBoard();
  updateUI();
  // 樹海：このチームのターンをスキップ（何もさせず、手番を相手＝樹海の持ち主に戻す）
  if (fusionResult.skipTurn) {
    setLog(currentTeam==='ten' ? '天側は樹海でスキップされた！' : '冥側は樹海でスキップされた！');
    aiThinking = true; // スキップ中は盤操作・AI起動を止める
    setTimeout(() => { aiThinking = false; nextTurn(); }, 900);
    return; // ★重要：AI起動・入力受付・土出現・保存などをこの手番では行わない
  }
  setLog(currentTeam==='ten' ? '天側の番です。' : '冥側の番です。');
  // 潜伏中の土駒で現チームの出現待ちをポップアップ
  if (!tsuchiAppearMode) {
    const toAppear = hiddenTsuchi.filter(h =>
      h.team === currentTeam && !h.isBonusAppear && !h.waitingAppear
    );
    if (toAppear.length > 0) {
      toAppear[0].waitingAppear = true; // 出現待ちフラグ（重複防止）
      setTimeout(() => enableTsuchiAppear(toAppear[0]), 100);
    } else {
      checkKirinRemarkPrompt();
    }
  } else {
    checkKirinRemarkPrompt();
  }
  // オンライン対局：手番が相手に移ったので、確定状態を相手に送る
  // （currentTeamは既に切替後。今から相手＝onlineMyTeam以外の番なら、自分が指し終えた）
  if (onlineMode && onlineConnected && !onlineApplying) {
    onlineSendState();
    onlineUpdateTurnUI();
  }
  // 待った用：新しい手番の開始局面を記録
  pushUndoSnapshot();
  // 中断・再開：現局面を自動保存（オンライン以外）
  autoSaveGame();
  // AI起動：冥AI または 天オートの手番なら
  if (isAITurn()) {
    setTimeout(() => aiPlayTurn(), 300);
  }
}

// 土用ターン開始時、麒麟がいればマーキング変更を選べるポップアップを出す
function checkKirinRemarkPrompt() {
  const season = SEASONS[seasonIdx % 20];
  if (season.attr !== '土') return;
  // 盤上に自軍の麒麟がいるか
  let kirinPos = null;
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (p && p.team===currentTeam && p.type==='gogyou' && p.attr==='土' && p.promoted) {
      kirinPos = [r,c];
    }
  }
  if (!kirinPos) return;
  if (!kirinMark[currentTeam]) return; // まだマーキングしていない場合は対象外
  // AIの手番なら自動でマーキング変更を判断（ポップアップを出さない）
  if (isAITurn()) {
    aiRemarkKirin(kirinPos, currentTeam);
    return;
  }
  setTimeout(() => showKirinRemarkPopup(kirinPos, currentTeam), 150);
}

// AI: 麒麟のマーキング対象を自動で決める（30%で別の駒に付け替え、それ以外は維持）
function aiRemarkKirin(kirinPos, team) {
  if (Math.random() < 0.3) {
    const [kr,kc] = kirinPos;
    const cands = [];
    for (let r=0;r<9;r++) for (let c=0;c<9;c++){
      const p=board[r][c];
      if (p && p.team===team && !(r===kr&&c===kc) && p.type!=='ten' && p.type!=='mei' && !getFusionAt(r,c)) cands.push([r,c]);
    }
    if (cands.length>0) {
      const [mr,mc]=cands[Math.floor(Math.random()*cands.length)];
      kirinMark[team] = { kirinRow:kr, kirinCol:kc, markRow:mr, markCol:mc, markPid: (board[mr][mc]||{}).pid };
    }
  }
  // マーキングを変えても変えなくても、ターンは既に進行中なので何もしない（試合継続）
}

    return b;
  };

    // 第1階層：陣営選択
    crumb.appendChild(mkCrumbBtn('陣営を選択', null, true));

      btn.onclick = () => { debugNavState = { team }; renderDebugNav(); };
      sel.appendChild(btn);
    });

    appendEraserButton(sel);
    return;
  }

  if (!debugNavState.category) {
    // 第2階層：カテゴリ選択
    const { team } = debugNavState;
    crumb.appendChild(mkCrumbBtn('陣営を選択', () => { debugNavState = null; renderDebugNav(); }, false));
    crumb.appendChild(document.createTextNode(' › '));
    crumb.appendChild(mkCrumbBtn(team==='ten'?'天陣営':'冥陣営', null, true));

    DEBUG_TREE[team].forEach(group => {
      const btn = document.createElement('button');
      btn.className = 'debug-piece-btn';
      btn.textContent = group.category;
      btn.style.borderColor = team==='ten' ? 'rgba(200,150,12,0.5)' : 'rgba(150,150,160,0.5)';
      btn.onclick = () => { debugNavState = { team, category: group.category }; renderDebugNav(); };
      sel.appendChild(btn);
    });
    appendEraserButton(sel);
    return;
  }

  // 第3階層：個別駒選択
  const { team, category } = debugNavState;
  crumb.appendChild(mkCrumbBtn('陣営を選択', () => { debugNavState = null; renderDebugNav(); }, false));
  crumb.appendChild(document.createTextNode(' › '));
  crumb.appendChild(mkCrumbBtn(team==='ten'?'天陣営':'冥陣営', () => { debugNavState = { team }; renderDebugNav(); }, false));
  crumb.appendChild(document.createTextNode(' › '));

function onDebugCellClick(row, col) {
  if (!debugSelectedPiece) {
    document.getElementById('debug-log').textContent = '先に駒を選んでください';
    return;
  }
  if (debugSelectedPiece === 'erase') {
    board[row][col] = null;
    // 合体駒も消去（占有マスのどこかをタップ）
    const fus = getFusionAt(row, col);
    if (fus) destroyFusion(fus);
  } else if (debugSelectedPiece.type === 'fusion') {
    // 合体駒：タップ位置をプレイヤー視点の左上として2×2配置
    // 天はタップ位置=実盤面の左上、冥はタップ位置=実盤面の右下
    const def = debugSelectedPiece.fusionDef;
    let topRow, leftCol;
    if (debugSelectedPiece.team === 'ten') {
      topRow = row; leftCol = col;
    } else {
      topRow = row-1; leftCol = col-1; // 冥視点の左上=実盤面の右下
    }
    if (topRow<0 || leftCol<0 || topRow+1>=9 || leftCol+1>=9) {
      document.getElementById('debug-log').textContent = 'その位置には合体駒を置けません（盤からはみ出します）';
      return;
    }
    // 占有マスの既存駒・合体駒をクリア
    const cells = [[topRow,leftCol],[topRow,leftCol+1],[topRow+1,leftCol],[topRow+1,leftCol+1]];
    cells.forEach(([r,c]) => {
      board[r][c] = null;
      const ex = getFusionAt(r,c);
      if (ex) destroyFusion(ex);
    });
    fusionPieces[debugSelectedPiece.team].push({
      name: def.name, team: debugSelectedPiece.team,
      baseAttr: def.baseAttr, baseType: def.baseType,
      topRow, leftCol, createdSeasonIdx: seasonIdx,
    });
    document.getElementById('debug-log').textContent = `${def.name}を配置（左上=${row},${col}）`;
  } else {
    const pd = debugSelectedPiece;
    board[row][col] = makePiece(pd.type, pd.team, pd.attr, pd.promoted);
  }
  renderBoard();
}

// 相性図のSVGを生成（size と markerId接頭辞を指定できる＝モーダルでも矢印が消えない）
function buildGogyouSvg(size, idPrefix) {
  const center = size/2;
  const r = size * 0.38;
  const nodeR = size * 0.107;
  const labels = ['木','火','土','金','水'];
  const colors = { '木':'#7dc860', '火':'#e05040', '土':'#d4b830', '金':'#dcd8c0', '水':'#a0aab4' };
  const pos = {};
  labels.forEach((l, i) => {
    const angle = -Math.PI/2 + i * (2*Math.PI/5);
    pos[l] = { x: center + r*Math.cos(angle), y: center + r*Math.sin(angle) };
  });
  const soushouPairs = Object.entries(SOUSHOU);
  const soukokuPairs = Object.entries(SOUKOKU);
  const seiId = idPrefix + '-sei', kokuId = idPrefix + '-koku';
  const sw = Math.max(1.4, size * 0.017);

  function arrowLine(a, b, color, dash, markerId) {
    const dx = pos[b].x - pos[a].x, dy = pos[b].y - pos[a].y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    const startOffset = nodeR + size*0.012, endOffset = nodeR + size*0.05;
    const x1 = pos[a].x + ux*startOffset, y1 = pos[a].y + uy*startOffset;
    const x2 = pos[b].x - ux*endOffset, y2 = pos[b].y - uy*endOffset;
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${sw}" ${dash?`stroke-dasharray="${sw*1.6},${sw*1.6}"`:''} marker-end="url(#${markerId})"/>`;
  }

  let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="background:rgba(20,12,6,0.55); border-radius:50%; border:1px solid rgba(200,150,12,0.3);">
    <defs>
      <marker id="${seiId}" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L6,3 L0,6 Z" fill="rgba(120,210,120,0.95)"/>
      </marker>
      <marker id="${kokuId}" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L6,3 L0,6 Z" fill="rgba(230,90,90,0.95)"/>
      </marker>
    </defs>`;
  soushouPairs.forEach(([a,b]) => { svg += arrowLine(a, b, 'rgba(120,210,120,0.85)', null, seiId); });
  soukokuPairs.forEach(([a,b]) => { svg += arrowLine(a, b, 'rgba(230,90,90,0.85)', true, kokuId); });
  labels.forEach(l => {
    svg += `<circle cx="${pos[l].x}" cy="${pos[l].y}" r="${nodeR}" fill="${colors[l]}" opacity="0.95" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>`;
    svg += `<text x="${pos[l].x}" y="${pos[l].y + size*0.037}" font-size="${size*0.107}" text-anchor="middle" fill="#1a1008" font-weight="bold">${l}</text>`;
  });
  svg += `</svg>`;
  return svg;
}

function renderGogyouDiagram() {

}

// ========================================================
let onlinePeer = null;        // PeerJSのPeerオブジェクト
let onlineConn = null;        // データ接続
let onlineMyTeam = null;      // 自分の担当（'ten'=部屋主, 'mei'=参加者）
let onlineConnected = false;  // 接続確立フラグ
let onlineMode = false;       // オンライン対局中フラグ
let onlineApplying = false;   // 受信状態の適用中フラグ（二重送信防止）
const ONLINE_PREFIX = 'oygs-'; // 部屋IDの接頭辞（衝突回避）
