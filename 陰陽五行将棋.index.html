<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 常に最新版を配信する（古いキャッシュが残り続けないように） -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>陰陽五行将棋</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');

  :root {
    --board-bg: #c8a96e;
    --board-line: #5a3e1b;
    --board-outer: #3a2410;
    --washi: #f0e6c8;
    --ink: #1a1008;
    --gold: #c8960c;
    --silver: #9ca3af;
    --ten-border: #c8960c;
    --mei-border: #9ca3af;

    /* 属性カラー */
    --ki: rgba(100, 180, 80, 0.35);
    --hi: rgba(210, 60, 40, 0.35);
    --tsuchi: rgba(210, 180, 40, 0.35);
    --kane: rgba(195, 180, 150, 0.6);
    --mizu: rgba(70, 75, 85, 0.45);

    /* 移動可能マス */
    --move-highlight: rgba(255, 220, 80, 0.55);
    --capture-highlight: rgba(220, 60, 40, 0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1008;
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 8px;
    padding-bottom: 56px;
    color: var(--ink);
  }

  /* 墨絵風背景テクスチャ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(60,30,10,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(30,15,5,0.7) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .game-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
  }

  h1 {
    color: var(--washi);
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: 0.25em;
    text-shadow: 0 2px 12px rgba(200,150,12,0.5);
    margin-bottom: 0;
  }

  .phase-info {
    color: var(--washi);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    opacity: 0.8;
    text-align: center;
  }

  .turn-info {
    background: rgba(240,230,200,0.08);
    border: 1px solid rgba(200,150,12,0.3);
    border-radius: 4px;
    padding: 4px 16px;
    color: var(--washi);
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-align: center;
  }

  /* 盤面 */
  .board-wrap {
    background: var(--board-outer);
    padding: 5px;
    border-radius: 2px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.4);
    width: min(92vw, 56vh);
    flex-shrink: 0;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
    gap: 0;
    border: 2px solid var(--board-line);
    background: var(--board-bg);
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
  }

  .cell {
    border: 1px solid var(--board-line);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }

  .cell.movable { background: var(--move-highlight); }
  .cell.capturable { background: var(--capture-highlight); }
  .cell.aiuchi-cell { background: rgba(180,100,200,0.55); }
  .cell:hover { filter: brightness(1.08); }

  /* 駒 */
  .piece {
    width: 90%;
    height: 90%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
  }

  .piece-body {
    width: 90%;
    height: 90%;
    background: var(--washi);
    clip-path: polygon(50% 2%, 95% 20%, 98% 98%, 2% 98%, 5% 20%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 2px 3px 6px rgba(0,0,0,0.4);
    transition: transform 0.1s;
  }

  .piece.selected .piece-body {
    transform: scale(1.1);
    filter: brightness(1.15);
  }

  /* 陣営カラー（縁） */
  .piece.ten .piece-body { outline: 4px solid var(--gold); outline-offset: -4px; }
  .piece.mei .piece-body {
    outline: 4px solid var(--silver);
    outline-offset: -4px;
    transform: rotate(180deg);
  }
  .piece.mei.selected .piece-body { transform: rotate(180deg) scale(1.1); }

  /* 種駒：薄茶色（将棋の木駒風） */
  .piece.tane-piece .piece-body { background: #c4975a; }

  /* 天/冥：サイズ大きめ・金銀色 */
  .piece.tenmei-piece { width: 100% !important; height: 100% !important; }
  .piece.tenmei-piece .piece-body { width: 100% !important; height: 100% !important; }
  .piece.ten.tenmei-piece .piece-body { background: linear-gradient(135deg, #f0d060, #c8960c); }
  .piece.mei.tenmei-piece .piece-body { background: linear-gradient(135deg, #d8dce2, #9ca3af); }

  /* 陰陽：白黒 */
  .piece.inyou-in .piece-body { background: #1a1a1a; }
  .piece.inyou-in .piece-name { color: #f0e6c8; }
  .piece.inyou-you .piece-body { background: #f5f5f5; }
  .piece.inyou-you .piece-name { color: #1a1008; }

  /* ===== 成り駒：生き物モチーフの駒形（B案） =====
     五神＝青龍(龍)/朱雀(鳥)/麒麟(獣)/白虎(虎)/玄武(亀蛇)、暗黒竜・耀白龍＝竜
     ※駒本体と属性オーバーレイの両方に同じclip-pathを当てる */
  .piece.goshin .piece-body,
  .piece.goshin .piece-attr { }

  /* 青龍：角のある龍頭（尖った双角＋顎） */
  .piece.shape-seiryu .piece-body,
  .piece.shape-seiryu .piece-attr {
    clip-path: polygon(30% 0%, 40% 16%, 60% 16%, 70% 0%, 78% 22%, 96% 34%, 86% 52%, 96% 72%, 74% 84%, 62% 100%, 38% 100%, 26% 84%, 4% 72%, 14% 52%, 4% 34%, 22% 22%);
  }
  /* 朱雀：翼を広げた鳥（左右に張り出す翼＋尾） */
  .piece.shape-suzaku .piece-body,
  .piece.shape-suzaku .piece-attr {
    clip-path: polygon(50% 0%, 62% 18%, 100% 26%, 72% 44%, 88% 60%, 66% 62%, 74% 88%, 50% 74%, 26% 88%, 34% 62%, 12% 60%, 28% 44%, 0% 26%, 38% 18%);
  }
  /* 麒麟：角と鬣のある獣（1本角＋たてがみの起伏） */
  .piece.shape-kirin .piece-body,
  .piece.shape-kirin .piece-attr {
    clip-path: polygon(50% 0%, 60% 20%, 82% 12%, 78% 32%, 98% 44%, 82% 58%, 92% 82%, 66% 76%, 58% 100%, 42% 100%, 34% 76%, 8% 82%, 18% 58%, 2% 44%, 22% 32%, 18% 12%, 40% 20%);
  }
  /* 白虎：耳と牙（角ばった双耳＋下向きの牙） */
  .piece.shape-byakko .piece-body,
  .piece.shape-byakko .piece-attr {
    clip-path: polygon(18% 0%, 34% 20%, 66% 20%, 82% 0%, 92% 26%, 100% 52%, 86% 74%, 68% 76%, 62% 100%, 50% 82%, 38% 100%, 32% 76%, 14% 74%, 0% 52%, 8% 26%);
  }
  /* 玄武：亀甲（六角の甲羅）＋頭と尾 */
  .piece.shape-genbu .piece-body,
  .piece.shape-genbu .piece-attr {
    clip-path: polygon(50% 0%, 58% 14%, 84% 14%, 100% 38%, 92% 68%, 70% 88%, 58% 84%, 50% 100%, 42% 84%, 30% 88%, 8% 68%, 0% 38%, 16% 14%, 42% 14%);
  }
  /* 暗黒竜：鋭く角ばった竜（棘） */
  .piece.shape-ankoku .piece-body,
  .piece.shape-ankoku .piece-attr {
    clip-path: polygon(50% 0%, 66% 14%, 88% 6%, 80% 28%, 100% 40%, 84% 56%, 96% 80%, 70% 76%, 58% 100%, 42% 100%, 30% 76%, 4% 80%, 16% 56%, 0% 40%, 20% 28%, 12% 6%, 34% 14%);
  }
  /* 耀白龍：翼のある竜（左右に広がる翼＋角） */
  .piece.shape-youhaku .piece-body,
  .piece.shape-youhaku .piece-attr {
    clip-path: polygon(50% 0%, 64% 16%, 84% 8%, 78% 30%, 100% 34%, 82% 50%, 98% 70%, 72% 70%, 64% 92%, 50% 78%, 36% 92%, 28% 70%, 2% 70%, 18% 50%, 0% 34%, 22% 30%, 16% 8%, 36% 16%);
  }
  /* 成り駒：一回り大きく＋固有色のグローで“格が違う”感を出す */
  .piece.goshin { width: 104% !important; height: 104% !important; z-index: 2; }
  .piece.goshin .piece-body {
    width: 100%;
    height: 100%;
    box-shadow: 0 0 12px 3px var(--goshin-glow, rgba(255,220,130,0.7)), 2px 3px 7px rgba(0,0,0,0.5);
    animation: goshinPulse 2.4s ease-in-out infinite;
  }
  @keyframes goshinPulse {
    0%,100% { filter: brightness(1); }
    50%     { filter: brightness(1.18); }
  }
  /* 獣のシルエット（駒面いっぱい） */
  .goshin-art {
    position: absolute;
    inset: 6%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.45));
  }
  .goshin-art svg { width: 100%; height: 100%; }
  /* 暗黒竜・耀白龍：一文字を大きく神々しく */
  .goshin-char {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Yuji Syuku', serif;
    font-size: clamp(0.7rem, 3.2svh, 1.35rem);
    font-weight: 700;
    letter-spacing: 0;
    pointer-events: none;
    text-shadow: 0 0 6px var(--goshin-glow, rgba(255,255,255,0.8));
  }
  /* 冥の駒は本体が180度回転する（＝五神のシルエットも文字も反転して見える）。
     他の駒と同じ挙動にすることで、どちらの陣営の駒か一目で分かる */

  /* デバッグ棋譜パネル（設定でONのときだけ表示） */
  #debug-panel {
    position: fixed; left: 4px; top: 4px; z-index: 4000;
    max-width: 58%; max-height: 22vh; overflow-y: auto;
    background: rgba(20,10,30,0.9); border: 1px solid rgba(180,120,220,0.55);
    border-radius: 7px; padding: 5px 7px;
    font-size: 0.6rem; line-height: 1.4; color: #e8dcf5;
    pointer-events: auto; display: none;
    font-family: ui-monospace, monospace;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  #debug-panel.collapsed { max-height: 24px; overflow: hidden; }
  #debug-panel .dbg-toggle {
    cursor: pointer; color: #c9a0ff; font-weight: bold;
    user-select: none; display: flex; justify-content: space-between; align-items: center;
  }

  /* 画面フラッシュ：駒の属性カラーで画面全体をふわっと点滅 */
  #screen-flash {
    position: fixed; inset: 0; z-index: 1500;
    pointer-events: none; opacity: 0;
    background: radial-gradient(circle at 50% 45%, var(--flash-color, rgba(255,255,255,0.5)) 0%, transparent 70%);
  }
  #screen-flash.flash-on { animation: screenFlash 0.5s ease-out; }
  @keyframes screenFlash {
    0%   { opacity: 0; }
    18%  { opacity: 0.85; }
    100% { opacity: 0; }
  }

  /* 炎溜めの残りカウント：残り1以下は赤く点滅して危険を知らせる */
  .hi-badge-danger {
    color: #ff5030 !important;
    animation: hiBadgeDanger 0.6s ease-in-out infinite;
  }
  @keyframes hiBadgeDanger {
    0%,100% { transform: scale(1); text-shadow: 0 0 4px rgba(255,80,40,0.6); }
    50%     { transform: scale(1.2); text-shadow: 0 0 12px rgba(255,80,40,1); }
  }
  /* 爆発時の盤揺れ */
  @keyframes boardShakeNormal {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-4px, 2px); }
    40% { transform: translate(4px, -2px); }
    60% { transform: translate(-3px, -2px); }
    80% { transform: translate(3px, 2px); }
  }
  @keyframes boardShakeStrong {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    10% { transform: translate(-8px, 4px) rotate(-0.5deg); }
    25% { transform: translate(9px, -5px) rotate(0.5deg); }
    40% { transform: translate(-7px, -4px) rotate(-0.4deg); }
    55% { transform: translate(8px, 5px) rotate(0.4deg); }
    70% { transform: translate(-5px, 3px) rotate(-0.3deg); }
    85% { transform: translate(5px, -3px) rotate(0.2deg); }
  }
  .board-shake-normal { animation: boardShakeNormal 0.4s ease-in-out; }
  .board-shake-strong { animation: boardShakeStrong 0.6s ease-in-out; }

  /* ===== 季節バフ：季節と同じ属性の五行駒がまとう、属性色の薄いモヤ ===== */
  .piece.season-buff { z-index: 1; }
  .piece.season-buff::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 165%; height: 165%;
    border-radius: 50%;
    /* 中心を濃く、外へ向かって溶ける（はっきり気づくモヤ） */
    background: radial-gradient(circle, var(--buff-color) 0%, var(--buff-mid) 42%, transparent 72%);
    pointer-events: none;
    z-index: -1;
    filter: blur(1px);
    animation: buffHaze 2.6s ease-in-out infinite;
  }
  @keyframes buffHaze {
    0%,100% { opacity: 0.85; transform: translate(-50%,-50%) scale(0.96); }
    50%     { opacity: 1;    transform: translate(-50%,-50%) scale(1.08); }
  }
  .piece.buff-moku { --buff-color: rgba(90,230,70,0.95);  --buff-mid: rgba(40,160,50,0.55); }   /* 木＝緑 */
  .piece.buff-ka   { --buff-color: rgba(255,95,40,0.95);  --buff-mid: rgba(190,40,10,0.55); }   /* 火＝朱 */
  .piece.buff-do   { --buff-color: rgba(255,205,50,0.95); --buff-mid: rgba(180,130,20,0.55); }  /* 土＝黄 */
  .piece.buff-kon  { --buff-color: rgba(255,255,255,1);   --buff-mid: rgba(190,205,225,0.6); }  /* 金＝白銀 */
  .piece.buff-sui  { --buff-color: rgba(70,180,255,0.95); --buff-mid: rgba(20,90,190,0.55); }   /* 水＝藍 */

  /* 潜伏中の土：潜った場所を示す目印（点線の枠＋うっすら「土」） */
  .burrow-mark {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 62%; height: 62%;
    display: flex; align-items: center; justify-content: center;
    border: 1px dashed rgba(190,150,90,0.85);
    border-radius: 4px;
    background: rgba(150,110,60,0.18);
    color: rgba(235,205,150,0.9);
    font-family: 'Yuji Syuku', serif;
    font-size: clamp(0.4rem, 1.6svh, 0.72rem);
    pointer-events: none;
    animation: burrowPulse 2s ease-in-out infinite;
  }
  @keyframes burrowPulse {
    0%,100% { opacity: 0.55; }
    50%     { opacity: 1; }
  }

  /* 属性色オーバーレイ */
  .piece-attr {
    position: absolute;
    inset: 0;
    clip-path: polygon(50% 2%, 95% 20%, 98% 98%, 2% 98%, 5% 20%);
    pointer-events: none;
  }

  .piece-name {
    font-size: clamp(0.4rem, 1.8svh, 0.75rem);
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.1;
    z-index: 1;
    position: relative;
  }

  /* 編成画面 */
  .setup-screen {
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(200,150,12,0.14), transparent 60%),
      linear-gradient(160deg, rgba(40,26,10,0.55), rgba(20,14,8,0.55));
    border: 1px solid rgba(200,150,12,0.45);
    border-radius: 10px;
    padding: 22px 20px;
    color: var(--washi);
    width: 100%;
    max-width: 540px;
    box-shadow: 0 0 40px rgba(200,150,12,0.12), inset 0 0 30px rgba(0,0,0,0.35);
    position: relative;
    overflow: hidden;
  }
  /* 上辺を横切る金の光の帯 */
  .setup-screen::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,210,90,0.9), transparent);
    animation: setupSheen 3.5s ease-in-out infinite;
  }
  @keyframes setupSheen {
    0%,100% { opacity: 0.35; }
    50%     { opacity: 1; }
  }

  .setup-screen h2 {
    text-align: center;
    letter-spacing: 0.35em;
    margin-bottom: 16px;
    font-size: 1.25rem;
    font-weight: bold;
    background: linear-gradient(90deg, #d8a12a, #ffe08a, #d8a12a);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 18px rgba(255,210,90,0.25);
  }

  .setup-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 4px;
    margin-bottom: 16px;
  }

  .setup-cell {
    aspect-ratio: 1;
    border: 1px solid rgba(200,150,12,0.3);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    transition: transform 0.12s, background 0.15s, box-shadow 0.15s;
    color: var(--washi);
    text-align: center;
    line-height: 1.2;
  }

  .setup-cell:hover { background: rgba(200,150,12,0.2); transform: translateY(-1px); }
  .setup-cell.selected-setup {
    background: rgba(200,150,12,0.4);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(255,210,90,0.5);
    animation: setupPulse 1.4s ease-in-out infinite;
  }
  @keyframes setupPulse {
    0%,100% { box-shadow: 0 0 10px rgba(255,210,90,0.4); }
    50%     { box-shadow: 0 0 18px rgba(255,210,90,0.75); }
  }

  .attr-picker {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .attr-btn {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    background: transparent;
    color: var(--washi);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    transition: transform 0.12s, box-shadow 0.15s, background 0.15s, border-color 0.15s;
  }

  .attr-btn:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
  .attr-btn.active { border-color: var(--gold); background: rgba(200,150,12,0.25); color: var(--gold); }

  .attr-btn[data-attr="木"] { border-color: rgba(100,180,80,0.5); }
  .attr-btn[data-attr="木"].active { background: linear-gradient(160deg, rgba(100,200,80,0.35), rgba(40,120,40,0.25)); color: #9fe87a; border-color: #7dc860; box-shadow: 0 0 16px rgba(100,200,80,0.5); }
  .attr-btn[data-attr="火"] { border-color: rgba(210,60,40,0.5); }
  .attr-btn[data-attr="火"].active { background: linear-gradient(160deg, rgba(255,90,50,0.35), rgba(150,30,20,0.25)); color: #ff8060; border-color: #e05040; box-shadow: 0 0 16px rgba(255,90,50,0.5); }
  .attr-btn[data-attr="土"] { border-color: rgba(210,180,40,0.5); }
  .attr-btn[data-attr="土"].active { background: linear-gradient(160deg, rgba(255,205,60,0.35), rgba(150,110,20,0.25)); color: #f0d060; border-color: #d4b830; box-shadow: 0 0 16px rgba(255,205,60,0.5); }
  .attr-btn[data-attr="金"] { border-color: rgba(220,210,185,0.5); }
  .attr-btn[data-attr="金"].active { background: linear-gradient(160deg, rgba(255,255,255,0.3), rgba(180,180,160,0.2)); color: #ffffff; border-color: #ffffff; box-shadow: 0 0 16px rgba(255,255,255,0.5); }
  .attr-btn[data-attr="水"] { border-color: rgba(140,150,160,0.5); }
  .attr-btn[data-attr="水"].active { background: linear-gradient(160deg, rgba(70,180,255,0.35), rgba(20,80,160,0.25)); color: #7cc0ff; border-color: #5aa0f0; box-shadow: 0 0 16px rgba(70,180,255,0.5); }

  .setup-hint {
    font-size: 0.75rem;
    opacity: 0.6;
    text-align: center;
    margin-bottom: 12px;
  }

  .attr-count {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
    font-size: 0.8rem;
    opacity: 0.8;
  }

  .btn-primary {
    display: block;
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, rgba(200,150,12,0.4), rgba(200,150,12,0.2));
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: inherit;
    font-size: 1rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    border-radius: 2px;

  }

  .btn-primary:hover { background: linear-gradient(135deg, rgba(200,150,12,0.6), rgba(200,150,12,0.3)); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .log {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(200,150,12,0.2);
    border-radius: 2px;
    padding: 8px 12px;
    color: var(--washi);
    font-size: 0.8rem;
    width: 100%;
    max-width: 540px;
    min-height: 36px;

  .season-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    color: var(--washi);
    font-size: 0.8rem;
    opacity: 0.85;
    width: 100%;
  }
  /* 横長の季節ヘッダー（風景バナー） */
  .season-header {
    position: relative;
    width: 100%;
    height: 46px;
    border-radius: 10px;

    animation: seasonHeaderFade 0.6s ease-out;
  }
  .season-header-bg { position: absolute; inset: 0; }
  .season-header-bg .season-scene-svg { width: 100%; height: 100%; display: block; }
  .season-header-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px;
    background: linear-gradient(90deg, rgba(20,14,8,0.55) 0%, rgba(20,14,8,0.15) 40%, rgba(20,14,8,0) 70%);

  .season-header-name {
    font-size: 1.3rem; font-weight: 700; letter-spacing: 0.12em;
    color: #fff8ec; text-shadow: 0 1px 4px rgba(0,0,0,0.7), 0 0 10px var(--season-color);
  }
  .season-header-attr {
    font-size: 0.9rem; color: #fff8ec; opacity: 0.85;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }
  .season-header-turn {
    margin-left: auto;
    font-size: 0.8rem; color: #fff8ec; opacity: 0.8;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }
  @keyframes seasonHeaderFade {
    0% { opacity: 0.3; transform: translateY(-4px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .season-badge {
    padding: 2px 10px;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  /* 季節イラスト入りの大きめバッジ */
  .season-badge-big {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 14px 5px 10px;
    border-radius: 20px;
    font-size: 1.05rem;
    box-shadow: 0 1px 6px rgba(0,0,0,0.25);
    animation: seasonBadgePop 0.5s ease-out;
  }
  .season-badge-big .season-icon {
    display: inline-flex; align-items: center;
    filter: drop-shadow(0 0 3px currentColor);
    animation: seasonIconFloat 3s ease-in-out infinite;
  }
  .season-badge-big .season-name { letter-spacing: 0.08em; }
  @keyframes seasonBadgePop {
    0% { transform: scale(0.85); opacity: 0.4; }
    60% { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes seasonIconFloat {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-1.5px) rotate(-4deg); }
  }

  /* 壁駒 */
  .wall-piece {
    position: absolute;
    width: 80%;
    height: 80%;
    border: 2px dashed;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.3rem, 1.4svh, 0.6rem);
    font-weight: 700;
    pointer-events: none;
    background: rgba(0,0,0,0.15);
  }
  .wall-piece.ten { border-color: var(--gold); color: var(--gold); }
  .wall-piece.mei { border-color: var(--silver); color: var(--silver); }
  .wall-piece.fire-attr { border-color: #e05040; color: #e05040; background: rgba(210,60,40,0.2); }
  /* 青龍の軌跡壁：木の術の壁と区別（緑・破線・次に青龍が動くと消える） */
  .wall-piece.trail-wall { border-style: dashed; border-color: #6fbf73; color: #8fd894; background: rgba(70,150,80,0.16); }

  .cell.wall-placeable { background: rgba(100,180,80,0.4); }
  .cell.fusion-base { background: rgba(200,120,220,0.5); box-shadow: inset 0 0 8px rgba(220,150,240,0.8); }
  .cell.fusion-dir { background: rgba(200,120,220,0.35); }
  .fusion-cell {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(0.5rem, 2svh, 0.9rem); font-weight: bold;
    color: #1a1008; z-index: 5;
    border: 1px solid rgba(0,0,0,0.2);
  }
  .fusion-cell.ten { box-shadow: inset 0 0 0 2px var(--gold); }
  .fusion-cell.mei { box-shadow: inset 0 0 0 2px var(--silver); }
  .fusion-label { letter-spacing: 0.05em; }
  @keyframes bannerPop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .cell.jutsu-danger { box-shadow: inset 0 0 0 2px rgba(235,90,80,0.85); }  /* 敵の術で王が倒される危険マス */
  .cell.jutsu-danger::after {
    content:'危'; position:absolute; top:1px; right:2px; font-size:0.5rem;
    color:rgba(255,150,140,0.95); pointer-events:none;
  }
  .cell.genbu-path { background: rgba(80,140,240,0.6); box-shadow: inset 0 0 6px rgba(40,100,220,0.7); } /* 玄武経路 */
  .cell.genbu-dest { background: rgba(100,150,255,0.55); } /* 玄武到達点 */
  .cell.genbu-dest-cap { background: rgba(220,100,100,0.55); } /* 玄武到達点(倒す/弾く) */
  .genbu-arrow {
    position: absolute; top: 50%; left: 50%;
    transform-origin: center;
    margin: -0.5em 0 0 -0.5em;
    font-size: 1.1em; line-height: 1;
    color: rgba(180,220,255,0.95);
    text-shadow: 0 0 4px rgba(40,90,180,0.9), 0 0 2px rgba(0,0,0,0.6);
    pointer-events: none;
    z-index: 5;
    animation: genbuArrowPulse 1.2s ease-in-out infinite;
  }
  @keyframes genbuArrowPulse {
    0%,100% { opacity: 0.75; }
    50% { opacity: 1; }
  }
  .frozen-piece .piece-body { filter: brightness(1.3) saturate(0.5); box-shadow: 0 0 8px 2px rgba(140,200,255,0.7); }
  .frozen-piece .piece-body::after { content:'❄'; position:absolute; top:2px; right:2px; font-size:0.6rem; }
  /* 炎溜めの目印（チーム共有の溜め数を火駒に表示） */
  .piece.hi-charged .piece-body { box-shadow: 0 0 9px 2px rgba(255,140,40,0.8); }
  .hi-charge-badge { position:absolute; top:-3px; right:-3px; z-index:6; font-size:0.58rem; line-height:1; padding:1px 3px; border-radius:8px; background:rgba(232,90,28,0.96); color:#fff; font-weight:700; box-shadow:0 0 4px rgba(0,0,0,0.55); pointer-events:none; }
  /* 麒麟のマーキング：印を付けた駒に常時表示 */
  .cell.kirin-marked { box-shadow: inset 0 0 0 2px rgba(212,184,48,0.85); }
  .kirin-mark-badge { position:absolute; bottom:-3px; left:-3px; z-index:6; font-size:0.56rem; line-height:1; padding:1px 4px; border-radius:8px; background:rgba(212,184,48,0.97); color:#241a04; font-weight:700; box-shadow:0 0 4px rgba(0,0,0,0.55); pointer-events:none; }
  /* 直前の手のハイライト（移動元・移動先） */
  .cell.last-to { box-shadow: inset 0 0 0 3px rgba(255,200,90,0.6); }
  .cell.last-from { box-shadow: inset 0 0 0 2px rgba(255,200,90,0.3); }
  /* 捕獲マスの強調（次の手まで残る）。倒した側の色でどちらが取ったか分かる */
  .cell.capture-mark-ten { background: rgba(220,170,40,0.32); box-shadow: inset 0 0 10px 2px rgba(220,170,40,0.55); animation: captureMarkPulse 1s ease-out; }
  .cell.capture-mark-mei { background: rgba(150,160,180,0.32); box-shadow: inset 0 0 10px 2px rgba(150,160,180,0.6); animation: captureMarkPulse 1s ease-out; }
  .cell.capture-mark-aiuchi { background: rgba(180,100,210,0.35); box-shadow: inset 0 0 10px 2px rgba(180,100,210,0.7); animation: captureMarkPulse 1s ease-out; }
  @keyframes captureMarkPulse {
    0% { box-shadow: inset 0 0 0 0 currentColor; }
    30% { box-shadow: inset 0 0 14px 4px rgba(255,255,255,0.5); }
    100% {}
  }
  /* 水晶：操作できる敵駒／選択中の駒（青紫で明滅） */
  .cell.suishou-select { animation: suishouPulse 1s ease-in-out infinite; cursor:pointer; z-index:2; }
  @keyframes suishouPulse { 0%,100%{ box-shadow: inset 0 0 0 2px rgba(110,170,245,0.5); } 50%{ box-shadow: inset 0 0 8px 3px rgba(110,170,245,0.95); } }
  .cell.suishou-selected { box-shadow: inset 0 0 0 3px rgba(140,190,255,1); background: rgba(110,170,245,0.22); z-index:3; }
  /* 相手駒の移動予測（読み取り専用・赤系で「敵の利き」を示す） */
  .cell.preview-piece { box-shadow: inset 0 0 0 3px rgba(230,120,110,0.9); z-index:3; }
  .cell.preview-move::after { content:''; position:absolute; left:50%; top:50%; width:34%; height:34%; transform:translate(-50%,-50%); border-radius:50%; background:rgba(230,110,90,0.42); pointer-events:none; }
  .cell.preview-cap { box-shadow: inset 0 0 0 3px rgba(230,90,80,0.85); background: rgba(230,90,80,0.14); }
  /* 王手警告：盤の縁が赤く明滅、王のマスが赤枠で脈動 */
  .board-wrap.in-check { animation: checkglow 0.9s ease-in-out infinite; border-radius:6px; }
  @keyframes checkglow { 0%,100%{ box-shadow:0 0 0 0 rgba(220,50,50,0); } 50%{ box-shadow:0 0 20px 5px rgba(220,50,50,0.8); } }
  .cell.king-in-check { box-shadow: inset 0 0 0 3px rgba(232,40,40,0.95); animation: kingpulse 0.8s ease-in-out infinite; z-index:3; }
  @keyframes kingpulse { 0%,100%{ box-shadow: inset 0 0 0 2px rgba(232,40,40,0.6); } 50%{ box-shadow: inset 0 0 6px 3px rgba(232,40,40,0.95); } }
  /* 効果適用マスのフラッシュ表示（どの駒に効いたかを示す） */
  @keyframes fxpulse { 0%{box-shadow:inset 0 0 0 0 var(--fxc);} 50%{box-shadow:inset 0 0 10px 3px var(--fxc);} 100%{box-shadow:inset 0 0 4px 1px var(--fxc);} }
  .cell.fx { animation: fxpulse 0.7s ease-in-out 2; box-shadow: inset 0 0 6px 2px var(--fxc); z-index:2; }
  .cell.fx-destroy { --fxc: rgba(230,70,50,0.95); }
  .cell.fx-create  { --fxc: rgba(90,200,110,0.95); }
  .cell.fx-mu      { --fxc: rgba(170,90,210,0.95); }
  .cell.fx-buff    { --fxc: rgba(255,205,90,0.98); }
  .cell.fx-control { --fxc: rgba(80,150,240,0.95); }
  .cell.fx-freeze  { --fxc: rgba(120,205,240,0.98); }
  .cell.fx-fire    { --fxc: rgba(255,140,50,0.98); }
  .cell.fx-hide    { --fxc: rgba(190,150,90,0.95); }
  .cell.fx-fusion  { --fxc: rgba(255,215,120,1); animation: fxpulse 0.6s ease-in-out 3 !important; }
  /* 捕獲バースト：移動先が一瞬赤く弾ける */
  .cell.capture-burst { animation: captureBurst 0.45s ease-out; z-index:4; }
  @keyframes captureBurst { 0%{ box-shadow: inset 0 0 0 0 rgba(255,120,60,0); } 25%{ box-shadow: inset 0 0 14px 5px rgba(255,120,60,0.95); } 100%{ box-shadow: inset 0 0 0 0 rgba(255,120,60,0); } }
  /* 討ち取り表示：取られた駒名が浮き上がって消える */
  .capture-float {
    position:absolute; left:50%; top:50%; z-index:60;
    transform:translate(-50%,-50%); pointer-events:none;
    font-family:'Yuji Syuku', serif; font-weight:700;
    font-size:0.82rem; white-space:nowrap;
    color:#fff5e8; text-shadow:0 0 6px rgba(220,60,30,0.95), 0 1px 3px rgba(0,0,0,0.8);
    animation: captureFloat 1.05s ease-out forwards;
  }
  @keyframes captureFloat {
    0%   { opacity:0; transform:translate(-50%,-30%) scale(0.7); }
    18%  { opacity:1; transform:translate(-50%,-60%) scale(1.15); }
    45%  { opacity:1; transform:translate(-50%,-95%) scale(1.0); }
    100% { opacity:0; transform:translate(-50%,-150%) scale(0.95); }
  }
  /* 召喚演出：持ち駒を盤上に出したマスが光る */
  .cell.summon-fx { animation: summonFx 0.7s ease-out; z-index:4; }
  @keyframes summonFx {
    0%   { box-shadow: inset 0 0 0 0 rgba(120,200,255,0); }
    20%  { box-shadow: inset 0 0 16px 6px rgba(120,200,255,0.95); }
    100% { box-shadow: inset 0 0 0 0 rgba(120,200,255,0); }
  }
  .summon-float {
    position:absolute; left:50%; top:50%; z-index:60;
    transform:translate(-50%,-50%); pointer-events:none;
    font-family:'Yuji Syuku', serif; font-weight:700;
    font-size:0.72rem; white-space:nowrap;
    color:#eaf6ff; text-shadow:0 0 6px rgba(60,140,240,0.95), 0 1px 3px rgba(0,0,0,0.8);
    animation: summonFloat 0.95s ease-out forwards;
  }
  @keyframes summonFloat {
    0%   { opacity:0; transform:translate(-50%,-20%) scale(0.6); }
    25%  { opacity:1; transform:translate(-50%,-55%) scale(1.1); }
    100% { opacity:0; transform:translate(-50%,-95%) scale(0.95); }
  }
  .fx-badge { position:absolute; top:1px; left:1px; z-index:5; font-size:0.62rem; line-height:1; padding:1px 3px; border-radius:6px; color:#120a04; font-weight:700; pointer-events:none; box-shadow:0 0 4px rgba(0,0,0,0.5); }
  .debug-piece-btn { padding:4px 8px; border-radius:2px; font-family:inherit; font-size:0.75rem; cursor:pointer; border:1px solid rgba(255,255,255,0.2); background:transparent; color:var(--washi); letter-spacing:0.05em; }
  .debug-piece-btn.selected { border-color:rgba(220,150,220,0.8); background:rgba(150,50,150,0.3); color:rgba(220,150,220,1); }
  .cell.debug-hover { outline:2px solid rgba(220,150,220,0.6); }
</style>

<body>
<!-- Netlify Forms 検出用の静的フォーム（実送信はJSでfetch）。hidden属性だと検出されないことがあるためCSSで隠す -->
<form name="review" method="POST" data-netlify="true" netlify-honeypot="bot-field" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">
  <input type="hidden" name="form-name" value="review" />
  <input type="text" name="rating" />
  <input type="text" name="difficulty" />
  <input type="text" name="strong" />
  <textarea name="comment"></textarea>
  <input type="text" name="bot-field" />
</form>
<div id="title-screen" style="position:fixed;inset:0;z-index:5000;background:linear-gradient(180deg,#fbfaf6 0%,#f5f1e8 50%,#efe9dc 100%);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:28px 24px;overflow-y:auto;">
  <!-- 上＝天 -->
  <div style="font-family:'Yuji Syuku',serif;font-size:1.05rem;color:rgba(40,40,40,0.32);letter-spacing:0.5em;text-align:center;padding-top:6px;">天</div>

  <!-- 中央：太極図＋五行＋タイトル -->
  <div style="display:flex;flex-direction:column;align-items:center;">
    <!-- 太極図＋五行の円環 -->
    <svg width="170" height="170" viewBox="0 0 120 120" style="margin-bottom:22px;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.16));">
      <defs>
        <radialGradient id="inkgrad" cx="40%" cy="35%" r="75%">
          <stop offset="0%" stop-color="#2c2c2c"/>
          <stop offset="100%" stop-color="#050505"/>
        </radialGradient>
      </defs>
      <!-- 五行：五色の円を五芒の位置に（木→火→土→金→水を時計回り） -->
      <!-- 木(青緑) 上 -->
      <circle cx="60" cy="9" r="5.5" fill="#3f8f6f"/>
      <!-- 火(朱) 右上 -->
      <circle cx="108.5" cy="44.3" r="5.5" fill="#c0392b"/>
      <!-- 土(黄土) 右下 -->
      <circle cx="89.9" cy="101.2" r="5.5" fill="#c9a227"/>
      <!-- 金(金白) 左下 -->
      <circle cx="30.1" cy="101.2" r="5.5" fill="#b8932f" stroke="#e8d8a0" stroke-width="0.8"/>
      <!-- 水(藍) 左上 -->
      <circle cx="11.5" cy="44.3" r="5.5" fill="#2c3e6f"/>
      <!-- 相生の円環（薄い線） -->
      <circle cx="60" cy="55" r="49" fill="none" stroke="rgba(60,60,60,0.12)" stroke-width="0.8"/>
      <!-- 太極図 本体 -->
      <g transform="translate(0,5)">
        <circle cx="60" cy="50" r="38" fill="#fff" stroke="#1a1a1a" stroke-width="1.4"/>
        <path d="M60,12 A38,38 0 0,1 60,88 A19,19 0 0,1 60,50 A19,19 0 0,0 60,12 Z" fill="url(#inkgrad)"/>
        <circle cx="60" cy="31" r="5.5" fill="#fff"/>
        <circle cx="60" cy="69" r="5.5" fill="#000"/>
      </g>
    </svg>
    <!-- タイトル：龍 陰陽五行将棋 竜 -->
    <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px;">
      <svg width="38" height="46" viewBox="0 0 38 46" style="opacity:0.6;flex-shrink:0;" aria-label="龍">
        <g fill="none" stroke="#2c3e6f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <!-- とぐろ（内巻きの渦） -->
          <path d="M19,30 C12,30 11,23 17,22 C23,21 24,28 19,30 M19,30 C9,31 8,19 18,17 C29,15 30,32 19,34 C6,36 5,15 19,13"/>
          <!-- 頭と髭 -->

          <path d="M28,5 L31,3 M28,5 L31,7"/>
        </g>
        <circle cx="28" cy="5" r="1.4" fill="#2c3e6f"/>
      </svg>
      <h1 style="font-family:'Yuji Syuku',serif;font-size:2.5rem;color:#141414;letter-spacing:0.14em;margin:0;text-align:center;font-weight:normal;line-height:1.25;">陰陽五行<br>将棋</h1>
      <svg width="40" height="46" viewBox="0 0 40 46" style="opacity:0.72;flex-shrink:0;" aria-label="竜">
        <g fill="#1a1a1a">
          <!-- 胴体 -->
          <path d="M8,28 C10,22 16,20 22,21 C27,22 30,25 32,22 C30,28 26,29 21,29 C24,32 24,36 22,39 C21,35 19,33 16,33 C13,36 10,36 7,38 C9,34 9,31 8,28 Z"/>
          <!-- 翼 -->
          <path d="M18,22 C16,14 20,9 26,7 C23,12 24,17 23,21 Z"/>
        </g>
        <g fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round">
          <!-- 首と頭 -->
          <path d="M32,22 C35,20 36,16 34,13"/>
          <!-- 脚 -->
          <path d="M14,32 L13,40 M20,32 L21,40"/>
        </g>
        <circle cx="34" cy="12" r="1.5" fill="#1a1a1a"/>

    </div>
    <p style="font-family:'Yuji Syuku',serif;font-size:0.72rem;color:#9a9384;letter-spacing:0.28em;margin:4px 0 0;">おんみょう ごぎょう しょうぎ</p>
  </div>

  <!-- 下＝地：モードボタン＋地の文字 -->
  <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div style="display:flex;flex-direction:column;gap:13px;width:100%;max-width:300px;margin-bottom:18px;">

// ============================================================
// 定数・設定
// ============================================================
const ATTR_COLOR = {
  '木': 'rgba(100,180,80,0.35)',

};
const SOUSHOU = { '火':'木', '木':'水', '水':'金', '金':'土', '土':'火' };
const SOUKOKU = { '木':'土', '土':'水', '水':'火', '火':'金', '金':'木' };

// 合体駒の定義（素体=base[盤上], 素材=material[持ち駒]）
// keyは合体駒名。baseAttr/baseTypeが素体、matAttr/matTypeが素材
const FUSION_DEFS = [
  { name:'樹海', baseType:'gogyou', baseAttr:'木', matType:'gogyou', matAttr:'水' },
  { name:'大火', baseType:'gogyou', baseAttr:'火', matType:'gogyou', matAttr:'木' },
  { name:'焚沃', baseType:'gogyou', baseAttr:'土', matType:'gogyou', matAttr:'火' },
  { name:'鉱山', baseType:'gogyou', baseAttr:'金', matType:'gogyou', matAttr:'土' },
  { name:'水晶', baseType:'gogyou', baseAttr:'水', matType:'gogyou', matAttr:'金' },
  { name:'玄極', baseType:'in', baseAttr:null, matType:'you', matAttr:null },
  { name:'太極', baseType:'you', baseAttr:null, matType:'in', matAttr:null },
];

// 持ち駒(素材)に対応する合体定義を探す
function findFusionByMaterial(matPiece) {
  return FUSION_DEFS.filter(f => f.matType===matPiece.type && f.matAttr===(matPiece.attr||null));
}
// 素体候補かどうか（指定した合体定義の素体条件に合うか）
function isFusionBase(piece, fusionDef) {
  return piece.type===fusionDef.baseType && (piece.attr||null)===fusionDef.baseAttr;
}
const SEASONS = [
  {name:'春1',attr:'木'},{name:'春2',attr:'木'},{name:'春3',attr:'木'},{name:'春4',attr:'木'},
  {name:'土用1',attr:'土'},
  {name:'夏1',attr:'火'},{name:'夏2',attr:'火'},{name:'夏3',attr:'火'},{name:'夏4',attr:'火'},
  {name:'土用2',attr:'土'},
  {name:'秋1',attr:'金'},{name:'秋2',attr:'金'},{name:'秋3',attr:'金'},{name:'秋4',attr:'金'},
  {name:'土用3',attr:'土'},
  {name:'冬1',attr:'水'},{name:'冬2',attr:'水'},{name:'冬3',attr:'水'},{name:'冬4',attr:'水'},
  {name:'土用4',attr:'土'},
];
const SEASON_COLOR = {
  '木': '#7dc860', '火': '#e05040', '土': '#d4b830', '金': '#dcd8c0', '水': '#a0aab4'
};

// 季節を象徴する横長の風景SVG（ヘッダー帯の背景。画像を使わず軽量に情景を出す）
// 木＝春（新緑の丘に若葉）／火＝夏（照る太陽）／金＝秋（紅葉の山）／水＝冬（雪原と雪）／土＝土用（黄土の大地）
function SEASON_SCENE(attr) {
  const C = SEASON_COLOR[attr] || '#ccc';
  // 季節ごとの空グラデ（上）と地面色（下）、情景要素
  const scenes = {
    '木': { sky1:'#bfe6a8', sky2:'#e8f6dd', ground:'#7dc860', extra:`
      <ellipse cx="60" cy="72" rx="70" ry="20" fill="#8fd070" opacity="0.7"/>

      <path d="M150 68 q5 -12 10 0" stroke="#4e9a3c" stroke-width="2" fill="none"/>

    '火': { sky1:'#ffd39a', sky2:'#ffe9c2', ground:'#e88a4a', extra:`
      <circle cx="150" cy="40" r="26" fill="#fff2c0"/>
      <circle cx="150" cy="40" r="20" fill="#ffd85a"/>
      <g stroke="#ffcf5a" stroke-width="2.5" opacity="0.9">
        <path d="M150 4 V-2"/><path d="M150 76 V82"/><path d="M114 40 H108"/><path d="M186 40 H192"/>
        <path d="M124 14 L120 10"/><path d="M176 66 L180 70"/><path d="M176 14 L180 10"/><path d="M124 66 L120 70"/>
      </g>
      <ellipse cx="150" cy="82" rx="160" ry="16" fill="#d9743a" opacity="0.6"/>

    '金': { sky1:'#f0cf9a', sky2:'#f6e6cf', ground:'#c9a84e', extra:`
      <path d="M-10 80 L70 34 L150 80 Z" fill="#caa356" opacity="0.85"/>
      <path d="M120 80 L210 30 L300 80 Z" fill="#b8923f" opacity="0.85"/>
      <g fill="#d4622e" opacity="0.9">
        <circle cx="55" cy="60" r="3"/><circle cx="95" cy="52" r="3"/><circle cx="200" cy="50" r="3"/><circle cx="245" cy="62" r="3"/>

    `},
    '水': { sky1:'#c4d2de', sky2:'#e6edf3', ground:'#cdd6df', extra:`
      <ellipse cx="150" cy="82" rx="170" ry="18" fill="#dbe3ea"/>
      <g stroke="#8fa4b6" stroke-width="1.6" opacity="0.85">
        <g transform="translate(60,30)"><path d="M0 -8 V8 M-8 0 H8 M-5 -5 L5 5 M5 -5 L-5 5"/></g>
        <g transform="translate(210,24)"><path d="M0 -7 V7 M-7 0 H7 M-4 -4 L4 4 M4 -4 L-4 4"/></g>
        <g transform="translate(255,50)"><path d="M0 -5 V5 M-5 0 H5"/></g>
        <g transform="translate(30,54)"><path d="M0 -5 V5 M-5 0 H5"/></g>

    '土': { sky1:'#e8d9a0', sky2:'#f4ecd0', ground:'#c9a83a', extra:`
      <!-- 大地の地層（土の重なり）で土用を表現。山のシルエットは使わない -->
      <rect x="0" y="52" width="300" height="8" fill="#d4b23a" opacity="0.9"/>
      <rect x="0" y="60" width="300" height="8" fill="#c19a34" opacity="0.9"/>
      <rect x="0" y="68" width="300" height="9" fill="#a9842c" opacity="0.9"/>

  };
  const s = scenes[attr] || scenes['土'];
  return `<svg class="season-scene-svg" viewBox="0 0 300 84" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

let board = [];
let turnCount = 1;
let currentTeam = 'ten';
let selectedCell = null;

let gamePhase = 'setup';
let actionPhase = 'main';

};
const SETUP_STEPS = [
  { key: 'ten_tane',   label: '天側（あなた）の種駒',   hint: '後ろから3列目に配置' },
  { key: 'ten_gogyou', label: '天側（あなた）の五行駒', hint: '後ろから1列目に配置' },
  { key: 'mei_tane',   label: '冥側の種駒',             hint: '後ろから3列目に配置' },
  { key: 'mei_gogyou', label: '冥側の五行駒',           hint: '後ろから1列目に配置' },
];

  selectedAttr = a;
  document.querySelectorAll('.attr-btn').forEach(b => b.classList.toggle('active', b.dataset.attr === a));
}
function getCurrentAttrs() { return setupData[SETUP_STEPS[setupStep].key]; }
function renderSetupGrid() {
  const attrs = getCurrentAttrs();
  const step = SETUP_STEPS[setupStep];
  document.getElementById('setup-label').textContent = step.label;
  document.getElementById('setup-hint-text').textContent = `9マスに属性を割り当てます（各属性は最大2枚→5属性すべてが入り、1属性だけ1枚になります）。${step.hint}`;
  const grid = document.getElementById('setup-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'setup-cell' + (attrs[i] ? ' selected-setup' : '');

function randomFillKey(key) {
  const attrs = ['木','火','土','金','水'];
  let pool = [...attrs];
  const counts = {'木':1,'火':1,'土':1,'金':1,'水':1};
  while (pool.length < 9) {
    const cands = attrs.filter(a => counts[a] < 2);
    const pick = cands[Math.floor(Math.random()*cands.length)];
    pool.push(pick); counts[pick]++;
  }
  for (let i = pool.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  setupData[key] = pool;
}

// ============================================================
// 駒ファクトリ
// ============================================================
let pieceIdCounter = 1;
function makePiece(type, team, attr=null, promoted=false, hasMoved=false) {
  return { type, team, attr, promoted, hasMoved, pid: pieceIdCounter++ };
}

// ============================================================
// 合体駒システム
// ============================================================
// 指定マスを占有する合体駒を返す（なければnull）
function getFusionAt(r, c) {
  for (const team of ['ten','mei']) {
    for (const f of fusionPieces[team]) {
      if (r>=f.topRow && r<=f.topRow+1 && c>=f.leftCol && c<=f.leftCol+1) return f;
    }
  }
  return null;
}

// 合体駒の占有マス一覧
function getFusionCells(f) {
  return [[f.topRow,f.leftCol],[f.topRow,f.leftCol+1],[f.topRow+1,f.leftCol],[f.topRow+1,f.leftCol+1]];
}

// 合体駒を破壊
// ===== 散（さん）：自分の合体駒を解除して、素体と素材を取り戻す =====
// 合体は「動ける駒2枚 → 動けない塊1つ」なので、終盤に攻め手が枯れる主因になっていた。
// いつでも1手を使って巻き戻せるようにし、合体を「永久の消費」から「一時的な投資」に変える。
// 次の合体までの1年インターバル（lastFusionSeasonIdx）は解除しても短縮されないため、
// 「作ってすぐ解除」を繰り返す悪用はできない。
function canScatterFusion(f, team) {
  if (!f || f.team !== team) return false;
  return true; // 発動条件なし（いつでも可）。再合体はインターバルに縛られる。
}
// 解除で戻す素体の置き場所（合体駒が占有していた2×2のうち空いているマス）
function scatterBaseCell(f) {
  const cells = [[f.topRow,f.leftCol],[f.topRow,f.leftCol+1],[f.topRow+1,f.leftCol],[f.topRow+1,f.leftCol+1]];
  for (const [r,c] of cells) {
    if (r<0||r>=9||c<0||c>=9) continue;
    if (board[r][c] || getWallAt(r,c)) continue;
    return [r,c];
  }
  return null;
}
function executeScatter(f, team) {
  if (!canScatterFusion(f, team)) return false;
  const def = FUSION_DEFS.find(d => d.name === f.name);
  if (!def) return false;
  const cell = scatterBaseCell(f);
  destroyFusion(f); // 先に合体駒を取り除いてから素体を置く（2×2の占有を解除するため）
  if (cell) {
    board[cell[0]][cell[1]] = makePiece(def.baseType, team, def.baseAttr, false, true);
  }
  // 素材は持ち駒へ戻す
  capturedPieces[team].push(makePiece(def.matType, team, def.matAttr, false, true));
  const baseName = def.baseType==='in' ? '陰' : def.baseType==='you' ? '陽' : (def.baseAttr + 'の五行駒');
  const matName  = def.matType==='in' ? '陰' : def.matType==='you' ? '陽' : (def.matAttr + 'の五行駒');
  setLog(cell
    ? `散！【${f.name}】が解けた（${baseName}が盤へ・${matName}が持ち駒へ）`
    : `散！【${f.name}】が解けた（置き場所が無いため${baseName}は戻れず・${matName}が持ち駒へ）`);
  try { flashEffect([[f.topRow,f.leftCol],[f.topRow,f.leftCol+1],[f.topRow+1,f.leftCol],[f.topRow+1,f.leftCol+1]], 'create', '散'); } catch(e){}
  try { if (window.AGX) window.AGX.SE.fusion(); } catch(e){}
  showEffectBanner('術','散');
  return true;
}

function destroyFusion(f) {
  const arr = fusionPieces[f.team];
  const idx = arr.indexOf(f);
  if (idx>=0) arr.splice(idx,1);
}

// 打ち歩詰め判定：種駒を(row,col)に打つと相手の王が即詰みになるか
function isUchifuzume(row, col, team, attr) {
  const enemy = team==='ten' ? 'mei' : 'ten';
  const enemyKingType = enemy==='ten' ? 'ten' : 'mei';
  // 相手の王の位置を探す
  let kr=-1, kc=-1;
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (p && p.type===enemyKingType) { kr=r; kc=c; }
  }
  if (kr<0) return false;
  // 種駒を仮配置
  const saved = board[row][col];
  board[row][col] = makePiece('tane', team, attr, false);
  // この種駒が相手の王に王手をかけているか（種駒の前方が王の位置か）
  const dir = team==='ten' ? -1 : 1;
  const isCheck = (row+dir===kr && col===kc);
  if (!isCheck) { board[row][col] = saved; return false; }
  // 相手が王手を解除できる手があるか調べる（1手でも逃れられれば打ち歩詰めではない）
  const canEscape = enemyHasEscape(enemy);
  board[row][col] = saved; // 戻す
  return !canEscape; // 逃れられない=打ち歩詰め
}

// 指定チームが、現在の盤面で王手を解除できる手が1つでもあるか
function enemyHasEscape(enemy) {
  const kingType = enemy;
  // 全ての自駒について、全ての移動先を試し、王手が解除されるか確認
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (!p || p.team!==enemy) continue;
    // 王・その他の駒の移動を試す
    let res;
    try { res = getMoves(p, r, c, board); } catch(e) { continue; }
    const allMoves = [...res.moves, ...res.captures];
    for (const [mr,mc] of allMoves) {
      // 仮移動
      const savedFrom = board[r][c];
      const savedTo = board[mr][mc];
      board[mr][mc] = p;
      board[r][c] = null;
      const stillCheck = isKingInCheck(enemy);
      // 戻す
      board[r][c] = savedFrom;
      board[mr][mc] = savedTo;
      if (!stillCheck) return true; // 逃れられる手がある
    }
  }
  return false;
}

// 指定チームの王が王手されているか
function isKingInCheck(team) {
  const kingType = team;
  let kr=-1, kc=-1;
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (p && p.type===kingType) { kr=r; kc=c; }
  }
  if (kr<0) return false;
  const foe = team==='ten' ? 'mei' : 'ten';
  // 相手の全駒が王の位置を攻撃できるか（通常移動）
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (!p || p.team!==foe) continue;
    let res;
    try { res = getMoves(p, r, c, board); } catch(e) { continue; }
    if (res.captures.some(([mr,mc]) => mr===kr && mc===kc)) return true;
  }
  // 特殊移動での王手も検出（getMovesに含まれない直進系など）
  if (specialMoveThreatensKing(foe, kr, kc)) return true;
  return false;
}

// 特殊移動（玄武の8方向直進・青龍の多段移動・火のナイト移動）で、
// foe側の駒が (kr,kc) の王に到達できるか。通常のgetMovesでは拾えない脅威を補う。
function specialMoveThreatensKing(foe, kr, kc) {
  // 玄武・青龍・火などの特殊移動はすべて getMoves 側で正しく生成されるようになったため、
  // ここでの補完は不要（旧・玄武の8方向直進判定は、モード制導入で実際の動きと食い違うので廃止）。
  return false;
}

// 王（天・冥）が盤上に存在するかチェックし、消えていれば勝敗を確定
// ===== 術の脅威マップ：敵の術で「王が倒される」マスを計算する =====
// 王が術の対象になったため、どこが危ないかを事前に知らせる（回避は自由＝警告のみ）。
// 対象：金剛力（金）／矛爪（白虎）／大暴発・即起爆（炎を溜めた火）／潜伏の出現破壊（土・麒麟）。
// 渦・凍結は王を倒さないので脅威には含めない。
function jutsuDangerCells(team) {
  const foe = team==='ten' ? 'mei' : 'ten';
  const danger = {};
  const add = (r,c) => { if (r>=0&&r<9&&c>=0&&c<9) danger[r+','+c] = 1; };
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (!p || p.team!==foe) continue;
    // 自陣内では術を使えないので脅威にならない
    let inHome = false;
    try { inHome = isInOwnTerritory(p, r, c); } catch(e) {}
    if (inHome) continue;
    // 金剛力（未成りの金）／矛爪（白虎）：目の前2マス（縦のみ。方向選択は廃止済み）
    if (p.type==='gogyou' && p.attr==='金') {
      try {
        for (const [dr,dc] of getKinVerticalCells(p, r, c)) add(dr,dc);
      } catch(e) {}
    }
    // 炎を溜めた火：周囲8マス（時限0の大暴発／即起爆）
    if (p.type==='gogyou' && p.attr==='火' && !p.promoted) {
      const key = hiKeyOf(p);
      const stack = key ? (hiStackCount[key] || 0) : 0;
      if (stack > 0) { for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) if(dr||dc) add(r+dr,c+dc); }
    }
  }
  // 潜伏中の土・麒麟：潜った地点の横一列（壁で停止）＋前1マスに出現して倒せる
  try {
    for (const h of hiddenTsuchi) {
      if (!h || !h.piece || h.piece.team!==foe) continue;
      let cells = [];
      try { cells = getTsuchiAppearCells(h) || []; } catch(e) { cells = []; }
      for (const cell of cells) add(cell[0], cell[1]);
    }
  } catch(e) {}
  return danger;
}

// ===== 持ち駒を打てるマスの判定 =====
// 敵陣にも打てる（本将棋と同じ）。ただし打った直後に一切動けなくなる位置には打てない。
// 例：種駒や火など前方にしか進めない駒を、敵陣の最奥に打つ場合。
function canDropAt(piece, row, col) {
  if (!piece) return false;
  if (row<0||row>=9||col<0||col>=9) return false;
  if (board[row][col] || getWallAt(row,col) || getFusionAt(row,col)) return false;
  // 二歩：同じ列に自分の種駒があるなら種駒は打てない
  if (piece.type === 'tane') {
    for (let rr=0; rr<9; rr++) {
      const q = board[rr][col];
      if (q && q.team===piece.team && q.type==='tane') return false;
    }
  }
  // 打った後に動ける場所があるか（無ければ死に駒になるので禁止）
  let res;
  try { res = getMoves({ ...piece, promoted:false }, row, col, board); } catch(e) { return true; }
  const canAct = ((res.moves||[]).length + (res.captures||[]).length) > 0;
  return canAct;
}

function checkKingCaptured() {
  if (practiceMode) return false; // 練習モードは勝敗なし
  if (gamePhase !== 'playing') return false;
  if (puzzleMode) return false; // 詰め問題は専用処理（executeMove/nextTurnで判定）
  let tenAlive = false, meiAlive = false;
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (p && p.type==='ten') tenAlive = true;
    if (p && p.type==='mei') meiAlive = true;
  }
  if (!tenAlive || !meiAlive) {
    const winner = tenAlive ? 'ten' : 'mei';
    gamePhase = 'end';
    if (gameLog && !gameLog.winner) {
      gameLog.winner = winner;
      gameLog.winMove = gameLog.winMove || '王が術・効果で討たれた';
      gameLog.totalTurns = turnCount;
    }
    aiThinking = false; // AI進行を止める
    autoTen = autoTen; // 状態維持
    renderBoard();
    setLog(`${winner==='ten'?'天':'冥'}の勝利！`);
    setTimeout(() => showGameLog(true), 600);
    return true;
  }
  return false;
}

// 200ターン到達時の駒数判定
function countMaterial(team) {
  let n = 0;
  for (let r=0;r<9;r++) for (let c=0;c<9;c++){ const p=board[r][c]; if(p&&p.team===team) n++; }
  n += (capturedPieces[team]||[]).length;
  n += (fusionPieces[team]||[]).length; // 合体駒も1つとして数える
  return n;
}
function checkTurnLimit() {
  if (gamePhase!=='playing') return false;
  const tenN = countMaterial('ten');
  const meiN = countMaterial('mei');
  gamePhase = 'end';
  aiThinking = false;
  let msg, winner=null;
  if (tenN > meiN) { winner='ten'; msg=`${MAX_TURNS}手到達：駒数で天の勝利（天${tenN}対冥${meiN}）`; }
  else if (meiN > tenN) { winner='mei'; msg=`${MAX_TURNS}手到達：駒数で冥の勝利（天${tenN}対冥${meiN}）`; }
  else { msg=`${MAX_TURNS}手到達：駒数同数（${tenN}対${meiN}）で引き分け`; }
  if (gameLog) {
    gameLog.winner = winner;
    gameLog.winMove = winner ? `${MAX_TURNS}手到達・駒数判定（天${tenN}対冥${meiN}）` : `${MAX_TURNS}手到達・引き分け（${tenN}対${meiN}）`;
    gameLog.totalTurns = turnCount;
  }
  renderBoard();
  setLog(msg);
  setTimeout(() => showGameLog(true), 600);
  return true;
}

// チームが成り可能か（敵が玄極を持っていたら成れない）
function canPromote(team) {
  const enemy = team==='ten' ? 'mei' : 'ten';
  return !fusionPieces[enemy].some(f => f.name === '玄極');
}
// ===== 五神への成り（統一条件）：対応する季節中に、その属性の術を1回使うと成れる（任意）=====
let lastJutsuPiece = null; // 直近に術を使った五行駒（nextTurnで判定）
const GOSHIN_NAME = { '木':'青龍', '火':'朱雀', '土':'麒麟', '金':'白虎', '水':'玄武' };
function isJutsuPromotable(p) {
  if (!p || p.type!=='gogyou' || p.promoted || p.pid==null) return false;
  if (SEASONS[seasonIdx % 20].attr !== p.attr) return false; // 対応する季節のみ
  if (!canPromoteKind(p)) return false;                      // 同じ五神が盤上にいるなら成れない
  return canPromote(p.team);
}
function isAIControlled(team) {
  if (team === 'mei' && aiEnabled) return true;
  if (team === 'ten' && autoTen) return true;
  return false;
}
// ===== 同種制限：同じ種類の五神駒／暗黒竜／耀白龍は、1プレイヤーにつき盤上に1枚まで =====
// 成ろうとしている駒が、既に盤上に存在する種類と重複するなら成れない（成りは有限の資源）。
// 判定対象は盤上のみ（持ち駒・潜伏中の駒は含めるが、取られて消えた駒は含めない）。
function goshinKindOf(piece) {
  if (!piece) return null;
  if (piece.type==='in') return '暗黒竜';
  if (piece.type==='you') return '耀白龍';
  if (piece.type==='gogyou') return GOSHIN_NAME[piece.attr] || null;
  return null;
}
// team側の盤上に、その種類の成り駒が既にいるか（exceptPiece＝今まさに成ろうとしている駒は除外）
function hasGoshinKind(team, kind, exceptPiece) {
  if (!kind) return false;
  for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
    const p = board[r][c];
    if (!p || p.team!==team || !p.promoted) continue;
    if (exceptPiece && (p===exceptPiece || (p.pid!=null && exceptPiece.pid!=null && p.pid===exceptPiece.pid))) continue;
    if (goshinKindOf(p)===kind) return true;
  }
  // 潜伏中の土（盤上には出ていないが存在している）も数える
  try {
    for (const h of hiddenTsuchi) {
      const hp = h && h.piece;
      if (!hp || hp.team!==team || !hp.promoted) continue;
      if (exceptPiece && (hp===exceptPiece || (hp.pid!=null && exceptPiece.pid!=null && hp.pid===exceptPiece.pid))) continue;
      if (goshinKindOf(hp)===kind) return true;
    }
  } catch(e){}
  return false;
}
// この駒は「同種制限」に触れずに成れるか
function canPromoteKind(piece) {
  if (!piece) return false;
  const kind = goshinKindOf(piece);
  if (!kind) return true;                       // 種→五行駒などは対象外
  return !hasGoshinKind(piece.team, kind, piece);
}

function applyGoshinPromotion(p) {
  p.promoted = true;
  // 潜伏出現などで駒オブジェクトが複製された場合に備え、同じpidの駒（盤上・潜伏中）もすべて成らせる
  if (p.pid != null) {
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) { const bp=board[r][c]; if (bp && bp.pid===p.pid) bp.promoted=true; }
    try { for (const h of hiddenTsuchi) { if (h && h.piece && h.piece.pid===p.pid) h.piece.promoted=true; } } catch(e){}
  }
  setLog(`${p.attr}の五行駒が${GOSHIN_NAME[p.attr]}に成った！`);
  try { for (let r=0;r<9;r++) for (let c=0;c<9;c++) if (board[r][c] && (board[r][c]===p || (p.pid!=null && board[r][c].pid===p.pid))) { flashEffect([[r,c]],'buff','成'); } } catch(e){}
  try { if (window.AGX) window.AGX.SE.fusion(); } catch(e){}
  // 土が麒麟に成ったら、マーキングのチャンスを与える（人間のみ・AIは入替時に自動選択）。
  // これまで潜伏4回ルートでしかマーキングが起動せず、術での成りだと機会が無かったのを修正。
  if (p.attr === '土' && !isAIControlled(p.team) && !onlineMode) {
    let kr=-1, kc=-1;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
      const bp=board[r][c];
      if (bp && bp.attr==='土' && bp.promoted && (bp===p || (p.pid!=null && bp.pid===p.pid))) { kr=r; kc=c; }
    }
    if (kr>=0 && !kirinMark[p.team]) {
      setTimeout(() => showKirinMarkPopup(kr, kc, p.team), 120);
    }
  }
}

// チームが今、合体駒を作成可能か（インターバル中でないか）
function canCreateFusion(team) {
  // 同時に1つまで
  if (fusionPieces[team].length > 0) return false;
  // 作成から1年（季節20個）経過しているか
  if (lastFusionSeasonIdx[team] === null) return true;
  return seasonIdx - lastFusionSeasonIdx[team] >= 20;
}

// 合体を実行
function executeFusion(baseSelect, topRow, leftCol) {
  const { material, materialIdx, def, baseRow, baseCol } = baseSelect;
  const cells = [[topRow,leftCol],[topRow,leftCol+1],[topRow+1,leftCol],[topRow+1,leftCol+1]];
  // 2×2範囲内の駒・壁を破壊（敵味方・相性問わず、素体自身も含む）
  // ・巻き込んだ敵駒 → 持ち駒として奪う（金剛力・大暴発と同じ扱い）
  // ・巻き添えになった自分の駒 → 持ち駒に戻る（プレイヤーが意図した支払いではないため）
  // ・素体 → 対価として消滅（素材とともに合体のコスト）
  const destroyed = [];
  let takenCount = 0, savedCount = 0;
  cells.forEach(([r,c]) => {
    const p = board[r][c];
    if (p) {
      destroyed.push(getPieceName(p));
      const isBase = (r===baseRow && c===baseCol);
      const stockable = ['tane','in','you','gogyou'].includes(p.type) && slotsFree(currentTeam) > 0;
      if (p.team !== currentTeam && stockable) {
        capturedPieces[currentTeam].push(makePiece(p.type, currentTeam, p.attr, false));
        takenCount++;
      } else if (p.team === currentTeam && !isBase && stockable) {
        capturedPieces[currentTeam].push(makePiece(p.type, currentTeam, p.attr, false));
        savedCount++;
      }
      board[r][c] = null;
    }
    const w = getWallAt(r,c);
    if (w) { removeWall(w.id); destroyed.push('壁'); }
  });
  // 素体は消費される（既にcellsに含まれ破壊済みだが念のため）
  board[baseRow][baseCol] = null;
  // 持ち駒（素材）を消費
  capturedPieces[currentTeam].splice(materialIdx, 1);
  // 合体駒を生成
  const baseAttr = def.baseAttr;
  fusionPieces[currentTeam].push({
    name: def.name,
    team: currentTeam,
    baseAttr,
    baseType: def.baseType,
    topRow, leftCol,
    createdSeasonIdx: seasonIdx,
  });
  lastFusionSeasonIdx[currentTeam] = seasonIdx;
  if (def.name === '太極') taikyokuLastGrant[currentTeam] = seasonIdx; // 起点を記録
  if (def.name === '玄極') genkyokuLastGrant[currentTeam] = seasonIdx; // 玄極の起点を記録

  // 状態リセット
  fusionFlowState = null; fusionBaseSelect = null; capturedSelectedIdx = null;
  renderCapturedPanel();
  logFusionCreate(def.name);
  fusionBirthBanner = true;
  showEffectBanner('結界', def.name);
  fusionBirthBanner = false;
  try { flashEffect(cells, 'fusion', '合'); } catch(e){}
  const _gain = [takenCount>0?`敵駒${takenCount}枚を奪取`:'', savedCount>0?`味方${savedCount}枚は持ち駒に戻った`:''].filter(Boolean).join('／');
  setLog(`${def.name}が誕生した！${destroyed.length>0?`（${destroyed.join('、')}を巻き込んだ${_gain?`／${_gain}`:''}）`:''}`);

  // 玄極：相手の成りを全リセット
  if (def.name === '玄極') {
    const enemy = currentTeam==='ten' ? 'mei' : 'ten';
    let resetCount = 0;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
      const p = board[r][c];
      if (p && p.team===enemy && p.promoted && (p.type==='gogyou'||p.type==='in'||p.type==='you')) {
        board[r][c] = { ...p, promoted:false };
        resetCount++;
      }
    }
    showEffectBanner('結界','玄極');
    if (resetCount>0) setLog(`玄極の力！相手の成り駒${resetCount}体が元に戻った！`);
  }
  nextTurn();
}

// 素体位置を含む2×2の配置候補（最大4パターン）を返す
function getFusion2x2Options(baseRow, baseCol) {
  const opts = [];
  // 素体が2×2のどの位置か：左上/右上/左下/右下
  const candidates = [
    { topRow: baseRow,   leftCol: baseCol },     // 素体=左上
    { topRow: baseRow,   leftCol: baseCol-1 },   // 素体=右上
    { topRow: baseRow-1, leftCol: baseCol },     // 素体=左下
    { topRow: baseRow-1, leftCol: baseCol-1 },   // 素体=右下
  ];
  candidates.forEach(cand => {
    const { topRow, leftCol } = cand;
    // 範囲が盤内か
    if (topRow<0||topRow+1>=9||leftCol<0||leftCol+1>=9) return;
    // 敵陣にも配置できる（持ち駒の打ち込みと同じ扱いに統一）
    const cells = [[topRow,leftCol],[topRow,leftCol+1],[topRow+1,leftCol],[topRow+1,leftCol+1]];
    // 他の合体駒と重ならないか
    if (cells.some(([r,c]) => getFusionAt(r,c))) return;
    // 王（天/冥）を巻き込む配置は禁止
    if (cells.some(([r,c]) => { const p=board[r][c]; return p && (p.type==='ten'||p.type==='mei'); })) return;
    opts.push({ topRow, leftCol });
  });
  return opts;
}

// 合体駒の自然消滅チェック（作成から20季節経過で消滅）
function checkFusionExpire() {
  for (const team of ['ten','mei']) {
    const arr = fusionPieces[team];
    for (let i=arr.length-1;i>=0;i--) {
      if (seasonIdx - arr[i].createdSeasonIdx >= 20) {
        setLog(`${arr[i].name}が自然消滅した。`);
        arr.splice(i,1);
      }
    }
  }
}

// 合体駒の確率（対応季節なら30%、それ以外20%）
function fusionProbability(f) {
  if (!f.baseAttr) return 0.2; // 陰陽は確率効果なし（常時系）だが念のため
  const season = SEASONS[seasonIdx % 20];
  // 通常20%は据え置き。対応季節は50%に大幅アップ（季節の巡りを戦略的に重要にする）
  return season.attr === f.baseAttr ? 0.5 : 0.2;
}

// 自分のターン開始時に発動する合体駒効果（team=手番のチーム）
// 戻り値: { skipTurn: bool } 樹海でスキップ発動時true
function triggerFusionTurnStart(team) {
  let skipTurn = false;
  // 樹海：敵が樹海を持っている場合、このチーム（手番側）のターンがスキップされる
  const enemyTeam = team==='ten' ? 'mei' : 'ten';
  for (const ef of fusionPieces[enemyTeam]) {
    if (ef.name === '樹海') {
      const prob = fusionProbability(ef);
      if (Math.random() < prob) { skipTurn = true; showEffectBanner('結界','樹海');
      setLog('樹海の力！相手にターンを奪われた！'); }
    }
  }
  for (const f of fusionPieces[team]) {
    const prob = fusionProbability(f);
    if (f.name === '大火') {
      // 隣接する敵駒を1つランダムで焼く（属性無視、天冥は除く）。自陣で安全に焼き続けるのを防ぎ、敵陣に切り込む戦法を促す
      const enemy = team==='ten' ? 'mei' : 'ten';
      const around = getFusionSurroundingCells(f); // 合体駒2×2の周囲マス
      const targets = around.filter(([r,c]) => {
        const p = board[r][c];
        return p && p.team===enemy && p.type!=='ten' && p.type!=='mei';
      });
      if (targets.length > 0 && Math.random() < prob) {
        const [r,c] = targets[Math.floor(Math.random()*targets.length)];
        const victim = board[r][c];
        board[r][c] = null;
        showEffectBanner('結界','大火'); setLog(`大火の力！隣接する${getPieceName(victim)}を焼き払った！`); flashEffect([[r,c]],'destroy','焼');
      }
    } else if (f.name === '焚沃') {
      if (Math.random() < prob) {
        // 種駒を生み出す（合体駒の周囲の空きマスに1つ）
        const around = getFusionSurroundingCells(f).filter(([r,c]) => !board[r][c] && !getWallAt(r,c) && !getFusionAt(r,c));
        if (around.length>0) {
          const [r,c] = around[Math.floor(Math.random()*around.length)];
          const attrs = ['木','火','土','金','水'];
          board[r][c] = makePiece('tane', team, attrs[Math.floor(Math.random()*5)]);
          showEffectBanner('結界','焚沃');
          setLog('焚沃の力！新たな種駒が芽吹いた！');
          flashEffect([[r,c]],'create','芽');
        }
      }
    } else if (f.name === '太極') {
      // 次の次の自分のターンごとに好きな駒を成り駒にできる
      if (taikyokuLastGrant[team]===null || seasonIdx - taikyokuLastGrant[team] >= 4) {
        // 成らせられる自分の駒（未成りの五行/陰/陽/種）が存在するか確認。いなければスキップ（スタック防止）。
        let hasGrantTarget = false;
        for (let r=0;r<9 && !hasGrantTarget;r++) for (let c=0;c<9;c++) {
          const bp = board[r][c];
          if (bp && bp.team===team && !bp.promoted &&
              (bp.type==='gogyou'||bp.type==='in'||bp.type==='you'||bp.type==='tane')) { hasGrantTarget = true; break; }
        }
        if (hasGrantTarget) {
          taikyokuGrantAvailable = team;
          taikyokuLastGrant[team] = seasonIdx;
          showEffectBanner('結界','太極');
          setLog('太極の力！好きな駒を1つ成らせることができる（駒をタップ）');
        }
      }
    }
    else if (f.name === '玄極') {
      // 太極と同じ周期（季節4つ）で、相手の駒を1つ「無」にできる
      if (genkyokuLastGrant[team]===null || seasonIdx - genkyokuLastGrant[team] >= 4) {
        // 無にできる相手の駒（王以外・すでに無でない・盤上の通常駒）が存在するか確認。
        // 対象がいないのに選択待ちにするとスタックするため、いなければ発動をスキップする。
        const enemyTeam = team==='ten' ? 'mei' : 'ten';
        let hasTarget = false;
        for (let r=0;r<9 && !hasTarget;r++) for (let c=0;c<9;c++) {
          const bp = board[r][c];
          if (bp && bp.team===enemyTeam && bp.type!=='ten' && bp.type!=='mei' && bp.type!=='mu') { hasTarget = true; break; }
        }
        if (hasTarget) {
          genkyokuMuAvailable = team;
          genkyokuLastGrant[team] = seasonIdx;
          showEffectBanner('結界','玄極');
          setLog('玄極の力！相手の駒を1つ「無」にできる（相手の駒をタップ／王は不可）');
        }
        // 対象がいなければ何もしない（次の発動周期まで持ち越し。スタックを防ぐ）
      }
    }
    else if (f.name === '鉱山') {
      if (Math.random() < prob) {
        kouzanActive = team;
        showEffectBanner('結界','鉱山');
        setLog('鉱山の力！このターンは相性を無視して相手を倒せる！');
      }
    } else if (f.name === '水晶') {
      if (Math.random() < prob) {
        suishouActive = team;
        showEffectBanner('結界','水晶');
        setLog('水晶の力！相手の駒を1つ操作できる（敵駒をタップ→移動先を選択）');
      }
    }
  }
  return { skipTurn };
}

// 合体駒の周囲マス（外周）を取得
function getFusionSurroundingCells(f) {
  const cells = [];
  for (let r=f.topRow-1; r<=f.topRow+2; r++) {
    for (let c=f.leftCol-1; c<=f.leftCol+2; c++) {
      if (r<0||r>=9||c<0||c>=9) continue;
      // 占有マス自身は除く
      if (r>=f.topRow && r<=f.topRow+1 && c>=f.leftCol && c<=f.leftCol+1) continue;
      cells.push([r,c]);
    }
  }
  return cells;
}

// ============================================================
// 壁駒システム
// ============================================================
function getWallAt(r, c) { return wallPieces.find(w => w.row===r && w.col===c) || null; }
// 壁を壊せるのは「火」「金」の駒と、「陰」「陽」（成り＝暗黒竜・耀白龍を含む）。
// 木・水・土（青龍・玄武・麒麟を含む）と王は壁を壊せず、壁の手前で止まる。
function canBreakWall(piece) {
  if (!piece) return false;
  if (piece.type === 'in' || piece.type === 'you') return true;   // 陰・陽（暗黒竜・耀白龍）
  return piece.attr === '火' || piece.attr === '金';               // 火・金（朱雀・白虎・種駒も属性で判定）
}
function getWallsByOwner(ownerKey) { return wallPieces.filter(w => w.ownerKey===ownerKey); }
function removeWall(wallId) { wallPieces = wallPieces.filter(w => w.id!==wallId); }
// 指定の駒が所有する壁をすべて取り除く（青龍が新しい軌跡を残すときに前回の軌跡を消す）
function clearWallsOwnedBy(piece) {
  if (!piece || piece.pid === undefined) return;
  const key = 'pid' + piece.pid;
  wallPieces = wallPieces.filter(w => w.ownerKey !== key);
}

function getWallPlaceCells(piece, row, col) {
  // 木の壁：自陣以外の盤全体の空きマスに設置可能
  const cells = [];
  const selfZone = piece.team === 'ten' ? r => r >= 6 : r => r <= 2;
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (r===row && c===col) continue;
      if (selfZone(r)) continue;
      if (board[r][c]) continue;
      if (getWallAt(r,c)) continue;
      if (getFusionAt(r,c)) continue;
      cells.push([r,c]);
    }
  }
  return cells;
}

function placeWall(piece, ownerRow, ownerCol, r, c, opts) {
  // 持ち主は駒の固有ID（pid）。駒が移動しても同じ持ち主として追跡し、合計3個まで
  if (piece && piece.pid === undefined) piece.pid = pieceIdCounter++;
  const ownerKey = piece ? 'pid' + piece.pid : `${ownerRow},${ownerCol}`;
  const owned = getWallsByOwner(ownerKey);
  const limit = 3; // 木の術「壁作成」：1体につき盤上3個まで
  // 青龍の軌跡壁は「常に最新の1本だけ」を残す方式のため、この上限判定を通さない
  // （通さないと、1回の移動で置いた3〜4個のうち古いものが即座に消え、
  //   壁が置かれたり置かれなかったりして見える不具合になっていた）
  if (!(opts && opts.noLimit) && owned.length >= limit) { owned.sort((a,b)=>a.id-b.id); removeWall(owned[0].id); }
  // trail=true は青龍の軌跡壁（上限の対象外・次に青龍が動くと消える）。木の術で作る壁と区別する。
  wallPieces.push({ id: wallIdCounter++, team: piece.team, row: r, col: c, ownerKey, fireAttr: false, trail: !!(opts && opts.noLimit) });
  lastJutsuPiece = piece; // 術使用（成り判定用）
  try { flashEffect([[r,c]], 'create', '壁'); } catch(e){}
}

// 青龍が動いたあと、出発マスに軌跡の壁を残す共通処理。
// 通常移動は専用分岐で経路全体に壁を置くが、ボーナス移動は executeMove を直接使うため
// 壁が置かれず「壁を残したり残さなかったり」する不整合になっていた。その穴を埋める。
function ryuTrailWallAt(piece, fromR, fromC) {
  if (!piece || !(piece.type==='gogyou' && piece.attr==='木' && piece.promoted)) return;
  if (fromR<0||fromR>=9||fromC<0||fromC>=9) return;
  if (board[fromR][fromC] || getWallAt(fromR,fromC) || getFusionAt(fromR,fromC)) return;
  try { placeWall(piece, fromR, fromC, fromR, fromC, {noLimit:true}); } catch(e) {}
}

function recordMove() {
  try {
    const teamJp = currentTeam==='ten' ? '天' : '冥';
    let text;
    if (lastMove && lastMove.to) {
      const [tr,tc] = lastMove.to;
      const movedP = board[tr] ? board[tr][tc] : null;
      const pieceName = movedP ? getPieceName(movedP) : '駒';
      if (lastMove.from) {
        const [fr,fc] = lastMove.from;
        text = `${teamJp} ${pieceName} [${fr},${fc}]→[${tr},${tc}]`;
      } else {
        text = `${teamJp} ${pieceName} を[${tr},${tc}]へ打つ`;
      }
      if (lastCaptureNote) text += ` ×${lastCaptureNote}`;
    } else {
      text = `${teamJp} （術・特殊手）`;
    }
    moveHistory.push({ turn: turnCount, team: currentTeam, text });
    if (moveHistory.length > 60) moveHistory.shift(); // 直近60手だけ保持（メモリ節約）
  } catch(e) {}
  lastCaptureNote = null;
}

// 盤面の異常を検知する。debugPanelOnのときだけnextTurnで呼ぶ（重いので通常は動かさない）。
function detectAnomalies() {
  if (!debugPanelOn) return;
  const found = [];
  try {
    // ① 駒と合体駒が同じマスに重複していないか
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
      if (board[r][c] && getFusionAt(r,c)) {
        found.push(`重複：[${r},${c}] に駒(${getPieceName(board[r][c])})と合体駒が重なっている`);
      }
    }
    // ② 王（天・冥）の数が正しいか（各1つ、または捕獲で0）
    let tenK=0, meiK=0;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
      const p=board[r][c]; if(!p) continue;
      if (p.type==='ten') tenK++;
      if (p.type==='mei') meiK++;
    }
    if (tenK>1) found.push(`天の王が${tenK}個ある（異常）`);
    if (meiK>1) found.push(`冥の王が${meiK}個ある（異常）`);
    // ③ 合体駒同士が重なっていないか
    const allFus = [...fusionPieces.ten, ...fusionPieces.mei];
    for (let i=0;i<allFus.length;i++) for (let j=i+1;j<allFus.length;j++) {
      const a=allFus[i], b=allFus[j];
      const overlap = !(a.topRow+1 < b.topRow || b.topRow+1 < a.topRow || a.leftCol+1 < b.leftCol || b.leftCol+1 < a.leftCol);
      if (overlap) found.push(`合体駒【${a.name}】と【${b.name}】が重なっている`);
    }
    // ④ 合体駒のマスに別の駒（重複②の別視点。念のため合体駒占有4マスをチェック）
    for (const f of allFus) {
      for (const [fr,fc] of getFusionCells(f)) {
        if (board[fr][fc]) found.push(`合体駒【${f.name}】の占有マス[${fr},${fc}]に駒(${getPieceName(board[fr][fc])})がいる`);
      }
    }
  } catch(e) { found.push('異常検知中にエラー: ' + e.message); }
  if (found.length) {
    for (const t of found) anomalyLog.push({ turn: turnCount, text: t });
    if (anomalyLog.length > 40) anomalyLog = anomalyLog.slice(-40);
    renderDebugPanel();
  }
}
