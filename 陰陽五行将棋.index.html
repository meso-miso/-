// 五行相性循環図（相生：外側の円、相剋：内側の星型）
// 相性図のSVGを生成（size と markerId接頭辞を指定できる＝モーダルでも矢印が消えない）
function buildGogyouSvg(size, idPrefix) {
  const center = size/2;
  const r = size * 0.38;
  const nodeR = size * 0.107;
  const labels = ['木','火','土','金','水'];
  const colors = { '木':'#7dc860', '火':'#e05040', '土':'#d4b830', '金':'#dcd8c0', '水':'#a0aab4' };
  const pos = {};
  labels.forEach((l, i) => {
    const angle = -Math.PI/2 + i * (2*Math.PI/5);
    pos[l] = { x: center + r*Math.cos(angle), y: center + r*Math.sin(angle) };
  });
  const soushouPairs = Object.entries(SOUSHOU);
  const soukokuPairs = Object.entries(SOUKOKU);
  const seiId = idPrefix + '-sei', kokuId = idPrefix + '-koku';
  const sw = Math.max(1.4, size * 0.017);

  function arrowLine(a, b, color, dash, markerId) {
    const dx = pos[b].x - pos[a].x, dy = pos[b].y - pos[a].y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    const startOffset = nodeR + size*0.012, endOffset = nodeR + size*0.05;
    const x1 = pos[a].x + ux*startOffset, y1 = pos[a].y + uy*startOffset;
    const x2 = pos[b].x - ux*endOffset, y2 = pos[b].y - uy*endOffset;
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${sw}" ${dash?`stroke-dasharray="${sw*1.6},${sw*1.6}"`:''} marker-end="url(#${markerId})"/>`;
  }

  let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="background:rgba(20,12,6,0.55); border-radius:50%; border:1px solid rgba(200,150,12,0.3);">
    <defs>
      <marker id="${seiId}" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L6,3 L0,6 Z" fill="rgba(120,210,120,0.95)"/>
      </marker>
      <marker id="${kokuId}" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L6,3 L0,6 Z" fill="rgba(230,90,90,0.95)"/>
      </marker>
    </defs>`;
  soushouPairs.forEach(([a,b]) => { svg += arrowLine(a, b, 'rgba(120,210,120,0.85)', null, seiId); });
  soukokuPairs.forEach(([a,b]) => { svg += arrowLine(a, b, 'rgba(230,90,90,0.85)', true, kokuId); });
  labels.forEach(l => {
    svg += `<circle cx="${pos[l].x}" cy="${pos[l].y}" r="${nodeR}" fill="${colors[l]}" opacity="0.95" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>`;
    svg += `<text x="${pos[l].x}" y="${pos[l].y + size*0.037}" font-size="${size*0.107}" text-anchor="middle" fill="#1a1008" font-weight="bold">${l}</text>`;
  });
  svg += `</svg>`;
  return svg;
}

function renderGogyouDiagram() {
  const el = document.getElementById('gogyou-diagram');

  el.innerHTML = `<div style="font-size:0.5rem; color:rgba(240,230,200,0.8); text-align:center; margin-bottom:2px; line-height:1.3;">矢印の先＝倒される側<br><span style="color:rgba(120,210,120,0.9)">緑</span>相生 / <span style="color:rgba(230,90,90,0.9)">赤</span>相剋</div>` + buildGogyouSvg(84, 'gg-small');

// ランダムな合言葉を生成（読みやすい英数字4文字）
function onlineGenRoomId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 紛らわしい文字を除外
  let s = '';
  for (let i=0;i<4;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

// 部屋を作る（部屋主＝天）
function onlineCreateRoom() {
  if (typeof Peer === 'undefined') { onlineSetStatus('通信ライブラリの読み込みに失敗しました。通信環境を確認して再読み込みしてください。'); return; }
  onlineCleanup();
  onlineMyTeam = 'ten';
  const roomId = onlineGenRoomId();
  onlineSetStatus('部屋を準備中…');
  onlinePeer = new Peer(ONLINE_PREFIX + roomId);
  onlinePeer.on('open', () => {
    onlineSetStatus(`合言葉：<b style="font-size:1.3rem;letter-spacing:0.2em;color:#fff;">${roomId}</b><br>この合言葉を相手に伝えてください。<br>相手の接続を待っています…`);
  });
  onlinePeer.on('connection', (conn) => {
    onlineConn = conn;
    onlineSetupConn();
  });
  onlinePeer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      onlineSetStatus('この合言葉は使用中です。もう一度「部屋を作る」を押してください。');
    } else {
      onlineSetStatus('接続エラー：' + err.type + '<br>通信環境を確認してください。');
    }
  });
}

// 部屋に入る（参加者＝冥）
function onlineJoinRoom() {
  if (typeof Peer === 'undefined') { onlineSetStatus('通信ライブラリの読み込みに失敗しました。通信環境を確認して再読み込みしてください。'); return; }
  const input = document.getElementById('online-roomid');
  const roomId = (input.value || '').trim().toUpperCase();
  if (roomId.length < 3) { onlineSetStatus('合言葉を入力してください。'); return; }
  onlineCleanup();
  onlineMyTeam = 'mei';
  onlineSetStatus('接続中…');
  onlinePeer = new Peer(); // 参加者はランダムID
  onlinePeer.on('open', () => {
    onlineConn = onlinePeer.connect(ONLINE_PREFIX + roomId, { reliable: true });
    onlineSetupConn();
  });
  onlinePeer.on('error', (err) => {
    if (err.type === 'peer-unavailable') {
      onlineSetStatus('その合言葉の部屋が見つかりません。合言葉を確認してください。');
    } else {
      onlineSetStatus('接続エラー：' + err.type + '<br>通信環境を確認してください。');
    }
  });
}

// データ接続が確立した時の共通処理
function onlineSetupConn() {
  if (!onlineConn) return;
  onlineConn.on('open', () => {
    onlineConnected = true;
    onlineSetStatus('接続できました！対局を開始します。');
    setTimeout(() => {
      const popup = document.getElementById('online-popup');
      if (popup) popup.remove();
      onlineStartGame();
    }, 800);
  });
  onlineConn.on('data', (data) => {
    onlineHandleData(data);
  });
  onlineConn.on('close', () => {
    onlineConnected = false;
    onlineHandlePeerGone('相手との接続が切れました。');
  });
  onlineConn.on('error', () => {
    onlineSetStatus('データ接続でエラーが発生しました。');
  });
}

// 編成完了時（オンライン）：自分の陣データを相手に送り、相手の編成を待つ
function onlineSubmitArrangement() {
  // 自分の陣（自分の担当側）の編成データを取り出す
  if (onlineMyTeam === 'ten') {
    onlineMyArrangement = { tane: [...setupData.ten_tane], gogyou: [...setupData.ten_gogyou] };
  } else {
    onlineMyArrangement = { tane: [...setupData.mei_tane], gogyou: [...setupData.mei_gogyou] };
  }
  // 相手に送信
  if (onlineConnected && onlineConn) {
    try { onlineConn.send({ type: 'arrangement', team: onlineMyTeam, arrangement: onlineMyArrangement }); } catch(e){}
  }
  onlineWaitingSetup = true;
  setPhase('自分の編成を送信しました。相手の編成を待っています…');
  onlineTryStartMatch();
}

// 両者の編成が揃ったら対局開始
function onlineTryStartMatch() {
  if (!onlineMyArrangement || !onlinePeerArrangement) return; // まだ揃っていない
  // setupDataに両者の陣を反映
  const myTeam = onlineMyTeam;
  const peerTeam = (myTeam === 'ten') ? 'mei' : 'ten';
  setupData[myTeam + '_tane'] = [...onlineMyArrangement.tane];
  setupData[myTeam + '_gogyou'] = [...onlineMyArrangement.gogyou];
  setupData[peerTeam + '_tane'] = [...onlinePeerArrangement.tane];
  setupData[peerTeam + '_gogyou'] = [...onlinePeerArrangement.gogyou];
  // 季節はホスト（天）基準で統一：天側が乱数決定して送る
  onlineWaitingSetup = false;
  onlineMode = true;      // startGameの自動保存が走る前にオンラインを立てる（ローカル保存を防ぐ）
  clearSavedGame();       // 念のため、直前のローカル保存は残さない
  startGame(); // initBoardで両陣が盤面に並ぶ
  onlineMode = true;
  // ホスト（天）が季節を決めて送る。参加者は受信を待つ
  if (onlineMyTeam === 'ten') {
    if (onlineConnected && onlineConn) {
      try { onlineConn.send({ type: 'season', seasonIdx }); } catch(e){}
    }
  }
  const teamName = onlineMyTeam === 'ten' ? '天（先手）' : '冥（後手）';
  setLog(`オンライン対局開始！あなたは ${teamName} です。`);
  onlineUpdateTurnUI();
}

// 盤面状態を丸ごと取得（送信用）。手番完了時の確定状態のみ
function onlineGetState() {
  return {
    board: board.map(row => row.map(cell => cell ? { ...cell } : null)),
    capturedPieces: { ten: capturedPieces.ten.map(p=>({...p})), mei: capturedPieces.mei.map(p=>({...p})) },
    capturedPlacedCount: { ...capturedPlacedCount },
    fusionPieces: { ten: fusionPieces.ten.map(f=>({...f, cells: f.cells?f.cells.map(x=>[...x]):undefined})), mei: fusionPieces.mei.map(f=>({...f, cells: f.cells?f.cells.map(x=>[...x]):undefined})) },
    wallPieces: wallPieces.map(w=>({...w})),
    seasonIdx, currentTeam, turnCount, gamePhase,
    hiStackCount: { ...hiStackCount },
    kirinMark: JSON.parse(JSON.stringify(kirinMark || {})),
    suzakuOnWall: suzakuOnWall ? { ...suzakuOnWall } : null,
    taikyokuLastGrant: { ...taikyokuLastGrant },
    lastFusionSeasonIdx: (typeof lastFusionSeasonIdx !== 'undefined') ? lastFusionSeasonIdx : null,
    frozenPieces: { ten: frozenPieces.ten?{...frozenPieces.ten}:null, mei: frozenPieces.mei?{...frozenPieces.mei}:null },
    hiddenTsuchi: (hiddenTsuchi || []).map(h => ({ ...h, piece: h.piece ? { ...h.piece } : null })),
    tsuchiBurrowCount: JSON.parse(JSON.stringify(tsuchiBurrowCount || {})),
    winnerInfo: (gamePhase === 'end' && gameLog) ? { winner: gameLog.winner, winMove: gameLog.winMove, totalTurns: gameLog.totalTurns } : null,
  };
}

// 受信した状態を自分の盤面に適用
function onlineApplyState(s) {
  onlineApplying = true;
  board = s.board.map(row => row.map(cell => cell ? { ...cell } : null));
  capturedPieces = { ten: s.capturedPieces.ten.map(p=>({...p})), mei: s.capturedPieces.mei.map(p=>({...p})) };
  capturedPlacedCount = { ...s.capturedPlacedCount };
  fusionPieces = { ten: s.fusionPieces.ten.map(f=>({...f, cells: f.cells?f.cells.map(x=>[...x]):undefined})), mei: s.fusionPieces.mei.map(f=>({...f, cells: f.cells?f.cells.map(x=>[...x]):undefined})) };
  wallPieces = s.wallPieces.map(w=>({...w}));
  seasonIdx = s.seasonIdx; currentTeam = s.currentTeam; turnCount = s.turnCount; gamePhase = s.gamePhase;
  hiStackCount = { ...s.hiStackCount };
  kirinMark = JSON.parse(JSON.stringify(s.kirinMark || {}));
  suzakuOnWall = s.suzakuOnWall ? { ...s.suzakuOnWall } : null;
  taikyokuLastGrant = { ...s.taikyokuLastGrant };
  if (s.lastFusionSeasonIdx !== null && typeof lastFusionSeasonIdx !== 'undefined') lastFusionSeasonIdx = s.lastFusionSeasonIdx;
  frozenPieces = s.frozenPieces ? { ten: s.frozenPieces.ten?{...s.frozenPieces.ten}:null, mei: s.frozenPieces.mei?{...s.frozenPieces.mei}:null } : { ten:null, mei:null };
  hiddenTsuchi = (s.hiddenTsuchi || []).map(h => ({ ...h, piece: h.piece ? { ...h.piece } : null }));
  tsuchiBurrowCount = JSON.parse(JSON.stringify(s.tsuchiBurrowCount || {}));
  // 操作の途中状態はリセット（届くのは確定状態のみ）
  selectedCell = null; actionMode = 'move'; actionPhase = 'main'; bonusPiece = null;
  wallPlaceMode = false; ryuMoveState = null; genbuMoveState = null; hiMoveState = null;
  fusionFlowState = null; fusionBaseSelect = null; suishouActive = null; suishouMoveState = null;
  taikyokuGrantAvailable = null; genkyokuMuAvailable = null; kirinMarkMode = null; tsuchiAppearMode = null;
  renderBoard(); updateUI();
  // 試合終了が届いたらログを表示（onlineApplying中なので、ここでの送信は走らない）
  if (gamePhase === 'end') {
    if (s.winnerInfo && gameLog) { gameLog.winner = s.winnerInfo.winner; gameLog.winMove = s.winnerInfo.winMove; gameLog.totalTurns = s.winnerInfo.totalTurns; }
    setTimeout(() => { showGameLog(true); onlineApplying = false; }, 300);
  } else {
    onlineApplying = false;
    onlineUpdateTurnUI();
  }
}

// 自分の手番が終わった時、状態を相手に送信
function onlineSendState() {
  if (!onlineConnected || !onlineConn) return;
  try { onlineConn.send({ type: 'state', state: onlineGetState() }); } catch(e) {}
}

// 再戦の合意管理
let onlineMyRematch = false;
let onlinePeerRematch = false;

// 再戦をリクエスト（自分が「再戦」を押した）
function onlineRequestRematch() {
  onlineMyRematch = true;
  if (onlineConnected && onlineConn) {
    try { onlineConn.send({ type: 'rematch' }); } catch(e){}
  }
  const st = document.getElementById('gamelog-rematch-status');
  if (st) st.textContent = onlinePeerRematch ? '再戦します！' : '相手の再戦応答を待っています…';
  const rm = document.getElementById('gamelog-rematch');
  if (rm) { rm.disabled = true; rm.style.opacity = '0.6'; }
  onlineTryRematch();
}

// 両者が再戦に同意したら再戦開始
function onlineTryRematch() {
  if (!onlineMyRematch || !onlinePeerRematch) return;
  // 終局画面を閉じる
  const modal = document.getElementById('gamelog-modal');
  if (modal) modal.remove();
  // フラグをリセット
  onlineMyRematch = false; onlinePeerRematch = false;
  // 同じ編成データで再戦（onlineMyArrangement / onlinePeerArrangement は保持されている）
  if (onlineMyArrangement && onlinePeerArrangement) {
    onlineTryStartMatch(); // 既存の編成データで盤面を再構築して対局開始
  } else {
    // 編成データが無い場合は編成画面から
    onlineStartGame();
  }
}

// 相手が消えた時：メッセージを数秒見せてから自動でメニューに戻る
let onlinePeerGoneTimer = null;
function onlineHandlePeerGone(msg) {
  if (!onlineMode) return; // オンライン対局でなければ無視
  if (onlinePeerGoneTimer) return; // 既に処理中
  // 終局画面が出ている場合は、そこにメッセージを出すだけ（操作可能なので自動で戻さない）
  const modal = document.getElementById('gamelog-modal');
  if (modal) {
    const st = document.getElementById('gamelog-rematch-status');
    if (st) st.textContent = '相手が退出しました。再戦はできません。';
    const rm = document.getElementById('gamelog-rematch');
    if (rm) { rm.disabled = true; rm.style.opacity = '0.5'; }
    return;
  }
  // 対局中・編成中：オーバーレイでメッセージを出し、3秒後にメニューへ
  let ov = document.getElementById('online-disconnect-overlay');
  if (ov) ov.remove();
  ov = document.createElement('div');
  ov.id = 'online-disconnect-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:4000;color:#f0e6c8;font-family:inherit;text-align:center;padding:24px;';
  ov.innerHTML = `<div style="font-size:1.1rem;letter-spacing:0.1em;margin-bottom:14px;color:rgba(220,180,180,1);">${msg}</div>
    <div style="font-size:0.85rem;opacity:0.8;">まもなくメニューに戻ります…</div>`;
  document.body.appendChild(ov);
  onlinePeerGoneTimer = setTimeout(() => {
    onlinePeerGoneTimer = null;
    const o = document.getElementById('online-disconnect-overlay');
    if (o) o.remove();
    onlineForceBackToMenu();
  }, 3000);
}

// 強制的にメニューへ戻す（接続は既に切れている前提）→ タイトル画面へ
function onlineForceBackToMenu() {
  onlineCleanup();
  gamePhase = 'menu';
  const modal = document.getElementById('gamelog-modal'); if (modal) modal.remove();
  showTitleScreen();
}

// メニューに戻る（接続を切る）→ タイトル画面へ
function onlineBackToMenu() {
  if (onlineConnected && onlineConn) {
    try { onlineConn.send({ type: 'leave' }); } catch(e){}
  }
  onlineCleanup();
  gamePhase = 'menu';
  const modal = document.getElementById('gamelog-modal'); if (modal) modal.remove();
  showTitleScreen();
}

// 相手から届いたデータの処理
function onlineHandleData(data) {
  if (!data) return;
  if (data.type === 'arrangement') {
    onlinePeerArrangement = data.arrangement;
    onlineTryStartMatch();
  } else if (data.type === 'season') {
    seasonIdx = data.seasonIdx;
    renderBoard(); updateUI();
  } else if (data.type === 'state') {
    onlineApplyState(data.state);
  } else if (data.type === 'resign') {
    if (gamePhase === 'playing') {
      gamePhase = 'end';
      setLog('相手が投了しました。あなたの勝ちです！');
    }
  } else if (data.type === 'rematch') {
    // 相手が再戦を希望
    onlinePeerRematch = true;
    const st = document.getElementById('gamelog-rematch-status');
    if (st) st.textContent = onlineMyRematch ? '再戦します！' : '相手が再戦を希望しています。「再戦」を押すと始まります。';
    onlineTryRematch();
  } else if (data.type === 'leave') {
    // 相手がメニューに戻った（退出）
    onlineConnected = false;
    onlineHandlePeerGone('相手が退出しました。');
  }
}

// 手番表示の更新（自分の番か相手の番か）
function onlineUpdateTurnUI() {
  if (!onlineMode) return;
  const myTurn = (currentTeam === onlineMyTeam);
  const teamName = onlineMyTeam === 'ten' ? '天' : '冥';
  if (myTurn) setLog(`あなた（${teamName}）の番です。`);
  else setLog('相手の番です。お待ちください…');
}

// 接続のクリーンアップ
function onlineCleanup() {
  onlineConnected = false;
  onlineMode = false;
  if (onlineConn) { try { onlineConn.close(); } catch(e){} onlineConn = null; }
  if (onlinePeer) { try { onlinePeer.destroy(); } catch(e){} onlinePeer = null; }
}

// ===== タイトル画面の制御 =====
function hideTitleScreen() {
  const t = document.getElementById('title-screen');
  if (t) t.style.display = 'none';
}
function showTitleScreen() {
  const t = document.getElementById('title-screen');
  if (t) t.style.display = 'flex';
  // 他の画面を隠す
  const bw = document.getElementById('board-wrap'); if (bw) bw.style.display = 'none';
  const ss = document.getElementById('setup-screen'); if (ss) ss.style.display = 'none';
  setGameChrome(false);
}
// ゲーム中だけ表示する画面外ボタン（相性図・音量）の表示制御
function setGameChrome(show) {
  // ゲーム中は歯車（オプション）だけを表示。相性図/ログ/遊び方/音量は歯車メニューに統合
  const gear = document.getElementById('options-btn');
  if (gear) gear.style.display = show ? '' : 'none';
  if (!show) {
    const d = document.getElementById('gogyou-diagram'); if (d) d.style.display = 'none';
    const au = document.getElementById('audio-ui'); if (au) au.style.display = 'none';
    const om = document.getElementById('options-menu'); if (om) om.remove();
  }
}
// 編成画面からメニュー（タイトル）へ戻る
function backToMenuFromSetup() {
  try { if (onlineMode) { onlineCleanup(); } } catch(e){}
  onlineMode = false;
  setupStep = 0;
  showTitleScreen();
}
// タイトル画面のボタン設定
(function initTitleScreen(){
  const off = document.getElementById('title-offline');
  const on = document.getElementById('title-online');
  const resume = document.getElementById('title-resume');
  if (resume) {
    try { if (getSavedGame()) resume.style.display = ''; } catch(e){}
    resume.onclick = () => { resumeSavedGame(); };
  }
  const tut = document.getElementById('title-tutorial');
  if (tut) tut.onclick = () => showTutorial();
  const man = document.getElementById('title-manual');
  if (man) man.onclick = () => showManual();
  const rev = document.getElementById('title-review');
  if (rev) rev.onclick = () => showReviewModal();
  const pz = document.getElementById('title-puzzle');
  if (pz) pz.onclick = () => showPracticeList();
  if (off) off.onclick = () => {
    const goSetup = () => {
      hideTitleScreen();
      // 新編成フロー：対戦相手→編成方法の順に選ぶ（グリッドは「自分で並べる」時だけ表示）
      showOpponentChoice();
    };
    // 初回だけ、遊ぶ直前にチュートリアルを表示（ロード時に開かないのでサムネはタイトルのまま）
    let seen = true; try { seen = !!localStorage.getItem('ogx_seen_tutorial'); } catch(e){}
    if (!seen) { showTutorial(goSetup); } else { goSetup(); }
  };
  if (on) on.onclick = () => {
    hideTitleScreen();
    showOnlineConnect();
  };
})();

<script>
(function(){
  var ctx=null, sfx=null, bgmMaster=null, noiseBuf=null;
  var sfxVol=0.6, bgmVol=0.35, bgmEnabled=true, bgmRunning=false, bgmTimer=null;
  try { var s=localStorage.getItem('ogx_audio'); if(s){ s=JSON.parse(s); if(typeof s.sfx==='number')sfxVol=s.sfx; if(typeof s.bgm==='number')bgmVol=s.bgm; if(typeof s.bon==='boolean')bgmEnabled=s.bon; } } catch(e){}
  function save(){ try{ localStorage.setItem('ogx_audio', JSON.stringify({sfx:sfxVol,bgm:bgmVol,bon:bgmEnabled})); }catch(e){} }
  function ensure(){
    if(ctx){ if(ctx.state==='suspended'){ try{ctx.resume();}catch(e){} } return ctx; }
    try{ var AC=window.AudioContext||window.webkitAudioContext; if(!AC) return null;
      ctx=new AC();
      sfx=ctx.createGain(); sfx.gain.value=sfxVol; sfx.connect(ctx.destination);
      bgmMaster=ctx.createGain(); bgmMaster.gain.value=bgmVol; bgmMaster.connect(ctx.destination);
      // ドラム/スネア用のノイズ音源
      try { var _nb=ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.3), ctx.sampleRate); var _nd=_nb.getChannelData(0); for(var _i=0;_i<_nd.length;_i++)_nd[_i]=Math.random()*2-1; noiseBuf=_nb; } catch(e){}
      // 軽いエコー（控えめ）
      try {
        var _dly=ctx.createDelay(1.0); _dly.delayTime.value=0.26;
        var _fb=ctx.createGain(); _fb.gain.value=0.18;
        var _wet=ctx.createGain(); _wet.gain.value=0.2;
        bgmMaster.connect(_dly); _dly.connect(_fb); _fb.connect(_dly); _dly.connect(_wet); _wet.connect(ctx.destination);
      } catch(e){}
    }catch(e){ ctx=null; }
    return ctx;
  }
  function tnow(){ return ctx?ctx.currentTime:0; }
  function blip(freq,dur,type,peak,delay,dest){
    if(!ctx) return; var t=tnow()+(delay||0);
    var o=ctx.createOscillator(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
    var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002,peak||0.25),t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(dest||sfx); o.start(t); o.stop(t+dur+0.03);
  }
  function thud(){ if(!ctx)return; var t=tnow();
    var o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(70,t+0.12);
    var g=ctx.createGain(); g.gain.setValueAtTime(0.34,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o.connect(g); g.connect(sfx); o.start(t); o.stop(t+0.2);
  }
  // sfxバスに繋ぐノイズバースト（火・水しぶき用）
  function noiseHit(dur, hp, vol, delay){
    if(!ctx || !noiseBuf) return; var t=tnow()+(delay||0);
    var s=ctx.createBufferSource(); s.buffer=noiseBuf;
    var f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp;
    var g=ctx.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.connect(f); f.connect(g); g.connect(sfx); s.start(t); s.stop(t+dur+0.02);
  }
  // 属性ごとの捕獲音（五行の質感を音で表現）
  var ATTR_SE = {
    '木': function(){ // 乾いた木を打つ音
      blip(180,0.06,'triangle',0.28,0); blip(240,0.05,'square',0.12,0.02); thud();
    },
    '火': function(){ // 破裂・炎
      noiseHit(0.14,320,0.32,0); blip(90,0.16,'sawtooth',0.24,0);
      blip(180,0.05,'square',0.10,0.03);
    },
    '土': function(){ // 重い着地
      if(!ctx) return; var t=tnow(); var o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(48,t+0.18);
      var g=ctx.createGain(); g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
      o.connect(g); g.connect(sfx); o.start(t); o.stop(t+0.26); noiseHit(0.06,180,0.14,0);
    },
    '金': function(){ // 金属の澄んだ響き（倍音＋余韻）
      blip(1320,0.34,'sine',0.16,0); blip(1980,0.30,'sine',0.09,0.005);
      blip(2640,0.22,'sine',0.05,0.01); blip(660,0.12,'triangle',0.10,0);
    },
    '水': function(){ // 水滴・しぶき
      if(!ctx) return; var t=tnow(); var o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(1100,t); o.frequency.exponentialRampToValueAtTime(320,t+0.13);
      var g=ctx.createGain(); g.gain.setValueAtTime(0.24,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
      o.connect(g); g.connect(sfx); o.start(t); o.stop(t+0.2); noiseHit(0.05,2000,0.10,0.02);
    }
  };
  var SE={
    move:function(){ ensure(); blip(300,0.09,'triangle',0.20); },
    capture:function(){ ensure(); thud(); blip(430,0.05,'square',0.10,0); },
    // 属性ごとの捕獲音（attrが五行なら専用音、それ以外は汎用）
    captureBy:function(attr){ ensure(); if(attr && ATTR_SE[attr]) ATTR_SE[attr](); else { thud(); blip(430,0.05,'square',0.10,0); } },
    // 五神・暗・耀の咆哮。属性ごとに基音を変え、獣の唸りのようにピッチを下げながら唸らせる
    roar:function(attr){ ensure(); if(!ctx) return; var t=tnow();
      var base = { '木':150, '火':185, '土':130, '金':210, '水':120, '暗':95, '耀':240 }[attr] || 150;
      // 低音の唸り（のこぎり波を軽く歪ませ、ピッチを下げる）
      var o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(base*1.4,t); o.frequency.exponentialRampToValueAtTime(base*0.7,t+0.5);
      var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(1200,t); lp.frequency.exponentialRampToValueAtTime(400,t+0.5);
      var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.32,t+0.05); g.gain.setValueAtTime(0.3,t+0.28); g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
      o.connect(lp); lp.connect(g); g.connect(sfx); o.start(t); o.stop(t+0.6);
      // 咆哮のうなり（第二成分・少し高く）
      var o2=ctx.createOscillator(); o2.type='square'; o2.frequency.setValueAtTime(base*2.1,t); o2.frequency.exponentialRampToValueAtTime(base*1.1,t+0.4);
      var g2=ctx.createGain(); g2.gain.setValueAtTime(0.0001,t); g2.gain.exponentialRampToValueAtTime(0.12,t+0.06); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.45);
      o2.connect(g2); g2.connect(sfx); o2.start(t); o2.stop(t+0.5);
      // 唸りのざらつき
      noiseHit(0.14,300,0.12,0.02);
    },
    // 駒が倒される時のダメージ音（鈍い衝撃＋短い金属的な軋み）
    damage:function(){ ensure(); if(!ctx) return; var t=tnow();
      var o=ctx.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(90,t+0.14);
      var g=ctx.createGain(); g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
      o.connect(g); g.connect(sfx); o.start(t); o.stop(t+0.2);
      noiseHit(0.09,500,0.22,0);
    },
    explosion:function(){ ensure(); // 即起爆：短い破裂＋低音
      noiseHit(0.18,220,0.4,0); var t=tnow(); var o=ctx&&ctx.createOscillator&&ctx.createOscillator();
      if(o){ o.type='sawtooth'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(38,t+0.22); var g=ctx.createGain(); g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.28); o.connect(g); g.connect(sfx); o.start(t); o.stop(t+0.32); } },
    bigExplosion:function(){ ensure(); // 大暴発：重く長い轟音＋二段の破裂
      noiseHit(0.32,120,0.55,0); noiseHit(0.22,400,0.35,0.05);
      var t=tnow(); if(ctx){ var o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(90,t); o.frequency.exponentialRampToValueAtTime(28,t+0.45); var g=ctx.createGain(); g.gain.setValueAtTime(0.55,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.5); o.connect(g); g.connect(sfx); o.start(t); o.stop(t+0.55);
        var o2=ctx.createOscillator(); o2.type='square'; o2.frequency.setValueAtTime(160,t+0.04); o2.frequency.exponentialRampToValueAtTime(50,t+0.3); var g2=ctx.createGain(); g2.gain.setValueAtTime(0.28,t+0.04); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.34); o2.connect(g2); g2.connect(sfx); o2.start(t+0.04); o2.stop(t+0.38); } },
    jutsu:function(){ ensure(); [660,880,1174].forEach(function(f,i){ blip(f,0.28,'sine',0.15,i*0.05); }); },
    fusion:function(){ ensure(); [262,330,392,523].forEach(function(f,i){ blip(f,0.6,'sine',0.15,i*0.05); }); blip(131,0.7,'sine',0.11,0); },
    win:function(){ ensure(); [523,659,784,1046].forEach(function(f,i){ blip(f,0.4,'triangle',0.19,i*0.13); }); },
    lose:function(){ ensure(); [392,311,262,196].forEach(function(f,i){ blip(f,0.5,'sine',0.17,i*0.16); }); },
    season:function(){ ensure(); blip(1046,0.5,'sine',0.12,0); blip(1568,0.5,'sine',0.08,0.05); },
    check:function(){ ensure(); blip(920,0.13,'square',0.20,0); blip(690,0.16,'square',0.18,0.10); },
    ui:function(){ ensure(); blip(720,0.04,'triangle',0.09); }
  };
  // ===== ポップBGM：コード進行＋ベース＋メロディ＋ドラム =====
  var STEP_MS=140, STEP_S=0.14, bgmStep=0;
  var PENTA=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25]; // C D E G A C D E（明るいペンタ）
  // 王道進行を核にした16小節（A8＋B8）でループを長く
  var CHORDS=[
    { pad:[174.61,220.00,261.63], bass:87.31 },  // 1 F
    { pad:[196.00,246.94,293.66], bass:98.00 },  // 2 G
    { pad:[164.81,196.00,246.94], bass:82.41 },  // 3 Em
    { pad:[220.00,261.63,329.63], bass:110.00 }, // 4 Am
    { pad:[174.61,220.00,261.63], bass:87.31 },  // 5 F
    { pad:[196.00,246.94,293.66], bass:98.00 },  // 6 G
    { pad:[261.63,329.63,392.00], bass:130.81 }, // 7 C
    { pad:[220.00,261.63,329.63], bass:110.00 }, // 8 Am
    { pad:[146.83,174.61,220.00], bass:73.42 },  // 9 Dm
    { pad:[196.00,246.94,293.66], bass:98.00 },  // 10 G
    { pad:[164.81,196.00,246.94], bass:82.41 },  // 11 Em
    { pad:[220.00,261.63,329.63], bass:110.00 }, // 12 Am
    { pad:[174.61,220.00,261.63], bass:87.31 },  // 13 F
    { pad:[196.00,246.94,293.66], bass:98.00 },  // 14 G
    { pad:[261.63,329.63,392.00], bass:130.81 }, // 15 C
    { pad:[196.00,246.94,293.66], bass:98.00 }   // 16 G
  ];
  // メロディの型（1小節16ステップ、PENTAの添字。nullは休符）
  var MELO_PATTERNS=[
    [0,null,2,null,4,null,3,4, null,5,null,4,2,null,0,null],
    [4,null,5,null,4,null,2,null, 3,null,2,null,0,null,2,null],
    [5,null,4,5,null,3,null,4, null,2,null,0,2,null,3,null],
    [null,2,null,4,null,5,4,null, 3,null,4,null,2,null,0,null],
    [0,null,null,2,null,null,4,null, 5,null,null,4,null,null,2,null], // 疎ら
    [7,null,6,null,5,null,4,3, null,4,null,5,6,null,7,null]           // 高め（サビ感）
  ];
  // 16小節にパターンを割り当て（後半でサビ感）
  var MELO_BARS=[0,1,0,2, 0,1,4,3, 5,1,2,3, 0,1,5,4];

  function popSynth(freq,when,dur,vol,type){ var o=ctx.createOscillator(); o.type=type||'triangle'; o.frequency.setValueAtTime(freq,when); var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,when); g.gain.exponentialRampToValueAtTime(vol,when+0.008); g.gain.exponentialRampToValueAtTime(0.0001,when+dur); o.connect(g); g.connect(bgmMaster); o.start(when); o.stop(when+dur+0.03); }
  function popBass(freq,when,dur,vol){ var o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(freq,when); var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=650; var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,when); g.gain.exponentialRampToValueAtTime(vol,when+0.01); g.gain.setValueAtTime(vol,when+dur*0.7); g.gain.exponentialRampToValueAtTime(0.0001,when+dur); o.connect(lp); lp.connect(g); g.connect(bgmMaster); o.start(when); o.stop(when+dur+0.03); }
  function popPad(notes,when,dur,vol){ notes.forEach(function(f){ var o=ctx.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(f,when); var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,when); g.gain.linearRampToValueAtTime(vol,when+0.06); g.gain.setValueAtTime(vol,when+Math.max(0.1,dur-0.18)); g.gain.linearRampToValueAtTime(0.0001,when+dur); o.connect(g); g.connect(bgmMaster); o.start(when); o.stop(when+dur+0.03); }); }
  function drKick(when,vol){ var o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(150,when); o.frequency.exponentialRampToValueAtTime(45,when+0.11); var g=ctx.createGain(); g.gain.setValueAtTime(vol,when); g.gain.exponentialRampToValueAtTime(0.0001,when+0.18); o.connect(g); g.connect(bgmMaster); o.start(when); o.stop(when+0.2); }
  function drNoise(when,dur,hp,vol){ if(!noiseBuf)return; var s=ctx.createBufferSource(); s.buffer=noiseBuf; var f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; var g=ctx.createGain(); g.gain.setValueAtTime(vol,when); g.gain.exponentialRampToValueAtTime(0.0001,when+dur); s.connect(f); f.connect(g); g.connect(bgmMaster); s.start(when); s.stop(when+dur+0.02); }
  function drSnare(when,vol){ drNoise(when,0.13,1600,vol); var o=ctx.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(190,when); var g=ctx.createGain(); g.gain.setValueAtTime(vol*0.5,when); g.gain.exponentialRampToValueAtTime(0.0001,when+0.09); o.connect(g); g.connect(bgmMaster); o.start(when); o.stop(when+0.11); }
  function drHat(when,vol){ drNoise(when,0.03,8000,vol); }
  // ===== 和風レイヤー：琴（撥弦）と和太鼓 =====
  function koto(freq,when,vol){ // 琴：速いアタック＋指数減衰＋倍音、明るい撥弦
    var o=ctx.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(freq,when);
    var o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.setValueAtTime(freq*2.01,when);
    var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(3400,when); lp.frequency.exponentialRampToValueAtTime(850,when+0.5);
    var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,when); g.gain.exponentialRampToValueAtTime(vol,when+0.006); g.gain.exponentialRampToValueAtTime(0.0001,when+0.72);
    var g2=ctx.createGain(); g2.gain.setValueAtTime(0.0001,when); g2.gain.exponentialRampToValueAtTime(vol*0.3,when+0.006); g2.gain.exponentialRampToValueAtTime(0.0001,when+0.32);
    o.connect(lp); lp.connect(g); g.connect(bgmMaster); o.start(when); o.stop(when+0.76);
    o2.connect(g2); g2.connect(bgmMaster); o2.start(when); o2.stop(when+0.36);
  }
  function taiko(when,vol){ // 和太鼓：深い胴鳴り＋アタックのノイズ
    var o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(128,when); o.frequency.exponentialRampToValueAtTime(58,when+0.16);
    var g=ctx.createGain(); g.gain.setValueAtTime(vol,when); g.gain.exponentialRampToValueAtTime(0.0001,when+0.32);
    o.connect(g); g.connect(bgmMaster); o.start(when); o.stop(when+0.34);
    if(noiseBuf){ var s=ctx.createBufferSource(); s.buffer=noiseBuf; var f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=780; var ng=ctx.createGain(); ng.gain.setValueAtTime(vol*0.45,when); ng.gain.exponentialRampToValueAtTime(0.0001,when+0.05); s.connect(f); f.connect(ng); ng.connect(bgmMaster); s.start(when); s.stop(when+0.06); }
  }

  function bgmNote(){ // 1ステップ（16分音符）
    if(!ctx||!bgmRunning) return;
    var bars=CHORDS.length;
    var t=tnow(), s=bgmStep++, inBar=s%16, bar=Math.floor(s/16)%bars, ch=CHORDS[bar];
    if(inBar===0) popPad(ch.pad, t, 16*STEP_S, 0.045);                       // コードパッド（小節頭）
    if(inBar===0||inBar===6||inBar===8||inBar===14) popBass(ch.bass, t, 2.2*STEP_S, 0.11); // 弾むベース
    if(inBar===0||inBar===8) drKick(t,0.22);                                 // キック（1・3拍）
    if(inBar===4||inBar===12) drSnare(t,0.13);                               // スネア（2・4拍）
    if(inBar%2===0) drHat(t, (inBar%4===0)?0.045:0.065);                     // ハイハット（8分）
    if((bar===7||bar===15) && inBar>=12 && inBar%2===0) drSnare(t,0.10);     // フレーズ終わりのフィル
    var pat=MELO_PATTERNS[MELO_BARS[bar]]; var m=pat[inBar];
    if(m!=null) popSynth(PENTA[m], t, 1.7*STEP_S, 0.095, 'square');          // メロディ（小節ごとに変化）
    // === 和風レイヤー：琴＋和太鼓（ポップの上に薄く重ねる）===
    if(inBar===0) taiko(t, 0.14);                                            // 各小節頭に和太鼓
    if(inBar===8) taiko(t, 0.10);                                            // 3拍にも軽く
    if(inBar===0) koto(ch.pad[2]*2, t, 0.05);                               // 小節頭に琴（コード上音の1oct上）
    if(inBar===6) koto(ch.pad[1]*2, t, 0.04);                               // 裏拍に琴
    if(inBar===11) koto(ch.pad[0]*2, t, 0.036);                             // 揺らす
    if((bar===7||bar===15) && (inBar===10||inBar===12||inBar===14)) {        // フレーズ終わりの琴アルペジオ＋締め太鼓
      koto(ch.pad[(inBar-10)/2|0 % 3]*2, t, 0.05);
      if(inBar===14) taiko(t, 0.16);
    }
  }
  function bgmLoop(){ if(!bgmRunning) return; bgmNote(); bgmTimer=setTimeout(bgmLoop, STEP_MS); }
  function startBGM(){ if(!bgmEnabled) return; if(!ensure()) return; if(bgmRunning) return; bgmRunning=true; bgmStep=0; bgmLoop(); }
  function stopBGM(){ bgmRunning=false; if(bgmTimer){ clearTimeout(bgmTimer); bgmTimer=null; } }
  window.AGX={
    SE:SE, ensure:ensure, startBGM:startBGM, stopBGM:stopBGM,
    setSfx:function(v){ sfxVol=v; if(sfx)sfx.gain.value=v; save(); },
    setBgm:function(v){ bgmVol=v; if(bgmMaster)bgmMaster.gain.value=v; save(); },
    setBgmEnabled:function(b){ bgmEnabled=b; save(); if(b) startBGM(); else stopBGM(); }
  };
  document.addEventListener('click', function(e){
    ensure(); if(bgmEnabled && !bgmRunning) startBGM();
    if(e.target && e.target.closest && e.target.closest('button')) SE.ui();
  }, true);
  function wireUI(){
    var btn=document.getElementById('audio-btn'), panel=document.getElementById('audio-panel');
    var bs=document.getElementById('bgm-slider'), ss=document.getElementById('sfx-slider'), bt=document.getElementById('bgm-toggle');
    if(!btn) return;
    if(bs){ bs.value=Math.round(bgmVol*100); bs.addEventListener('input',function(){ window.AGX.setBgm(this.value/100); }); }
    if(ss){ ss.value=Math.round(sfxVol*100); ss.addEventListener('input',function(){ window.AGX.setSfx(this.value/100); }); }
    if(bt){ bt.checked=bgmEnabled; bt.addEventListener('change',function(){ window.AGX.setBgmEnabled(this.checked); }); }
    var at=document.getElementById('anim-toggle');
    if(at){ try{ at.checked = (localStorage.getItem('ogx_anim')!=='0'); }catch(e){ at.checked=true; }
      at.addEventListener('change',function(){ try{ animEnabled=this.checked; localStorage.setItem('ogx_anim', this.checked?'1':'0'); }catch(e){} }); }
    btn.addEventListener('click',function(ev){ ev.stopPropagation(); ensure(); if(bgmEnabled&&!bgmRunning)startBGM(); panel.style.display=(panel.style.display==='none'||!panel.style.display)?'block':'none'; });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', wireUI); else wireUI();
})();
</script>
